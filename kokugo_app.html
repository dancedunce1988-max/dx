      <button class="btn secondary" onclick="showHome()">ホームへ</button>
    </div>`;
  screen.innerHTML = html;
}
function resetBattleHistory(){
  if(!confirm("対戦の記録をすべて削除します。よろしいですか？（この操作は取り消せません）")) return;
  saveBattleStats({plays:0, byCat:{}, history:[]});
  showBattleHistory();
}
function goBattleGenreSelect(){
  const elA = document.getElementById("battleNameA"), elB = document.getElementById("battleNameB");
  battleSetup.nameA = ((elA && elA.value) || "プレイヤーA").trim() || "プレイヤーA";
  battleSetup.nameB = ((elB && elB.value) || "プレイヤーB").trim() || "プレイヤーB";
  showBattleGenreSelect();
}
function showBattleGenreSelect(){
  screen.innerHTML = `
    <div class="card battle-setup-screen">
      <div class="battle-setup-title">${esc(battleSetup.nameA)} vs ${esc(battleSetup.nameB)}</div>
      <p class="battle-setup-sub">ジャンルをどうする？</p>
      <div class="battle-genre-choice">
        <button class="battle-genre-btn" onclick="startBattle(CAT_KEYS.slice())">
          <span class="big">🌐 全ジャンル</span>
          <span class="small">すべての分野からランダムに出題されます</span>
        </button>
        <button class="battle-genre-btn" onclick="showBattleGenrePicker()">
          <span class="big">🎯 ジャンルを選択する</span>
          <span class="small">対戦したい分野を自分たちで選びます（複数選択可）</span>
        </button>
      </div>
      <button class="btn secondary" style="margin-top:18px" onclick="showBattleSetup()">もどる</button>
    </div>`;
}
function showBattleGenrePicker(){
  let html = `<div class="card battle-setup-screen">
      <div class="battle-setup-title">ジャンルを選ぶ</div>
      <p class="battle-setup-sub">対戦したい分野をタップして選んでください（複数選択可）</p>
    </div>`;
  (DATA.groups || [{name:"分野", keys:CAT_KEYS}]).forEach(g=>{
    html += `<h3 class="section">${esc(g.name)}</h3><div class="genre-pick-grid">`;
    g.keys.forEach(key=>{
      if(!CATS[key]) return;
      const on = battleSetup.picked.has(key);
      html += `<button class="genre-pick-chip ${on?'on':''}" onclick="toggleBattleGenre('${key}')">${esc(CATS[key].name)}</button>`;
    });
    html += `</div>`;
  });
  const n = battleSetup.picked.size;
  html += `
    <div class="btn-row" style="margin-top:10px">
      <button class="btn ${n===0?'disabled':''}" onclick="confirmBattleGenrePicker()">${n>0 ? `この${n}ジャンルで対戦開始` : "1つ以上選んでください"}</button>
      <button class="btn secondary" onclick="showBattleGenreSelect()">もどる</button>
    </div>`;
  screen.innerHTML = html;
}
function toggleBattleGenre(key){
  if(battleSetup.picked.has(key)) battleSetup.picked.delete(key);
  else battleSetup.picked.add(key);
  showBattleGenrePicker();
}
function confirmBattleGenrePicker(){
  if(battleSetup.picked.size === 0) return;
  startBattle(Array.from(battleSetup.picked));
}
function startBattle(cats){
  if(!Array.isArray(cats) || cats.length === 0) return;
  battle = {cats, nameA:battleSetup.nameA, nameB:battleSetup.nameB, hp:{A:100,B:100}, maxHp:100, turn:"A", lastQ:null, item:null, itemCat:null, order:null};
  battleNextQuestion();
}
function battleNextQuestion(){
  const picked = pickBattleQuestionMulti(battle.cats, battle.lastQ);
  battle.item = picked.item;
  battle.itemCat = picked.cat;
  battle.lastQ = battle.item.q;
  renderBattle();
}
function renderBattle(){
  const it = battle.item, cat = battle.itemCat;
  const isInput = Array.isArray(it.ans);
  const turnName = battle.turn === "A" ? battle.nameA : battle.nameB;
  let answerArea;
  if(isInput){
    clearChoiceKeys();
    answerArea = `
      <div class="ans-row">
        <input type="text" id="ansIn" class="ans-input" placeholder="ひらがなで入力" autocomplete="off"
               onkeydown="if(event.key==='Enter'){event.preventDefault();battleSubmitInput();}">
        <button class="btn inline" id="submitBtn" onclick="battleSubmitInput()">こたえる</button>
      </div>`;
  }else{
    battle.order = shuffledOrder(it.c.length);
    answerArea = `
      <div class="choices">
        ${battle.order.map((oi,pos)=>`<button class="choice" onclick="battleAnswerChoice(${oi})"><span class="choice-num">${pos+1}</span>${it.ckb ? kanbunMiniHtml(it.ckb[oi]) : esc(it.c[oi])}</button>`).join("")}
      </div>`;
  }
  screen.innerHTML = `
    <div class="card">
      <div class="battle-hp-wrap">
        <div class="battle-side ${battle.turn==='A'?'active':''}">
          <div class="battle-name">${esc(battle.nameA)}</div>
          <div class="hpbar hpbar-a"><div style="width:${battle.hp.A/battle.maxHp*100}%"></div></div>
          <div class="hp-num">${battle.hp.A} / ${battle.maxHp}</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="battle-side ${battle.turn==='B'?'active':''}">
          <div class="battle-name">${esc(battle.nameB)}</div>
          <div class="hpbar hpbar-b"><div style="width:${battle.hp.B/battle.maxHp*100}%"></div></div>
          <div class="hp-num">${battle.hp.B} / ${battle.maxHp}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="q-category"><span>${esc(CATS[cat].name)}</span><span class="battle-turn-tag">${esc(turnName)}さんの番</span></div>
      ${subInstructionHtml(cat, it)}
      ${kanbunBoxHtml(it.kb)}
      <div class="q-text">${markQuestionHtml(it.q)}</div>
      ${answerArea}
      <div class="feedback" id="fb"></div>
      <div class="btn-row">
        <button class="btn" id="nextBtn" style="display:none" onclick="battleAdvance()">つぎへ</button>
        <button class="btn secondary" onclick="battleQuit()">たいせんをやめる</button>
      </div>
    </div>`;
  if(isInput){ const el = document.getElementById("ansIn"); if(el) el.focus(); }
  else{ setupChoiceKeys(pos => battleAnswerChoice(battle.order[pos]), it.c.length); }
}
function battleAnswerChoice(origIdx){
  battleGrade(origIdx === battle.item.a, origIdx, null);
}
function battleSubmitInput(){
  const el = document.getElementById("ansIn");
  if(!el || el.disabled) return;
  const val = normalizeAns(el.value);
  if(!val) return;
  const ok = battle.item.ans.map(normalizeAns).includes(val);
  el.disabled = true;
  const sb = document.getElementById("submitBtn");
  if(sb) sb.disabled = true;
  battleGrade(ok, null, el.value);
}
function battleGrade(ok, chosenOrig, typed){
  const it = battle.item;
  const attacker = battle.turn, defender = attacker === "A" ? "B" : "A";
  let dealt = 0;
  if(ok){
    dealt = battleDamage(it);
    battle.hp[defender] = Math.max(0, battle.hp[defender] - dealt);
  }
  if(!Array.isArray(it.ans)){
    const btns = screen.querySelectorAll(".choice");
    btns.forEach((b,pos)=>{
      const oi = battle.order[pos];
      b.disabled = true;
      if(oi===it.a) b.classList.add("correct");
      else if(oi===chosenOrig) b.classList.add("wrong");
      else b.classList.add("dim");
    });
  }
  const fb = document.getElementById("fb");
  fb.className = "feedback show " + (ok?"ok":"ng");
  let expl;
  if(Array.isArray(it.ans)){
    const wrongMsg = ok ? "" : `正解は「${esc(it.ans.join("」または「"))}」（こたえ：${esc(typed||"")}）`;
    expl = [wrongMsg, it.e ? esc(it.e) : ""].filter(Boolean).join("<br>");
  }else{
    expl = it.e ? esc(it.e) : (ok ? "" : `正解は「${esc(it.c[it.a])}」`);
  }
  const defenderName = defender === "A" ? battle.nameA : battle.nameB;
  const dmgMsg = ok ? `<span class="lvup-chip">${esc(defenderName)}に ${dealt} ダメージ！</span>` : "";
  fb.innerHTML = `<div class="verdict">${ok?"○ 正解！":"× ざんねん…"}${dmgMsg}</div>${expl}`;
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.style.display = "inline-block";
  nextBtn.textContent = battle.hp[defender] <= 0 ? "けっかを見る" : "つぎへ";
  nextBtn.focus();
}
function battleAdvance(){
  const attacker = battle.turn, defender = attacker === "A" ? "B" : "A";
  if(battle.hp[defender] <= 0){ endBattle(); return; }
  battle.turn = defender;
  battleNextQuestion();
}
function battleQuit(){
  if(!confirm("対戦をやめますか？ここまでの結果は記録されません。")) return;
  battle = null;
  showBattleGenreSelect();
}
function endBattle(){
  const winner = battle.hp.A <= 0 ? battle.nameB : battle.nameA;
  const loser = battle.hp.A <= 0 ? battle.nameA : battle.nameB;
  const bs = loadBattleStats();
  bs.plays = (bs.plays||0) + 1;
  bs.byCat = bs.byCat || {};
  battle.cats.forEach(cat => { bs.byCat[cat] = (bs.byCat[cat]||0) + 1; });
  bs.history = bs.history || [];
  bs.history.unshift({a:battle.nameA, b:battle.nameB, winner, cats:battle.cats.slice(), ts:Date.now()});
  if(bs.history.length > 50) bs.history.length = 50;
  saveBattleStats(bs);
  const b = battle;
  window._retry = () => startBattle(b.cats);
  screen.innerHTML = `
    <div class="card">
      <h3 class="section">けっか発表</h3>
      <div class="result-score" style="font-size:1.6rem">🏆 ${esc(winner)} の勝ち！</div>
      <p class="result-msg">${esc(loser)} は力つきた…</p>
      <div class="btn-row">
        <button class="btn" onclick="window._retry()">同じジャンルでもう一度</button>
        <button class="btn secondary" onclick="showBattleGenreSelect()">べつのジャンルへ</button>
        <button class="btn secondary" onclick="showHome()">ホームへ</button>
      </div>
    </div>`;
  battle = null;
}

/* ================= ボス戦（低確率のランダムイベント） =================
   知識クイズ（通常・苦手復習）で1問答えるたびに、ごくまれに(1/40)ボスが勝負をしかけてくる。
   受けて立って勝つと、そのボス固有の「アイテム」を必ず、まれに(1/10、天井10連勝で確定)
   さらに貴重な「宝具」も落とす。集めたアイテムは成績とは別に、ずっと記録される。

   バランス設計（「適正経験値」方式）：
   ボスの防御・回避は固定値の引き算ではなく割合で軽減／無効化するしくみにしている
   （数ポイントの投資で被ダメージが一律1に落ちてしまう問題を避けるため）。
   プレイヤー側の防御力・素早さ・運は、上限のある「〇%で頭打ち」の式ではなく、
   ポイントを増やすほど際限なく効果が伸びていく（ただし伸び方はゆるやかになっていく）
   「逓減式」にしている。これにより、どのステータスにポイントを注いでも無駄にならない。
   素早さ（回避）は、ボス側の新しい「命中率」と綱引きするしくみにした
   （素早さだけを見て「〇ポイントで頭打ち」とはならず、相手の命中率次第で価値が変わる）。
   さらに素早さは、自分の攻撃がボスに回避されにくくなる命中率ボーナスも兼ねる
   （上限つきの効果にして、他のステータスとのバランスを保っている）。
   各ボスには「適正経験値」recPts を個別に設定。その分のステータスポイントを
   HP・攻撃力・防御力・素早さ・運の5項目に均等に振り分けた状態で、8割正解ペースなら
   勝率85〜90%程度になるよう、HP・攻撃力・防御%・命中率・運をシミュレーションで調整している
   （ステータス未強化のままだと、適正経験値の高いボスほど勝つのが難しくなる）。 */
/* ボスごとの個性（プレイヤーのステータスと対になる項目）＋レベル・適正経験値：
   hp       … 体力
   atk      … 反撃ダメージの倍率（1.0が基準）
   defPct   … プレイヤーの攻撃ダメージを軽減する割合（%）
   accuracy … 反撃がプレイヤーに命中する力。プレイヤーの素早さ（回避）と綱引きする
   evadePct … プレイヤーの攻撃を完全に回避する確率（%）
   luck     … 反撃が「会心の一撃」になる確率（%）。会心時は反撃ダメージが1.5倍になる
   lv       … ボスのレベル（表示用）
   recPts   … 適正経験値。このぶんのステータスポイントを持って挑むことを想定している */
const BOSSES = [
  {id:"tekkyu",     name:"鉄球ローリング・レディ",       icon:"⚫", item:"鉄球",             treasure:"ぴかぴかの鉄球",             hp:4610,  atk:1.7,   defPct:10, accuracy:120, evadePct:5,  luck:8,  lv:10, recPts:100},
  {id:"houcho",     name:"一閃の料理長",             icon:"🔪", item:"包丁",             treasure:"調理室",                     hp:11000, atk:25.38, defPct:5,  accuracy:150, evadePct:5,  luck:14, lv:16, recPts:500},
  {id:"volleyball", name:"サーブマスター・レシオ",     icon:"🏐", item:"バレーボール",     treasure:"人体模型",                   hp:2870,  atk:1.0,   defPct:15, accuracy:100, evadePct:10, luck:8,  lv:5,  recPts:50},
  {id:"yakyu",      name:"万年応援団長スイング",       icon:"⚾", item:"野球ボール",       treasure:"ホームランバット",           hp:2750,  atk:1.1,   defPct:10, accuracy:90,  evadePct:10, luck:20, lv:6,  recPts:50},
  {id:"suugaku",    name:"不動の定規使い",           icon:"📐", item:"三角定規",         treasure:"大きなコンパス",             hp:7000,  atk:20.16, defPct:50, accuracy:90,  evadePct:38, luck:5,  lv:15, recPts:500},
  {id:"bijutsu",    name:"絵画の申し子キャンバス",     icon:"🖌️", item:"ふつうの筆",       treasure:"描いたものが現実になる筆",   hp:5460,  atk:1.0,   defPct:10, accuracy:85,  evadePct:10, luck:26, lv:7,  recPts:80},
];
const BOSS_ENCOUNTER_RATE = 1/40;
const BOSS_TREASURE_RATE = 0.1;
const BOSS_PITY_MAX = 10;
const BOSS_PLAYER_HP = 100;
const BOSS_PLAYER_DMG = [125, 155];     // 正解時に与えるダメージ
const BOSS_DMG_ON_CORRECT = [4, 6];     // 自分の攻撃が成功したときに受けるダメージ（軽い）
const BOSS_DMG_ON_WRONG = [12, 16];     // 自分の攻撃が失敗したときに受けるダメージ（重い）
/* ボス戦ステータス：割りふったポイントの効果量。
   防御力・運は「〇ポイントで半分の効果」という逓減式（上限なし、常に少しずつ伸びる）。
   素早さは、ポイント数に応じた「回避パワー」を持ち、ボスの命中率との比率で命中/回避が決まる
   （回避パワー = 素早さ × STAT_SPD_EVASION_UNIT）。
   加えて、素早さは自分の攻撃がボスに回避される確率を少し下げる命中率ボーナスも持つ
   （上限つきの逓減式。上限を設けているのは、回避特化型のボスの個性を消してしまわないため）。 */
const STAT_HP_PER_POINT = 5;
const STAT_ATK_PER_POINT = 3;
const STAT_DEF_HALF_POINT = 30;   // 防御力がこのポイント数のとき、被ダメージが半分になる
const STAT_LUCK_HALF_POINT = 100; // 運がこのポイント数のとき、会心率が50%になる
const STAT_SPD_EVASION_UNIT = 2;  // 素早さ1ポイントあたりの回避パワー
const STAT_SPD_ACC_HALF_POINT = 40; // 素早さがこのポイント数のとき、命中率ボーナスが上限の半分になる
const STAT_SPD_ACC_MAX_BONUS = 6;   // 素早さによる命中率ボーナスの上限（ボスの回避率から差し引く%pt、上限つきで他ステータスとバランスを取る）
const STAT_CRIT_MULT = 2;                  // 会心の一撃のダメージ倍率
/* 各ボスのHP・攻撃力・防御%・回避%・運は、「適正経験値（recPts）を5項目に均等に振り分けた
   プレイヤー」が8割の正解率で挑んだとき、勝率がおよそ85〜90%になるようシミュレーションで
   調整している。ステータス未強化のままだと、適正経験値の高いボスほど勝つのが難しくなる。 */
const TREASURE_NAMES = new Set(BOSSES.map(b => b.treasure));
/* 通常アイテムをボス戦で消費すると効果を発揮する。ドロップ元のボスの個性（攻撃特化・防御特化など）
   に合わせて効果を割りふっている（例：攻撃特化型のボスが落とす鉄球・包丁は攻撃力アップ、
   防御・回避特化型のボスが落とす三角定規は防御力アップ）。 */
const ITEM_EFFECTS = {
  "バレーボール": {type:"heal",      amount:35,          label:"HPを35回復する",                       icon:"💚"},
  "ふつうの筆":   {type:"heal",      amount:45,          label:"HPを45回復する",                       icon:"💚"},
  "野球ボール":   {type:"missGuard",                     label:"次に1回だけ、間違えてもダメージを受けない", icon:"✨"},
  "鉄球":         {type:"atkBuff",   amount:15, turns:3, label:"次の3ターン、攻撃力が上がる",           icon:"🔥"},
  "包丁":         {type:"atkBuff",   amount:30, turns:3, label:"次の3ターン、攻撃力が大きく上がる",     icon:"🔥"},
  "三角定規":     {type:"defBuff",   amount:25, turns:3, label:"次の3ターン、防御力が上がる",           icon:"🛡️"},
};
function randInt(min, max){ return min + Math.floor(Math.random() * (max - min + 1)); }

/* ================= 幻のボス「シランちゃん」 =================
   通常のボスとは別枠の、1/1000のごく低確率で現れるネタボス。BOSSESには含めないので、
   挑戦チケットやランダムボス抽選（BOSSES配列からの選出）には一切登場しない。
   HPが1しかなく、攻撃さえ当たれば必ず倒せるが、回避率90%固定（素早さステータスの
   命中率ボーナスも効かない）なので当てるのは難しい。プレイヤーはアイテムを使えず、
   ボスの反撃も一切なく（「校歌を熱唱するだけ」）、代わりに毎ターン20%の確率で逃げてしまう。 */
const SHIRAN_ENCOUNTER_RATE = 1/1000;
const SHIRAN_FLEE_RATE = 0.3;
const SHIRAN_BOSS = {
  id:"shiran", name:"幻のボス【シランちゃん】", icon:"👻",
  item:"シランちゃんのサイン", treasure:"シランちゃんの秘密ノート",
  hp:1, atk:1, defPct:1, accuracy:1, evadePct:95, luck:1,
  lv:null, recPts:0, fixedEvade:true, noItems:true, isShiran:true,
};
TREASURE_NAMES.add(SHIRAN_BOSS.treasure);

let pendingBoss = null;
let pendingBossAllGenre = false; // 挑戦チケットからの遭遇のときtrue（全ジャンル出題・文言が変わる）
let bossPromptSelection = "no";
let bossPromptResumeFn = null;
let bossPromptActive = false;
let bossBattle = null;

/* 1/100の確率でボスが出現する。出現したら遭遇プロンプトを表示してtrueを返す（呼び出し元は処理を中断する）。
   出現しなければfalse。resumeFnは、逃げた・戦い終わったあとに元の流れへ戻るための関数。
   シランちゃん（1/1000）は通常ボスとは別枠で、こちらを先に判定する。 */
function rollBossEncounter(resumeFn){
  if(bossPromptActive || bossBattle) return false;
  if(Math.random() < SHIRAN_ENCOUNTER_RATE){
    pendingBoss = SHIRAN_BOSS;
    pendingBossAllGenre = false;
    bossPromptResumeFn = resumeFn;
    bossPromptActive = true;
    bossPromptSelection = "no";
    renderBossPrompt();
    return true;
  }
  if(Math.random() >= BOSS_ENCOUNTER_RATE) return false;
  pendingBoss = BOSSES[Math.floor(Math.random() * BOSSES.length)];
  pendingBossAllGenre = false;
  bossPromptResumeFn = resumeFn;
  bossPromptActive = true;
  bossPromptSelection = "no";
  renderBossPrompt();
  return true;
}
function renderBossPrompt(){
  const b = pendingBoss;
  const st = loadStats();
  const introText = pendingBossAllGenre
    ? `「${esc(b.name)}」<span class="boss-lv-tag">Lv.${b.lv||"?"}</span>が勝負したそうにこちらを見ている。`
    : `「${esc(b.name)}」<span class="boss-lv-tag">Lv.${b.lv||"?"}</span>が勝負をしかけてきた。`;
  screen.innerHTML = `
    <div class="card boss-encounter">

      <p class="boss-enc-text">${introText}<br>勝負しますか？</p>

      <div class="boss-enc-choices">
        <button class="boss-enc-btn ${bossPromptSelection==='no'?'selected':''}" onclick="resolveBossPrompt('no')">いいえ</button>
        <button class="boss-enc-btn ${bossPromptSelection==='yes'?'selected':''}" onclick="resolveBossPrompt('yes')">勝負する</button>
      </div>
      <p class="note boss-enc-hint">← → で選び、Enterで決定（そのままEnterで「いいえ」）</p>
    </div>`;
}
function moveBossPromptSelection(dir){
  if(!bossPromptActive) return;
  bossPromptSelection = dir;

}
function resolveBossPrompt(choice){
  if(!bossPromptActive) return;
  bossPromptActive = false;
  if(choice === "yes"){
    startBossBattle(pendingBoss, pendingBossAllGenre);
  }else{
    const fn = bossPromptResumeFn;
    bossPromptResumeFn = null;
    pendingBoss = null;
    pendingBossAllGenre = false;
    if(fn) fn();
  }
}
/* allGenre: 挑戦チケットを使った挑戦のときだけtrue。ランダム遭遇のときは、そのとき解いていた
   ジャンル（quizがなければランダムな1ジャンル）に固定する。 */
function startBossBattle(boss, allGenre){
  const cat = allGenre ? null : ((quiz && quiz.key && CATS[quiz.key]) ? quiz.key : CAT_KEYS[Math.floor(Math.random()*CAT_KEYS.length)]);
  const cats = allGenre ? CAT_KEYS.slice() : null;
  const ps = loadStats().stats || {hp:0,atk:0,def:0,spd:0,luck:0};
  const maxHp = BOSS_PLAYER_HP + ps.hp * STAT_HP_PER_POINT;
  bossBattle = {
    boss, bossHp: boss.hp, bossMaxHp: boss.hp,
    playerHp: maxHp, playerMaxHp: maxHp,
    cat, cats, itemCat:null, item:null, order:null, lastQ:null,
    atkBuffTurns:0, atkBuffAmount:0, defBuffTurns:0, defBuffAmount:0, missGuard:false,
    showItemPanel:false, usedItemThisTurn:false, usedItemNames:{},
  };
  bossNextQuestion();
}
/* ボス戦中に通常アイテムを1つ消費して効果を発動する。問題への回答前に使える
   （消費してもターンは進まない）。制限は2つ：1ターンに使えるのは1個まで、かつ同じ種類の
   アイテムはその戦闘中に1回しか使えない（usedItemNamesはbossNextQuestionでリセットしない
   ＝バトル全体を通しての制限にする）。効果はbossBattle側に持たせ、次の攻撃・防御時に反映する。 */
function useBossItem(name){
  const b = bossBattle;
  if(!b || b._resolving || b.bossHp <= 0 || b.playerHp <= 0 || b.boss.noItems) return;
  if(b.usedItemThisTurn || b.usedItemNames[name]) return;
  const effect = ITEM_EFFECTS[name];
  if(!effect) return;
  const st = loadStats();
  if(!(st.items && st.items[name] > 0)) return;
  st.items[name]--;
  if(st.items[name] <= 0) delete st.items[name];
  saveStats(st);
  let msg = "";
  if(effect.type === "heal"){
    const healed = Math.min(effect.amount, b.playerMaxHp - b.playerHp);
    b.playerHp = Math.min(b.playerMaxHp, b.playerHp + effect.amount);
    msg = healed > 0 ? `${effect.icon} 「${name}」を使った！ HPが${healed}回復した！` : `${effect.icon} 「${name}」を使った！（HPはすでに満タンだった）`;
  }else if(effect.type === "atkBuff"){
    b.atkBuffTurns = effect.turns;
    b.atkBuffAmount = effect.amount;
    msg = `${effect.icon} 「${name}」を使った！ 攻撃力が上がった！（あと${effect.turns}ターン）`;
  }else if(effect.type === "defBuff"){
    b.defBuffTurns = effect.turns;
    b.defBuffAmount = effect.amount;
    msg = `${effect.icon} 「${name}」を使った！ 防御力が上がった！（あと${effect.turns}ターン）`;
  }else if(effect.type === "missGuard"){
    b.missGuard = true;
    msg = `${effect.icon} 「${name}」を使った！ 次に1回だけ、間違えてもダメージを受けなくなった！`;
  }
  b.showItemPanel = false;
  b.usedItemThisTurn = true;
  b.usedItemNames[name] = true;
  b.itemUseMsg = msg;
  renderBossBattle();
}
function toggleBossItemPanel(){
  if(!bossBattle || bossBattle._resolving || bossBattle.usedItemThisTurn || bossBattle.boss.noItems) return;
  bossBattle.showItemPanel = !bossBattle.showItemPanel;
  renderBossBattle();
}
/* ボス戦中に使える（効果が定義されていて、1個以上持っていて、まだその戦闘中に使っていない）
   通常アイテムの一覧 */
function usableBossItems(){
  const st = loadStats();
  const items = st.items || {};
  const used = (bossBattle && bossBattle.usedItemNames) || {};
  return Object.keys(ITEM_EFFECTS).filter(name => (items[name]||0) > 0 && !used[name]);
}
function bossNextQuestion(){
  bossBattle.itemUseMsg = null;
  bossBattle.showItemPanel = false;
  bossBattle.usedItemThisTurn = false;
  if(bossBattle.cats){
    const picked = pickBattleQuestionMulti(bossBattle.cats, bossBattle.lastQ);
    bossBattle.item = picked.item;
    bossBattle.itemCat = picked.cat;
  }else{
    bossBattle.item = pickBattleQuestion(bossBattle.cat, bossBattle.lastQ);
    bossBattle.itemCat = bossBattle.cat;
  }
  bossBattle.lastQ = bossBattle.item.q;
  renderBossBattle();
}

/* ボス戦中の「アイテムを使う」まわりのUI（発動中のバフ表示・使用ボタン・アイテム選択パネル） */

  const b = bossBattle;

function renderBossBattle(){
  const b = bossBattle, it = b.item;
  const isInput = Array.isArray(it.ans);
  let answerArea;
  if(isInput){
    clearChoiceKeys();
    answerArea = `

      ${bossItemBarHtml()}

        <div class="boss-q-text">${esc(it.q)}</div>

  if(isInput){ const el = document.getElementById("ansIn"); if(el) el.focus(); }

function bossAnswerChoice(origIdx){
  bossGrade(origIdx === bossBattle.item.a, origIdx, null);

function bossSubmitInput(){
  const el = document.getElementById("ansIn");
  if(!el || el.disabled) return;
  const val = normalizeAns(el.value);
  if(!val) return;
  const ok = bossBattle.item.ans.map(normalizeAns).includes(val);
  el.disabled = true;
  const sb = document.getElementById("submitBtn");
  if(sb) sb.disabled = true;
  bossGrade(ok, null, el.value);
}
function bossGrade(ok, chosenOrig, typed){
  const b = bossBattle, it = b.item;
  let dealt = 0, crit = false, evaded = false;
  if(ok){
    const ps = loadStats().stats || {hp:0,atk:0,def:0,spd:0,luck:0};
    // 素早さは、ボスの回避率を少し下げる命中率ボーナスも持つ（上限つきなので他ステータスとのバランスは崩れない）
    const accBonus = STAT_SPD_ACC_MAX_BONUS * ps.spd / (ps.spd + STAT_SPD_ACC_HALF_POINT);
    const effEvadePct = b.boss.fixedEvade ? (b.boss.evadePct||0) : Math.max(0, (b.boss.evadePct||0) - accBonus);
    if(Math.random() * 100 < effEvadePct){
      evaded = true;
    }else{
      dealt = randInt(BOSS_PLAYER_DMG[0], BOSS_PLAYER_DMG[1]) + ps.atk * STAT_ATK_PER_POINT + (b.atkBuffTurns > 0 ? b.atkBuffAmount : 0);
      const critChance = 100 * ps.luck / (ps.luck + STAT_LUCK_HALF_POINT);
      if(Math.random() * 100 < critChance){
        crit = true;
        dealt = Math.round(dealt * STAT_CRIT_MULT);
      }
      dealt = Math.max(1, Math.round(dealt * (1 - (b.boss.defPct||0) / 100)));
      b.bossHp = Math.max(0, b.bossHp - dealt);
    }
  }
  refreshBossHpBars();
  if(!Array.isArray(it.ans)){
    const btns = screen.querySelectorAll(".choice");
    btns.forEach((btn,pos)=>{
      const oi = b.order[pos];
      btn.disabled = true;
      if(oi===it.a) btn.classList.add("correct");
      else if(oi===chosenOrig) btn.classList.add("wrong");
      else btn.classList.add("dim");
    });
  }
  const fb = document.getElementById("fb");
  fb.className = "feedback show " + (ok?"ok":"ng");
  let expl;
  if(Array.isArray(it.ans)){
    const wrongMsg = ok ? "" : `正解は「${esc(it.ans.join("」または「"))}」（こたえ：${esc(typed||"")}）`;
    expl = [wrongMsg, it.e ? esc(it.e) : ""].filter(Boolean).join("<br>");
  }else{
    expl = it.e ? esc(it.e) : (ok ? "" : `正解は「${esc(it.c[it.a])}」`);
  }
  const dmgMsg = ok
    ? (evaded
        ? `<span class="lvup-chip">💨${esc(b.boss.name)}に回避された！</span>`
        : `<span class="lvup-chip">${crit ? "💥会心の一撃！ " : ""}${esc(b.boss.name)}に ${dealt} ダメージ！</span>`)
    : "";
  fb.innerHTML = `<div class="verdict">あなたのターン　${ok?"○ 正解！":"× ざんねん…"}${dmgMsg}</div>${expl}`;
  if(b.bossHp <= 0){
    // ボスを倒したときは反撃は発生せず、少し間をおいて自動的に結果画面へ
    bossBattle._resolving = true;
    setTimeout(() => { if(bossBattle && bossBattle._resolving) bossWin(); }, 1300);
    return;
  }
  bossBattle._resolving = true;
  setTimeout(() => { if(bossBattle && bossBattle._resolving) bossCounterAttack(ok); }, 1000);
}
function bossCounterAttack(playerWasCorrect){
  const b = bossBattle;
  if(b.boss.isShiran){
    if(Math.random() < SHIRAN_FLEE_RATE){
      shiranFlee();
      return;
    }
    refreshBossHpBars();
    const fb = document.getElementById("fb");
    fb.innerHTML += `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。シランちゃんは、校歌を熱唱した。しかし、特に何も起こらない。</div>`;
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.style.display = "inline-block";
    nextBtn.textContent = "つぎへ";
    nextBtn.focus();
    return;
  }
  const range = playerWasCorrect ? BOSS_DMG_ON_CORRECT : BOSS_DMG_ON_WRONG;
  const ps = loadStats().stats || {hp:0,atk:0,def:0,spd:0,luck:0};
  const evasionPower = ps.spd * STAT_SPD_EVASION_UNIT;
  const accuracy = b.boss.accuracy || 100;
  const hitChance = accuracy / (accuracy + evasionPower); // 素早さとボスの命中率の綱引き
  let taken = 0, bossCrit = false, playerEvaded = false, guarded = false;
  if(!playerWasCorrect && b.missGuard){
    // ミス回避アイテムの効果：まちがえたターンのダメージを1回だけ完全に防ぐ
    b.missGuard = false;
    guarded = true;
  }else if(Math.random() >= hitChance){
    playerEvaded = true;
  }else{
    let raw = randInt(range[0], range[1]) * (b.boss.atk||1);
    if(Math.random() * 100 < (b.boss.luck||0)){
      bossCrit = true;
      raw *= 1.5;
    }
    const effDef = ps.def + (b.defBuffTurns > 0 ? b.defBuffAmount : 0);
    const defReduction = effDef / (effDef + STAT_DEF_HALF_POINT);
    taken = Math.max(1, Math.round(raw * (1 - defReduction)));
    b.playerHp = Math.max(0, b.playerHp - taken);
  }
  if(b.atkBuffTurns > 0) b.atkBuffTurns--;
  if(b.defBuffTurns > 0) b.defBuffTurns--;
  refreshBossHpBars();
  const fb = document.getElementById("fb");
  fb.innerHTML += guarded
    ? `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。✨ミス回避が発動！ダメージを受けなかった！</div>`
    : playerEvaded
    ? `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。💨あなたはこうげきを回避した！</div>`
    : `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。${bossCrit ? "🔥ボスの会心の一撃！ " : ""}あなたは ${taken} ダメージを受けた。</div>`;
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.style.display = "inline-block";
  nextBtn.textContent = b.playerHp<=0 ? "けっかを見る" : "つぎへ";
  nextBtn.focus();
}
function bossAdvance(){
  const b = bossBattle;
  if(!b || b.bossHp <= 0) return;
  b._resolving = false;
  if(b.playerHp <= 0){ bossLose(); return; }
  bossNextQuestion();
}
function bossWin(){
  const b = bossBattle;
  const st = loadStats();
  st.bossPity[b.boss.id] = (st.bossPity[b.boss.id]||0) + 1;
  let gotTreasure = false;
  if(st.bossPity[b.boss.id] >= BOSS_PITY_MAX){
    gotTreasure = true;
  }else if(Math.random() < BOSS_TREASURE_RATE){
    gotTreasure = true;
  }
  if(gotTreasure) st.bossPity[b.boss.id] = 0;
  st.items[b.boss.item] = (st.items[b.boss.item]||0) + 1;
  if(gotTreasure) st.items[b.boss.treasure] = (st.items[b.boss.treasure]||0) + 1;
  saveStats(st);
  screen.innerHTML = `
    <div class="boss-battle-screen boss-victory">
      <div class="boss-win-burst">✨🎉✨</div>
      <div class="boss-result-title big">勝利！！</div>
      <p class="boss-win-line">「${esc(b.boss.name)}」との戦いに勝利した！</p>
      <p class="boss-win-line">「${esc(b.boss.name)}」は、<span class="drop-item">【${esc(b.boss.item)}】</span>を落とした！</p>
      ${gotTreasure ? `<p class="boss-treasure">✨ さらに、宝具<span class="drop-item treasure-drop">【${esc(b.boss.treasure)}】</span>を手に入れた！ ✨</p>` : ""}
      <div class="btn-row">
        <button class="btn" onclick="endBossBattle()">つづける</button>
        <button class="btn secondary" onclick="endBossBattle(); showItemCollection();">アイテム一覧を見る</button>
      </div>
    </div>`;
}
function bossLose(){
  const b = bossBattle;
  screen.innerHTML = `
    <div class="boss-battle-screen">
      <div class="boss-result-title lose">力つきた…</div>
      <p>「${esc(b.boss.name)}」に敗れてしまった。またいどんでみよう。</p>

/* 挑戦チケットを使ってのボス挑戦：消費前に必ず警告を出す */
function showTicketConfirm(){
  const st = loadStats();
  if((st.bossTickets||0) <= 0){ showHome(); return; }
  const pts = totalEarnedStatPoints(st);
  const candidates = ticketEligibleBosses(pts);
  const names = candidates.map(b => b.name.match(/【(.+)】/)?.[1] || b.name).join("・");
  screen.innerHTML = `
    <div class="card boss-encounter">
      <div class="boss-enc-icon">🎟️</div>
      <p class="boss-enc-text">挑戦チケットを1枚使って、ランダムなボスに挑戦しますか？<br><b>挑戦すると、チケットを1枚消費します。</b></p>
      <p class="note boss-enc-hint">🌐 挑戦チケットを使った対戦は、全ジャンルからランダムに出題されます（ふだんのランダム遭遇では、そのとき解いていたジャンルのまま出題されます）。</p>
      <p class="note boss-enc-hint">🎯 出現するのは、今の経験値（${pts}pt）で適正経験値以下のボスだけです。今回の候補：${esc(names)}</p>
      <div class="boss-enc-choices">
        <button class="boss-enc-btn" onclick="showHome()">やめる</button>
        <button class="boss-enc-btn selected" onclick="useTicketAndFight()">チケットを1枚使って挑戦する</button>
      </div>
    </div>`;
}
/* 挑戦チケットで出るボスは、適正経験値が「今の経験値（＝分野レベル合計。すでに使った分もふくむ）」
   以下のものだけに限定する（ただし経験値50以下のときも、適正経験値50の2体
   だけは選べるように、しきい値の下限を50に固定する）。
   ランダム遭遇は対象外で、従来どおり全ボスから出現する。 */
function ticketEligibleBosses(earnedPts){
  const threshold = Math.max(earnedPts||0, 50);
  return BOSSES.filter(b => (b.recPts||0) <= threshold);
}
function useTicketAndFight(){
  const st = loadStats();
  if((st.bossTickets||0) <= 0){ showHome(); return; }
  st.bossTickets -= 1;
  saveStats(st);
  const candidates = ticketEligibleBosses(totalEarnedStatPoints(st));
  const boss = candidates[Math.floor(Math.random() * candidates.length)];
  // どのボスが出たかを見せてから、あらためて「勝負する」を選んでもらう（renderBossPromptを共用）
  pendingBoss = boss;
  pendingBossAllGenre = true;
  bossPromptResumeFn = () => showHome();
  bossPromptActive = true;
  bossPromptSelection = "no";
  renderBossPrompt();
}
function isTreasureItem(name){ return TREASURE_NAMES.has(name); }
function itemListHtml(keys, items){
  return `<ul class="item-list">` + keys.map(name =>
    `<li><span>${esc(name)}</span><span class="item-count">×${items[name]}</span></li>`
  ).join("") + `</ul>`;
}
function showItemCollection(){
  const st = loadStats();
  const items = st.items || {};
  const allKeys = Object.keys(items);
  const normalKeys = allKeys.filter(name => !isTreasureItem(name)).sort((a,b)=> items[b]-items[a]);
  const treasureKeys = allKeys.filter(name => isTreasureItem(name)).sort((a,b)=> items[b]-items[a]);
  let html = `<div class="card"><h3 class="section">🎒 これまで獲得したアイテム</h3>`;
  if(allKeys.length === 0){
    html += `<p class="note">まだ何も手に入れていません。問題に取り組んでいると、ごくまれにボスが勝負をしかけてくることがあります。勝つとアイテムがもらえます。</p>`;
  }else{
    html += `<h4 class="item-group-title">📦 通常アイテム</h4>`;
    html += normalKeys.length ? itemListHtml(normalKeys, items) : `<p class="note">まだありません。</p>`;
    html += `<h4 class="item-group-title treasure-title">✨ 伝説の宝具</h4>`;
    html += treasureKeys.length
      ? `<ul class="item-list treasure-list">` + treasureKeys.map(name =>
          `<li class="treasure"><span>✨ ${esc(name)}</span><span class="item-count">×${items[name]}</span></li>`
        ).join("") + `</ul>`
      : `<p class="note">まだ手に入れていません。ボスに勝つと、まれに手に入ります。</p>`;
  }
  html += `<button class="btn secondary" onclick="showHome()">ホームへ</button></div>`;

/* ================= 成績・称号 ================= */
function showStats(){
  const st = loadStats();
  const rows = CAT_KEYS.map(k => [k, CATS[k].name]).concat([["dokkai","読解"]]);
  let weakest = null;
  let html = `<div class="card"><h3 class="section">成績（累計）</h3><table class="stats">
    <tr><th>分野</th><th>称号</th><th style="text-align:right">Lv</th><th style="text-align:right">解いた数</th><th style="text-align:right">正解</th><th style="width:26%">正答率</th></tr>`;
  rows.forEach(([k,label])=>{
    const s = st.cats[k] || {t:0,c:0};
    const rate = s.t ? s.c/s.t : null;
    if(k!=="dokkai" && rate!==null && s.t>=4 && (weakest===null || rate<weakest.rate)) weakest = {label, rate};
    const t = titleOf(st.lv[k]);
    html += `<tr>
      <td>${esc(label)}</td>
      <td>${t.icon}${esc(t.name)}</td>
      <td class="num">${st.lv[k]}</td>
      <td class="num">${s.t}</td>
      <td class="num">${s.c}</td>
      <td>${rate===null ? "<span style='color:var(--sub)'>未挑戦</span>"
          : `${Math.round(rate*100)}%<div class="bar"><div style="width:${rate*100}%"></div></div>`}</td>
    </tr>`;
  });
  html += `</table>`;
  let mastered=0, learning=0, unseen=0, totalQ=0;
  CAT_KEYS.forEach(cat=>{
    CATS[cat].items.forEach(it=>{
      totalQ++;
      const s = qStat(st, cat, it);
      if(!s || s.t===0) unseen++;
      else if(s.t>=2 && s.c===s.t) mastered++;
      else learning++;
    });
  });
  html += `<div class="mastery">
    <span>✅ 習得ずみ <b>${mastered}</b>問</span>
    <span>📖 練習中 <b>${learning}</b>問</span>
    <span>🆕 未挑戦 <b>${unseen}</b>問</span>
    <span>（知識問題 全${totalQ}問）</span>
  </div>`;
  if(weakest && weakest.rate < 0.8){
    html += `<p class="note weak">▶ 今いちばんのばせそうなのは「${esc(weakest.label)}」。集中して取り組んでみよう。</p>`;
  }
  html += `</div>`;
  html += `<div class="card"><h3 class="section">🎓 今の学年の目安</h3>
    <p class="note">正解・不正解に応じて自動調整される出題の難しさをもとに、今どのくらいの学年の内容にちょうどよく取り組めているかの<b>目安</b>を、分野ごとに表示します。</p>
    <table class="stats"><tr><th>分野</th><th>学年の目安</th></tr>`;
  const gradeEstimates = [];
  CAT_KEYS.forEach(cat=>{
    const g = estimateGrade(cat, st.diffLv[cat]||1);
    if(g === null) return;
    gradeEstimates.push(g);
    html += `<tr><td>${esc(CATS[cat].name)}</td><td>${esc(GRADE_LABELS[g])}</td></tr>`;
  });
  html += `</table>`;
  if(gradeEstimates.length){
    const overall = Math.min(6, Math.max(1, Math.round(gradeEstimates.reduce((s,g)=>s+g,0) / gradeEstimates.length)));
    html += `<p class="note">▶ 全体の目安：<b>${esc(GRADE_LABELS[overall])}</b>くらい</p>`;
  }
  html += `</div>`;
  html += `<div class="card"><h3 class="section">称号のみちのり（分野ごと）</h3><ul class="titlelist">`;
  TITLES.filter(x=>!x.hidden).forEach(x=>{
    html += `<li>${x.icon} Lv.${x.lv}〜　${esc(x.name)}</li>`;
  });
  html += `</ul>`;
  const hidden = TITLES.filter(x=>x.hidden);
  const maxReached = Math.max(...Object.values(st.lv));
  const revealed = hidden.filter(x=>maxReached >= x.lv);
  html += `<p class="note">⚡ Lv.1000から先には、100レベルごとに<b>かくされた称号</b>が待っている（全${hidden.length}個）。到達したとき、はじめて正体が明かされる…！</p>`;
  if(revealed.length){
    html += `<p class="note">これまでに明かした称号：</p><ul class="titlelist">`;
    revealed.forEach(x=>{ html += `<li>${x.icon} Lv.${x.lv}〜　${esc(x.name)}</li>`; });
    html += `</ul>`;
  }
  const nextHidden = hidden.find(x=>maxReached < x.lv);
  if(nextHidden){
    html += `<p class="note">❓ 次のかくし称号：Lv.${nextHidden.lv}〜　？？？</p>`;
  }
  html += `</div>`;
  const misses = Object.values(st.q)
    .filter(s => s.cat !== "dokkai" && s.t > 0 && s.c < s.t)
    .sort((a,b) => (a.c/a.t) - (b.c/b.t))
    .slice(0,5);
  if(misses.length){
    html += `<div class="card"><h3 class="section">よく間違える問題</h3><ul class="misslist">`;
    misses.forEach(s=>{
      html += `<li><span>${esc(s.q)}</span>
        <span class="cat">${esc(CATS[s.cat] ? CATS[s.cat].name : s.cat)}　${s.c}/${s.t}回正解</span></li>`;
    });
    html += `</ul>
      <button class="btn" onclick="startReview()">この問題たちを復習する</button></div>`;
  }
  html += `<div class="card"><h3 class="section">きろくの保存・引きつぎ</h3>
    <p style="font-size:.88rem">記録は自動でこのブラウザに保存され、再読み込みしても消えません。
    ただし<b>別のパソコンやタブレット、別のブラウザには引き継がれません</b>。
    大事な記録は「書き出す」でファイルに保存しておくと、いつでも元にもどせます。</p>
    <div class="btn-row">
      <button class="btn" onclick="exportData()">💾 記録を書き出す（保存）</button>
      <button class="btn secondary" onclick="document.getElementById('importFile').click()">📂 記録を読み込む（復元）</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importData(this)">
    </div></div>`;
  html += `<div class="btn-row" style="margin-top:4px">
      <button class="btn secondary" onclick="resetStats()">記録をリセット</button>
      <button class="btn" onclick="showHome()">ホームへ</button>
    </div>
    <p class="note">※ 記録（レベル・称号・正誤）は自動保存です。端末をかえるときは上の「書き出す→読み込む」で引きつぎできます。</p>`;
  screen.innerHTML = html;
}
function resetStats(){
  const pw = prompt("記録をリセットするには、パスワードを入力してください。");
  if(pw === null) return;
  if(pw !== "kichi1205"){ alert("パスワードが違います。"); return; }
  if(!confirm("本当にすべての記録（レベル・称号・正誤）を消しますか？")) return;
  saveStats(emptyStats());
  showStats();
}

/* ================= 記録の保存・引きつぎ ================= */
function exportData(){
  const st = loadStats();
  const payload = {app:"kokugoTraining", ver:5, savedAt:new Date().toISOString(), data:st};
  const blob = new Blob([JSON.stringify(payload)], {type:"application/json"});
  const a = document.createElement("a");
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  a.href = URL.createObjectURL(blob);
  a.download = `知識ドリルDX記録_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const payload = JSON.parse(reader.result);
      const st = payload && payload.app === "kokugoTraining" ? payload.data : payload;
      if(!st || !st.cats || !st.q || !st.lv) throw new Error("形式ちがい");
      if(isSaveFromNewerVersion(st)){
        alert("このファイルは、これより新しいバージョンの「知識ドリルDX」で保存されたものです。\nこのページ（古いバージョン）では読み込めません。最新版のページで開き直してください。");
        return;
      }
      const saved = payload && payload.savedAt ? new Date(payload.savedAt) : null;
      const dateStr = saved && !isNaN(saved) ? `${saved.getFullYear()}年${saved.getMonth()+1}月${saved.getDate()}日 ${String(saved.getHours()).padStart(2,"0")}:${String(saved.getMinutes()).padStart(2,"0")}` : "不明";
      const xp = kotonohaTotalXP(st);
      const confirmMsg = `このファイルの記録を読み込みます。\n\n保存日時：${dateStr}\nことのはの経験値：${xp}\n\nこの内容でよろしければ「OK」を押してください。今のブラウザの記録は上書きされます。`;
      if(!confirm(confirmMsg)) return;
      saveStats(st);
      alert("記録を読み込みました！");
      showStats();
    }catch(e){
      alert("このファイルは読み込めませんでした。「記録を書き出す」で保存したファイルを選んでください。");
    }
  };
  reader.readAsText(file);
}

/* ================= オープニング演出（プロローグ） =================
   このアプリを開いたとき（＝ブラウザで最初から読み込まれたとき）に必ず一度だけ再生する、
   短い全画面演出。アプリ内の画面遷移はページの読み込み直しをともなわないため、
   「初回起動時」も「ブラウザの更新時」も、この起動シーケンスが実行されるタイミングと一致する。
   しつこくならないよう、セリフは短く・少なくしてある。 */
const PROLOGUE_STEPS = [
  {text:"言葉が力を失いつつある時代"},
  {text:"見つけた。\n\n\n僕を育ててくれる人。"},
  {icon:"🥚", text:"ぼくは、【ことのは】。\n\n\n君の言葉の力とともに\nぼくも育つ。"},
  {text:"さあ、ともに成長しよう"},
];
let prologueIdx = 0;
let prologueOnDone = null;
let prologueEl = null;
function showPrologue(onDone){
  prologueIdx = 0;
  prologueOnDone = onDone;
  prologueEl = document.createElement("div");
  document.body.appendChild(prologueEl);
  renderPrologueStep();
}
function renderPrologueStep(){
  const step = PROLOGUE_STEPS[prologueIdx];
  const isLast = prologueIdx === PROLOGUE_STEPS.length - 1;
  prologueEl.className = "prologue-overlay";
  prologueEl.onclick = advancePrologue;
  prologueEl.innerHTML = `
    ${step.icon ? `<div class="prologue-icon">${step.icon}</div>` : ""}
    <p class="prologue-text">${step.text}</p>
    <span class="prologue-skip" onclick="event.stopPropagation(); finishPrologue();">スキップ</span>
    <p class="prologue-hint">${isLast ? "タップしてはじめる" : "タップしてすすむ"}</p>`;
}
function advancePrologue(){
  prologueIdx++;
  if(prologueIdx >= PROLOGUE_STEPS.length){ finishPrologue(); return; }
  renderPrologueStep();
}
function finishPrologue(){
  if(prologueEl){ prologueEl.remove(); prologueEl = null; }
  const fn = prologueOnDone; prologueOnDone = null;
  if(fn) fn();
}

/* 起動時ガード：保存されている記録が、今開いているコードより新しいverで作られていたら、
   通常の起動（showPrologue/showHomeなど）を一切行わない。ここでアプリの初期化を止めることで、
   その後どこからもsaveStats()が呼ばれず、新しい記録が古い形式で上書きされる事故を防ぐ。 */
function bootApp(){
  let savedTooNew = false;
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) savedTooNew = isSaveFromNewerVersion(JSON.parse(raw));
  }catch(e){}
  if(savedTooNew){
    document.body.innerHTML = `
      <div style="max-width:480px;margin:60px auto;padding:24px;text-align:center;font-family:inherit;">
        <div style="font-size:2.4rem;margin-bottom:12px;">⚠️</div>
        <h2 style="margin-bottom:14px;">このページは古いバージョンです</h2>
        <p style="line-height:1.7;">保存されている記録は、これより新しいバージョンの「知識ドリルDX」で作られたものです。<br>
        このままだと記録が正しく読み込めないため、起動を停止しました。<br><br>
        最新版のページを開き直してください。</p>
      </div>`;
    return;
  }
  showPrologue(showHome);
}
bootApp();
</script>
