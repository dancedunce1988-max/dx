/* allGenre: 挑戦チケットを使った挑戦のときだけtrue。ランダム遭遇のときは、そのとき解いていた
   ジャンル（quizがなければランダムな1ジャンル）に固定する。
   「まだ習っていない」でONにした分野は、ジャンルが自動選択される場合（挑戦チケットの全ジャンル、
   ランダム遭遇でquiz.keyが未確定なときのランダム選択）の対象から除外する。ただしquiz.keyが
   その分野そのもの（生徒が直接その分野のクイズを選んで解いている最中）のときは、今までどおり
   その分野のままボスと戦う（生徒自身の直接の選択までは妨げない）。 */
function startBossBattle(boss, allGenre){
  const st0 = loadStats();
  const genrePool = filterNotLearned(CAT_KEYS, st0);
  const cat = allGenre ? null : ((quiz && quiz.key && CATS[quiz.key]) ? quiz.key : genrePool[Math.floor(Math.random()*genrePool.length)]);
  const cats = allGenre ? genrePool.slice() : null;
  const ps = st0.stats || {hp:0,atk:0,def:0,spd:0,luck:0};
  const maxHp = BOSS_PLAYER_HP + ps.hp * STAT_HP_PER_POINT;
  bossBattle = {
    boss, bossHp: boss.hp, bossMaxHp: boss.hp,
    playerHp: maxHp, playerMaxHp: maxHp,
    cat, cats, itemCat:null, item:null, order:null, lastQ:null,
    atkBuffTurns:0, atkBuffAmount:0, defBuffTurns:0, defBuffAmount:0, luckBuffTurns:0, luckBuffAmount:0, missGuard:false,
    atkMultTurns:0, atkMultAmount:1,
    showItemPanel:false, usedItemThisTurn:false, usedItemNames:{}, timerId:null,
    correctStreak:0,
  };
  bossNextQuestion();
}
/* ボス戦中に通常アイテムを1つ消費して効果を発動する。問題への回答前に使える
   （消費してもターンは進まない）。制限は2つ：1ターンに使えるのは1個まで、かつ同じ種類の
   アイテムはその戦闘中に1回しか使えない（usedItemNamesはbossNextQuestionでリセットしない
   ＝バトル全体を通しての制限にする）。効果はbossBattle側に持たせ、次の攻撃・防御時に反映する。 */
function useBossItem(name){
  const b = bossBattle;
  if(!b || b._resolving || b.bossHp <= 0 || b.playerHp <= 0 || b.boss.noItems) return;
  if(b.usedItemThisTurn || b.usedItemNames[name]) return;
  const effect = ITEM_EFFECTS[name];
  if(!effect) return;
  const st = loadStats();
  if(!(st.items && st.items[name] > 0)) return;
  st.items[name]--;
  if(st.items[name] <= 0) delete st.items[name];
  saveStats(st);
  let msg = "";
  if(effect.type === "heal"){
    const healed = Math.min(effect.amount, b.playerMaxHp - b.playerHp);
    b.playerHp = Math.min(b.playerMaxHp, b.playerHp + effect.amount);
    msg = healed > 0 ? `${effect.icon} 「${name}」を使った！ HPが${healed}回復した！` : `${effect.icon} 「${name}」を使った！（HPはすでに満タンだった）`;
  }else if(effect.type === "atkBuff"){
    b.atkBuffTurns = effect.turns;
    b.atkBuffAmount = effect.amount;
    msg = `${effect.icon} 「${name}」を使った！ 攻撃力が上がった！（あと${effect.turns}ターン）`;
  }else if(effect.type === "defBuff"){
    b.defBuffTurns = effect.turns;
    b.defBuffAmount = effect.amount;
    msg = `${effect.icon} 「${name}」を使った！ 防御力が上がった！（あと${effect.turns}ターン）`;
  }else if(effect.type === "luckBuff"){
    b.luckBuffTurns = effect.turns;
    b.luckBuffAmount = effect.amount;
    msg = `${effect.icon} 「${name}」を使った！ 運が上がった！（あと${effect.turns}ターン）`;
  }else if(effect.type === "missGuard"){
    b.missGuard = true;
    msg = `${effect.icon} 「${name}」を使った！ 次に1回だけ、間違えてもダメージを受けなくなった！`;
  }else if(effect.type === "hpHalve"){
    const before = b.bossHp;
    b.bossHp = Math.max(1, Math.floor(b.bossHp / 2));
    msg = `${effect.icon} 「${name}」を使った！ ${esc(b.boss.name)}のHPが半分になった！（${before} → ${b.bossHp}）`;
  }else if(effect.type === "hpCut99"){
    const before = b.bossHp;
    b.bossHp = Math.max(1, Math.floor(b.bossHp * 0.01));
    msg = `${effect.icon} 「${name}」を使った！ ${esc(b.boss.name)}のHPが99%減った！（${before} → ${b.bossHp}）`;
  }else if(effect.type === "healPct"){
    const healAmt = Math.max(1, Math.round(b.playerMaxHp * effect.amount));
    const healed = Math.min(healAmt, b.playerMaxHp - b.playerHp);
    b.playerHp = Math.min(b.playerMaxHp, b.playerHp + healAmt);
    msg = healed > 0 ? `${effect.icon} 「${name}」を使った！ HPが${healed}回復した！` : `${effect.icon} 「${name}」を使った！（HPはすでに満タンだった）`;
  }else if(effect.type === "atkMultBuff"){
    b.atkMultTurns = effect.turns;
    b.atkMultAmount = effect.mult;
    msg = `${effect.icon} 「${name}」を使った！ 次のターン、攻撃力が${effect.mult}倍になる！`;
  }
  b.showItemPanel = false;
  b.usedItemThisTurn = true;
  b.usedItemNames[name] = true;
  b.itemUseMsg = msg;
  renderBossBattle();
  startBossTimer(BOSS_ITEM_USE_TIMER_MS);
}
function toggleBossItemPanel(){
  if(!bossBattle || bossBattle._resolving || bossBattle.usedItemThisTurn || bossBattle.boss.noItems) return;
  bossBattle.showItemPanel = !bossBattle.showItemPanel;
  renderBossBattle();
}
/* ボス戦中に使える（効果が定義されていて、1個以上持っていて、まだその戦闘中に使っていない）
   通常アイテムの一覧 */
function usableBossItems(){
  const st = loadStats();
  const items = st.items || {};
  const used = (bossBattle && bossBattle.usedItemNames) || {};

function bossNextQuestion(){
  bossBattle.itemUseMsg = null;

    bossBattle.item = picked.item;
    bossBattle.itemCat = picked.cat;
  }else{
    bossBattle.item = pickBattleQuestion(bossBattle.cat, bossBattle.lastQ);

/* ボス戦の1問あたりの制限時間（2026-07-15〜）。アイテムを使った瞬間、そこから改めて
   BOSS_ITEM_USE_TIMER_MS(10秒)の制限時間に切り替わる（useBossItem内でstartBossTimerを
   呼び直す、2026-07-17〜）。renderBossBattleがDOMを丸ごと作り直すため、useBossItem側で
   明示的にタイマーを再スタートしないと、見た目のバーだけ残り時間なしに固まってしまう
   （実際のsetTimeoutは元の締切のまま動き続けるため、機能上の制限時間自体が消えるわけでは
   ないが、ユーザーには「制限時間が解除された」ように見えていた）。
   時間切れは不正解として扱う（bossTimeUp→bossGrade(false,...,true)）。
   答えた場合はbossGrade冒頭のclearBossTimer()でこのタイマーを止めるので、二重採点は起きない。
   適正経験値がBOSS_TIMER_MIN_RECPTS(501)以下のボス（旧6体・シランちゃん）は対象外
   （bossHasTimeLimitがfalseを返すので、タイマーを張らず、バーもrenderBossBattle側で表示しない）。 */
function startBossTimer(overrideMs){
  clearBossTimer();
  if(!bossHasTimeLimit(bossBattle.boss)) return;
  const battle = bossBattle;
  const ms = overrideMs || bossAnswerTimeMs(battle.boss);
  battle.timerId = setTimeout(() => {
    if(bossBattle !== battle || battle._resolving) return;
    bossTimeUp();
  }, ms);
  animateBossTimerBar(ms);
}
function clearBossTimer(){
  if(bossBattle && bossBattle.timerId){
    clearTimeout(bossBattle.timerId);
    bossBattle.timerId = null;
  }
}
function bossTimeUp(){
  if(!bossBattle || bossBattle._resolving) return;
  const it = bossBattle.item;
  if(Array.isArray(it.ans)){
    const el = document.getElementById("ansIn");
    if(el) el.disabled = true;
    const sb = document.getElementById("submitBtn");
    if(sb) sb.disabled = true;
  }
  bossGrade(false, null, null, true);
}
/* 残り時間バーをCSSトランジションだけで動かす（setIntervalで毎秒描画し直す必要がない）。
   幅100%→transition:noneで即セット→次のフレームでtransitionを付けて幅0%に変えることで、
   ブラウザに「100%から0%への変化」を検知させ、10秒かけて滑らかに縮む見た目にする。 */
function animateBossTimerBar(overrideMs){
  const el = document.getElementById("bossTimerFill");
  if(!el) return;
  const ms = overrideMs || bossAnswerTimeMs(bossBattle.boss);
  el.style.transition = "none";
  el.style.width = "100%";
  if(typeof requestAnimationFrame !== "function") return;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transition = `width ${ms}ms linear`;
      el.style.width = "0%";
    });
  });
}
/* 回答が確定したら、バーが裏で動き続けているように見えないよう非表示にする
   （次の問題でrenderBossBattleが作り直すので、次に出るときは自然に復活する）。 */

function bossGrade(ok, chosenOrig, typed, timedOut){
  clearBossTimer();
  stopBossTimerBar();
  const b = bossBattle, it = b.item;
  let dealt = 0, crit = false, evaded = false, fled = false;
  if(ok){
    b.correctStreak = (b.correctStreak||0) + 1;
    if(b.boss.statIgnore){
      // ステータス無視のボス：回避・会心・防御%の判定を一切行わず、bossMaxHpに対する
      // 固定%レンジ（playerHitMin〜playerHitMax）のランダムダメージを必ず与える。
      const pct = b.boss.playerHitMin + Math.random() * (b.boss.playerHitMax - b.boss.playerHitMin);
      dealt = Math.max(1, Math.round(b.bossMaxHp * pct));
      b.bossHp = Math.max(0, b.bossHp - dealt);
    }else{
      const ps = loadStats().stats || {hp:0,atk:0,def:0,spd:0,luck:0};
      // 素早さは、ボスの回避率を少し下げる命中率ボーナスも持つ（上限つきなので他ステータスとのバランスは崩れない）
      const accBonus = STAT_SPD_ACC_MAX_BONUS * ps.spd / (ps.spd + STAT_SPD_ACC_HALF_POINT);
      const effEvadePct = b.boss.fixedEvade ? (b.boss.evadePct||0) : Math.max(0, (b.boss.evadePct||0) - accBonus);
      if(Math.random() * 100 < effEvadePct){
        evaded = true;
      }else if(b.boss.isShiran && Math.random() < SHIRAN_FLEE_RATE){
        // シランちゃんは、攻撃が命中する寸前でも一定確率で逃げ出す（正解でも不正解でも「逃げる可能性」を持たせるため）
        fled = true;
      }else{
        dealt = randInt(BOSS_PLAYER_DMG[0], BOSS_PLAYER_DMG[1]) + ps.atk * STAT_ATK_PER_POINT + (b.atkBuffTurns > 0 ? b.atkBuffAmount : 0);
        // さびついたノコギリ等の「次のターンだけ攻撃力n倍」効果（攻撃力依存の倍率、既存の加算式atkBuffとは別枠）
        if(b.atkMultTurns > 0) dealt = Math.round(dealt * b.atkMultAmount);
        const effLuck = ps.luck + (b.luckBuffTurns > 0 ? b.luckBuffAmount : 0);
        const critChance = 100 * effLuck / (effLuck + STAT_LUCK_HALF_POINT);
        if(Math.random() * 100 < critChance){
          crit = true;
          dealt = Math.round(dealt * STAT_CRIT_MULT);
        }
        dealt = Math.max(1, Math.round(dealt * (1 - (b.boss.defPct||0) / 100)));
        b.bossHp = Math.max(0, b.bossHp - dealt);
      }
    }
  }
  refreshBossHpBars();
  if(!Array.isArray(it.ans)){
    const btns = screen.querySelectorAll(".choice");
    btns.forEach((btn,pos)=>{
      const oi = b.order[pos];
      btn.disabled = true;
      if(oi===it.a) btn.classList.add("correct");
      else if(oi===chosenOrig) btn.classList.add("wrong");
      else btn.classList.add("dim");
    });
  }
  const fb = document.getElementById("fb");
  fb.className = "feedback show " + (ok?"ok":"ng");
  let expl;
  if(Array.isArray(it.ans)){
    const wrongMsg = ok ? "" : `正解は「${esc(it.ans.join("」または「"))}」（こたえ：${esc(typed||"")}）`;
    expl = [wrongMsg, it.e ? esc(it.e) : ""].filter(Boolean).join("<br>");
  }else{
    expl = it.e ? esc(it.e) : (ok ? "" : `正解は「${esc(it.c[it.a])}」`);
  }
  const dmgMsg = ok
    ? (fled
        ? `<span class="lvup-chip">😲すんでのところで${esc(b.boss.name)}に逃げられた！</span>`
        : evaded
        ? `<span class="lvup-chip">💨${esc(b.boss.name)}に回避された！</span>`
        : `<span class="lvup-chip">${crit ? "💥会心の一撃！ " : ""}${esc(b.boss.name)}に ${dealt} ダメージ！</span>`)
    : "";
  const streakMsg = (ok && b.boss.streakToWin) ? `<span class="lvup-chip">🔥連続正解 ${b.correctStreak} / ${b.boss.streakToWin}</span>` : "";
  fb.innerHTML = `<div class="verdict">あなたのターン　${ok?"○ 正解！":(timedOut?"⏰ 時間切れ…":"× ざんねん…")}${dmgMsg}${streakMsg}</div>${expl}`;
  if(fled){
    // 命中する寸前で逃げられたときは反撃も発生せず、少し間をおいて逃走の結果画面へ
    bossBattle._resolving = true;
    setTimeout(() => { if(bossBattle && bossBattle._resolving) shiranFlee(); }, 1300);
    return;
  }
  if(b.bossHp <= 0 || (ok && b.boss.streakToWin && b.correctStreak >= b.boss.streakToWin)){
    // ボスを倒した（HPが尽きた、または目標連続正解数に達した）ときは反撃は発生せず、
    // 少し間をおいて自動的に結果画面へ（この2つの勝利条件は並列。どちらが先に成立してもよい）
    bossBattle._resolving = true;
    setTimeout(() => { if(bossBattle && bossBattle._resolving) bossWin(); }, 1300);
    return;
  }
  if(b.boss.instantLoseOnWrong && !ok){
    // 反撃をしないボス（国語の神）は、間違えた瞬間にそのままプレイヤーのHPが尽きて敗北する
    b.playerHp = 0;
    refreshBossHpBars();
    fb.innerHTML += `<div class="boss-turn">😇 ${esc(b.boss.name)}は、動かない。</div>`;
    bossBattle._resolving = true;
    setTimeout(() => { if(bossBattle && bossBattle._resolving) bossLose(); }, 1300);
    return;
  }
  if(b.boss.instantLoseOnWrong && ok){
    // 反撃をしないボスは、正解しても（目標連続正解数に届かない限り）反撃を挟まずそのまま次の問題へ
    fb.innerHTML += `<div class="boss-turn">😇 ${esc(b.boss.name)}は、動かない。</div>`;
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.style.display = "inline-block";
    nextBtn.textContent = "つぎへ";
    nextBtn.focus();
    return;
  }
  bossBattle._resolving = true;
  setTimeout(() => { if(bossBattle && bossBattle._resolving) bossCounterAttack(ok); }, 1000);
}
function bossCounterAttack(playerWasCorrect){
  const b = bossBattle;
  if(b.boss.isShiran){
    if(Math.random() < SHIRAN_FLEE_RATE){
      shiranFlee();
      return;
    }
    refreshBossHpBars();
    const fb = document.getElementById("fb");
    fb.innerHTML += `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。シランちゃんは、校歌を熱唱した。しかし、特に何も起こらない。</div>`;
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.style.display = "inline-block";
    nextBtn.textContent = "つぎへ";
    nextBtn.focus();
    return;
  }
  if(b.boss.statIgnore){
    // ステータス無視のボス：命中判定・ミス回避アイテム・防御力を一切考慮せず、playerMaxHpに対する
    // 固定%レンジ（正解時counterOk〜、不正解時counterNg〜）のランダムダメージを必ず与える。
    const min = playerWasCorrect ? b.boss.counterOkMin : b.boss.counterNgMin;
    const max = playerWasCorrect ? b.boss.counterOkMax : b.boss.counterNgMax;
    const pct = min + Math.random() * (max - min);
    const taken = Math.max(1, Math.round(b.playerMaxHp * pct));
    b.playerHp = Math.max(0, b.playerHp - taken);
    refreshBossHpBars();
    const fb = document.getElementById("fb");
    fb.innerHTML += `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。あなたは ${taken} ダメージを受けた。</div>`;
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.style.display = "inline-block";
    nextBtn.textContent = b.playerHp<=0 ? "けっかを見る" : "つぎへ";
    nextBtn.focus();
    return;
  }
  const range = playerWasCorrect ? BOSS_DMG_ON_CORRECT : BOSS_DMG_ON_WRONG;
  const ps = loadStats().stats || {hp:0,atk:0,def:0,spd:0,luck:0};
  const evasionPower = ps.spd * STAT_SPD_EVASION_UNIT;
  const accuracy = b.boss.accuracy || 100;
  const hitChance = accuracy / (accuracy + evasionPower); // 素早さとボスの命中率の綱引き
  let taken = 0, bossCrit = false, playerEvaded = false, guarded = false;
  if(!playerWasCorrect && b.missGuard){
    // ミス回避アイテムの効果：まちがえたターンのダメージを1回だけ完全に防ぐ
    b.missGuard = false;
    guarded = true;
  }else if(Math.random() >= hitChance){
    playerEvaded = true;
  }else{
    let raw = randInt(range[0], range[1]) * (b.boss.atk||1);
    if(Math.random() * 100 < (b.boss.luck||0)){
      bossCrit = true;
      raw *= 1.5;
    }
    const effDef = ps.def + (b.defBuffTurns > 0 ? b.defBuffAmount : 0);
    const defReduction = effDef / (effDef + STAT_DEF_HALF_POINT);
    taken = Math.max(1, Math.round(raw * (1 - defReduction)));
    b.playerHp = Math.max(0, b.playerHp - taken);
  }
  if(b.atkBuffTurns > 0) b.atkBuffTurns--;
  if(b.defBuffTurns > 0) b.defBuffTurns--;
  if(b.luckBuffTurns > 0) b.luckBuffTurns--;
  if(b.atkMultTurns > 0) b.atkMultTurns--;
  refreshBossHpBars();
  const fb = document.getElementById("fb");
  fb.innerHTML += guarded
    ? `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。✨ミス回避が発動！ダメージを受けなかった！</div>`
    : playerEvaded
    ? `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。💨あなたはこうげきを回避した！</div>`
    : `<div class="boss-turn">👹 ${esc(b.boss.name)}のターン。${bossCrit ? "🔥ボスの会心の一撃！ " : ""}あなたは ${taken} ダメージを受けた。</div>`;
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.style.display = "inline-block";
  nextBtn.textContent = b.playerHp<=0 ? "けっかを見る" : "つぎへ";
  nextBtn.focus();
}
function bossAdvance(){
  const b = bossBattle;
  if(!b || b.bossHp <= 0) return;
  b._resolving = false;
  if(b.playerHp <= 0){ bossLose(); return; }
  bossNextQuestion();
}
function bossWin(){
  const b = bossBattle;
  const st = loadStats();
  /* dropAccuracyThresholdを持つボスは、直近30回の正答率（分野をまたぐrecentAccAll、挑戦チケットでの
     撃破も区別しない）に応じてアイテムのドロップ確率がグラデーションで変わる（bossItemDropChance参照、
     2026-07-17〜）。持たないボス（旧6体・シランちゃん・国語の神）は今までどおり無条件100%。
     さらにitemDropPity:trueを持つボス（サノー・シゲっち）は、2回連続で落とさなかった次（3回目）を
     確定ドロップにする救済つき（st.bossItemPity）。 */
  const itemPityForced = b.boss.itemDropPity && (st.bossItemPity[b.boss.id]||0) >= BOSS_ITEM_DROP_PITY_MAX;
  const dropsLoot = itemPityForced || Math.random() < bossItemDropChance(b.boss, st);
  if(b.boss.itemDropPity){
    st.bossItemPity[b.boss.id] = dropsLoot ? 0 : (st.bossItemPity[b.boss.id]||0) + 1;
  }
  let gotTreasure = false;
  if(dropsLoot){
    if(b.boss.treasureAccGate){
      /* 国語の神専用：宝具のドロップは、天井（bossPity）や基本確率（BOSS_TREASURE_RATE）とは無関係に、
         「出会った時点」の直近30回正答率（rollBossEncounterでスナップショットしたb.boss._encounterAcc）が
         treasureAccGate(0.8)以上なら100%、それ未満なら0%という単純な二択で決まる。 */
      gotTreasure = typeof b.boss._encounterAcc === "number" && b.boss._encounterAcc >= b.boss.treasureAccGate;
    }else{
      st.bossPity[b.boss.id] = (st.bossPity[b.boss.id]||0) + 1;
      if(treasureDropAllowed(st)){
        if(st.bossPity[b.boss.id] >= BOSS_PITY_MAX){
          gotTreasure = true;
        }else if(Math.random() < BOSS_TREASURE_RATE){
          gotTreasure = true;
        }
      }
      if(gotTreasure) st.bossPity[b.boss.id] = 0;
    }
    st.items[b.boss.item] = (st.items[b.boss.item]||0) + 1;
    if(gotTreasure) st.items[b.boss.treasure] = (st.items[b.boss.treasure]||0) + 1;
  }
  saveStats(st);
  screen.innerHTML = `
    <div class="boss-battle-screen boss-victory">
      <div class="boss-win-burst">✨🎉✨</div>
      <div class="boss-result-title big">勝利！！</div>
      <p class="boss-win-line">「${esc(b.boss.name)}」との戦いに勝利した！</p>
      ${dropsLoot
        ? `<p class="boss-win-line">「${esc(b.boss.name)}」は、<span class="drop-item">【${esc(b.boss.item)}】</span>を落とした！</p>`
        : `<p class="boss-win-line">しかし、アイテムは落とさなかった…</p><p class="note">※正答率が高くなると、アイテムが落ちやすくなります</p>`}
      ${gotTreasure ? `<p class="boss-treasure">✨ さらに、宝具<span class="drop-item treasure-drop">【${esc(b.boss.treasure)}】</span>を手に入れた！ ✨</p>` : ""}
      <div class="btn-row">
        <button class="btn tap-advance-btn" onclick="endBossBattle()">つづける</button>
        <button class="btn secondary" onclick="endBossBattle(); showItemCollection();">アイテム一覧を見る</button>
      </div>
    </div>`;
}

function showTicketConfirm(){

      <p class="note boss-enc-hint">🌐 挑戦チケットを使った対戦は、全ジャンルからランダムに出題されます（ふだんのランダム遭遇では、そのとき解いていたジャンルのまま出題されます）。</p>
      <p class="note boss-enc-hint">🎯 出現するのは、今の経験値（${pts}pt）で適正経験値以下のボスだけです。今回の候補：${esc(names)}</p>
      <div class="boss-enc-choices">

/* 挑戦チケットで出るボスは、適正経験値が「今の経験値（＝分野レベル合計。すでに使った分もふくむ）」
   以下のものだけに限定する（ただし経験値150以下のときも、適正経験値150の2体
   だけは選べるように、しきい値の下限を150に固定する。2026-07-17の経験値カーブ変更にあわせて
   recPtsを全体的に3倍したため、この下限も50→150に追随）。
   ランダム遭遇は対象外で、従来どおり全ボスから出現する。 */
function ticketEligibleBosses(earnedPts){
  const threshold = Math.max(earnedPts||0, 150);
  return BOSSES.filter(b => (b.recPts||0) <= threshold);
}
function useTicketAndFight(){
  const st = loadStats();
  if((st.bossTickets||0) <= 0){ showHome(); return; }
  st.bossTickets -= 1;
  saveStats(st);
  const candidates = ticketEligibleBosses(totalEarnedStatPoints(st));
  const boss = candidates[Math.floor(Math.random() * candidates.length)];
  // どのボスが出たかを見せてから、あらためて「勝負する」を選んでもらう（renderBossPromptを共用）
  pendingBoss = boss;
  pendingBossAllGenre = true;
  bossPromptResumeFn = () => showHome();
  bossPromptActive = true;
  bossPromptSelection = "no";
  renderBossPrompt();
}
function isTreasureItem(name){ return TREASURE_NAMES.has(name); }
function itemListHtml(keys, items){
  return `<ul class="item-list">` + keys.map(name =>
    `<li><span>${esc(name)}</span><span class="item-count">×${items[name]}</span></li>`
  ).join("") + `</ul>`;
}
/* 宝具は、ボス戦とは別に「アイテム一覧」画面からいつでも使える（2026-07-14〜）。使うと1個消費され、
   プレイヤーの経験値（bonusExp、ステータスポイントにも「ことのは」の育成経験値にも反映される）が
   上がる。シランちゃんの宝具だけ特別に効果が大きい。使った宝具は「使用済みの宝具」として別枠に
   記録され、その分はもう使えない（消費した個数だけst.usedTreasuresに積み上がる）。 */
function treasureExpAmount(name){
  if(name === KOKUGO_KAMI_BOSS.treasure) return 1000;
  if(name === SHIRAN_BOSS.treasure) return 300;
  return 50;
}
function useTreasureItem(name){
  const st = loadStats();
  if(!(st.items && st.items[name] > 0)) return;
  const amount = treasureExpAmount(name);
  st.items[name]--;
  if(st.items[name] <= 0) delete st.items[name];
  if(!st.usedTreasures) st.usedTreasures = {};
  st.usedTreasures[name] = (st.usedTreasures[name]||0) + 1;
  st.bonusExp = (st.bonusExp||0) + amount;
  saveStats(st);
  alert(`✨「${name}」を使った！ 経験値が${amount}上がった！`);
  showItemCollection();
}
function showItemCollection(){
  const st = loadStats();
  const items = st.items || {};
  const usedTreasures = st.usedTreasures || {};
  const usedStoryRewards = st.usedStoryRewards || {};
  const allKeys = Object.keys(items);
  const normalKeys = allKeys.filter(name => !isTreasureItem(name) && !isStoryRewardItem(name)).sort((a,b)=> items[b]-items[a]);
  const treasureKeys = allKeys.filter(name => isTreasureItem(name)).sort((a,b)=> items[b]-items[a]);
  const usedTreasureKeys = Object.keys(usedTreasures).filter(name => usedTreasures[name] > 0).sort((a,b)=> usedTreasures[b]-usedTreasures[a]);
  const usedStoryRewardKeys = Object.keys(usedStoryRewards).filter(name => usedStoryRewards[name] > 0);
  let html = `<div class="card"><h3 class="section">🎒 これまで獲得したアイテム</h3>`;
  if(allKeys.length === 0 && usedTreasureKeys.length === 0 && usedStoryRewardKeys.length === 0){
    html += `<p class="note">まだ何も手に入れていません。問題に取り組んでいると、ごくまれにボスが勝負をしかけてくることがあります。勝つとアイテムがもらえます。</p>`;
  }else{
    html += `<h4 class="item-group-title">📦 通常アイテム</h4>`;
    html += normalKeys.length ? itemListHtml(normalKeys, items) : `<p class="note">まだありません。</p>`;
    html += storyRewardSectionHtml(st);
    html += `<h4 class="item-group-title treasure-title">✨ 伝説の宝具</h4>`;
    html += treasureKeys.length
      ? `<ul class="item-list treasure-list">` + treasureKeys.map(name =>
          `<li class="treasure"><span>✨ ${esc(name)}</span><span class="item-count">×${items[name]}</span>
            <button class="btn inline" onclick="useTreasureItem('${esc(name)}')">使う（経験値+${treasureExpAmount(name)}）</button></li>`
        ).join("") + `</ul>`
      : `<p class="note">まだ手に入れていません。ボスに勝つと、まれに手に入ります。</p>`;
    html += `<p class="note">✨ 宝具を使うと経験値が上がりますが、1個使うごとに手元から1個消費されます。</p>`;
    if(usedTreasureKeys.length){
      html += `<h4 class="item-group-title">💤 使用済みの宝具</h4>
        <ul class="item-list">` + usedTreasureKeys.map(name =>
          `<li><span>💤 ${esc(name)}</span><span class="item-count">×${usedTreasures[name]}</span></li>`
        ).join("") + `</ul>`;
    }
  }
  html += `<button class="btn secondary" onclick="showHome()">ホームへ</button></div>`;
  screen.innerHTML = html;
}

/* ================= 成績・称号 ================= */
function showStats(){
  const st = loadStats();
  const rows = CAT_KEYS.map(k => [k, CATS[k].name]).concat([["dokkai","読解"]]);
  let weakest = null;
  let html = `<div class="card"><h3 class="section">成績（累計）</h3><table class="stats">
    <tr><th>分野</th><th>称号</th><th style="text-align:right">Lv</th><th style="text-align:right">解いた数</th><th style="text-align:right">正解</th><th style="width:26%">正答率<br><span style="font-weight:normal">(直近30問)</span></th></tr>`;
  rows.forEach(([k,label])=>{
    const s = st.cats[k] || {t:0,c:0};
    /* 正答率は「解いた数」「正解」の累計比ではなく、直近30問（RECENT_ACC_WINDOW）の
       ローリング正答率を表示する（2026-07-15〜）。累計比だと、長く続けているほど
       最近の調子が反映されにくくなり、成績の推移が見えづらいというユーザーの指摘による変更。
       30問に満たない分野は、そこまでの全部が「直近」になる（st.recentCorrectはrecord()で
       すでに全分野・毎回蓄積されているので、この画面のためだけの新しい記録は不要）。 */
    const recent = (st.recentCorrect && st.recentCorrect[k]) || [];
    const rate = recent.length ? recent.reduce((a,b)=>a+b, 0) / recent.length : null;
    if(k!=="dokkai" && rate!==null && s.t>=4 && (weakest===null || rate<weakest.rate)) weakest = {label, rate};
    const t = titleOf(st.lv[k]);
    html += `<tr>
      <td>${esc(label)}</td>
      <td>${t.icon}${esc(t.name)}</td>
      <td class="num">${st.lv[k]}</td>
      <td class="num">${s.t}</td>
      <td class="num">${s.c}</td>
      <td>${rate===null ? "<span style='color:var(--sub)'>未挑戦</span>"
          : `${Math.round(rate*100)}%<div class="bar"><div style="width:${rate*100}%"></div></div>`}</td>
    </tr>`;
  });
  html += `</table>`;
  let mastered=0, learning=0, unseen=0, totalQ=0;
  CAT_KEYS.forEach(cat=>{
    CATS[cat].items.forEach(it=>{
      totalQ++;
      const s = qStat(st, cat, it);
      if(!s || s.t===0) unseen++;
      else if(s.t>=2 && s.c===s.t) mastered++;
      else learning++;
    });
  });
  html += `<div class="mastery">
    <span>✅ 習得ずみ <b>${mastered}</b>問</span>
    <span>📖 練習中 <b>${learning}</b>問</span>
    <span>🆕 未挑戦 <b>${unseen}</b>問</span>
    <span>（知識問題 全${totalQ}問）</span>
  </div>`;
  if(weakest && weakest.rate < 0.8){
    html += `<p class="note weak">▶ 今いちばんのばせそうなのは「${esc(weakest.label)}」。集中して取り組んでみよう。</p>`;
  }
  html += `</div>`;
  html += `<div class="card"><h3 class="section">🎓 今の学年の目安</h3>
    <p class="note">正解・不正解に応じて自動調整される出題の難しさをもとに、今どのくらいの学年の内容にちょうどよく取り組めているかの<b>目安</b>を、分野ごとに表示します。</p>
    <table class="stats"><tr><th>分野</th><th>学年の目安</th></tr>`;
  const gradeEstimates = [];
  CAT_KEYS.forEach(cat=>{
    const g = estimateGrade(cat, st.diffLv[cat]||1);
    if(g === null) return;
    gradeEstimates.push(g);
    html += `<tr><td>${esc(CATS[cat].name)}</td><td>${esc(GRADE_LABELS[g])}</td></tr>`;
  });

  const misses = Object.values(st.q)

  if(misses.length){
    html += `<div class="card"><h3 class="section">よく間違える問題</h3><ul class="misslist">`;
    misses.forEach(s=>{
      html += `<li><span>${esc(s.q)}</span>
        <span class="cat">${esc(CATS[s.cat] ? CATS[s.cat].name : s.cat)}　${s.c}/${s.t}回正解</span></li>`;
    });
    html += `</ul>
      <button class="btn" onclick="startReview()">この問題たちを復習する</button></div>`;
  }
  html += `<div class="card"><h3 class="section">きろくの保存・引きつぎ</h3>
    <p style="font-size:.88rem">記録は自動でこのブラウザに保存され、再読み込みしても消えません。
    ただし<b>別のパソコンやタブレット、別のブラウザには引き継がれません</b>。
    大事な記録は「書き出す」でファイルに保存しておくと、いつでも元にもどせます。</p>
    <div class="btn-row">
      <button class="btn" onclick="exportData()">💾 記録を書き出す（保存）</button>
      <button class="btn secondary" onclick="document.getElementById('importFile').click()">📂 記録を読み込む（復元）</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importData(this)">
    </div></div>`;
  html += `<div class="btn-row" style="margin-top:4px">

  screen.innerHTML = html;
}
function resetStats(){
  const pw = prompt("記録をリセットするには、パスワードを入力してください。");
  if(pw === null) return;
  if(pw !== "kichi1205"){ alert("パスワードが違います。"); return; }
  if(!confirm("本当にすべての記録（レベル・称号・正誤）を消しますか？")) return;
  saveStats(emptyStats());
  showStats();
}

/* ================= 記録の保存・引きつぎ ================= */
function exportData(){
  const st = loadStats();
  const payload = {app:"kokugoTraining", ver:5, savedAt:new Date().toISOString(), data:st};
  const blob = new Blob([JSON.stringify(payload)], {type:"application/json"});
  const a = document.createElement("a");
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  a.href = URL.createObjectURL(blob);
  a.download = `知識ドリルDX記録_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const payload = JSON.parse(reader.result);
      const st = payload && payload.app === "kokugoTraining" ? payload.data : payload;
      if(!st || !st.cats || !st.q || !st.lv) throw new Error("形式ちがい");
      if(isSaveFromNewerVersion(st)){
        alert("このファイルは、これより新しいバージョンの「知識ドリルDX」で保存されたものです。\nこのページ（古いバージョン）では読み込めません。最新版のページで開き直してください。");
        return;
      }
      const saved = payload && payload.savedAt ? new Date(payload.savedAt) : null;
      const dateStr = saved && !isNaN(saved) ? `${saved.getFullYear()}年${saved.getMonth()+1}月${saved.getDate()}日 ${String(saved.getHours()).padStart(2,"0")}:${String(saved.getMinutes()).padStart(2,"0")}` : "不明";
      const xp = kotonohaTotalXP(st);
      const confirmMsg = `このファイルの記録を読み込みます。\n\n保存日時：${dateStr}\nことのはの経験値：${xp}\n\nこの内容でよろしければ「OK」を押してください。今のブラウザの記録は上書きされます。`;
      if(!confirm(confirmMsg)) return;
      saveStats(st);
      alert("記録を読み込みました！");
      showStats();
    }catch(e){
      alert("このファイルは読み込めませんでした。「記録を書き出す」で保存したファイルを選んでください。");
    }
  };
  reader.readAsText(file);
}

/* ================= オープニング演出（プロローグ） =================
   このアプリを開いたとき（＝ブラウザで最初から読み込まれたとき）に必ず一度だけ再生する、
   短い全画面演出。アプリ内の画面遷移はページの読み込み直しをともなわないため、
   「初回起動時」も「ブラウザの更新時」も、この起動シーケンスが実行されるタイミングと一致する。
   しつこくならないよう、セリフは短く・少なくしてある。 */
const PROLOGUE_STEPS = [
  {text:"言葉が力を失いつつある時代"},
  {text:"見つけた。\n\n\n僕を育ててくれる人。"},
  {icon:"🥚", text:"ぼくは、【ことのは】。\n\n\n君の言葉の力とともに\nぼくも育つ。"},
  {text:"さあ、ともに成長しよう"},
];
let prologueIdx = 0;
let prologueOnDone = null;
let prologueEl = null;
function showPrologue(onDone){
  prologueIdx = 0;
  prologueOnDone = onDone;
  prologueEl = document.createElement("div");
  document.body.appendChild(prologueEl);
  renderPrologueStep();
}
function renderPrologueStep(){
  const step = PROLOGUE_STEPS[prologueIdx];
  const isLast = prologueIdx === PROLOGUE_STEPS.length - 1;
  prologueEl.className = "prologue-overlay";
  prologueEl.onclick = advancePrologue;
  prologueEl.innerHTML = `
    ${step.icon ? `<div class="prologue-icon">${step.icon}</div>` : ""}
    <p class="prologue-text">${step.text}</p>
    <span class="prologue-skip" onclick="event.stopPropagation(); finishPrologue();">スキップ</span>
    <p class="prologue-hint">${isLast ? "タップしてはじめる" : "タップしてすすむ"}</p>`;
}
function advancePrologue(){
  prologueIdx++;
  if(prologueIdx >= PROLOGUE_STEPS.length){ finishPrologue(); return; }
  renderPrologueStep();
}
function finishPrologue(){
  if(prologueEl){ prologueEl.remove(); prologueEl = null; }
  const fn = prologueOnDone; prologueOnDone = null;
  if(fn) fn();
}

/* 起動時ガード：保存されている記録が、今開いているコードより新しいverで作られていたら、
   通常の起動（showPrologue/showHomeなど）を一切行わない。ここでアプリの初期化を止めることで、
   その後どこからもsaveStats()が呼ばれず、新しい記録が古い形式で上書きされる事故を防ぐ。 */
function bootApp(){
  let savedTooNew = false;
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) savedTooNew = isSaveFromNewerVersion(JSON.parse(raw));
  }catch(e){}
  if(savedTooNew){
    document.body.innerHTML = `
      <div style="max-width:480px;margin:60px auto;padding:24px;text-align:center;font-family:inherit;">
        <div style="font-size:2.4rem;margin-bottom:12px;">⚠️</div>
        <h2 style="margin-bottom:14px;">このページは古いバージョンです</h2>
        <p style="line-height:1.7;">保存されている記録は、これより新しいバージョンの「知識ドリルDX」で作られたものです。<br>
        このままだと記録が正しく読み込めないため、起動を停止しました。<br><br>
        最新版のページを開き直してください。</p>
      </div>`;
    return;
  }
  showPrologue(showHome);
}

/* 野球ミニゲーム（baseball beat、2026-07-17〜、第4章「野球で勝負！」用）。教員が事前に
   用意したReactの試作（野球ミニゲーム.jsx）を土台に、以降のフィードバックで何度か改訂している。
   最新仕様（2026-07-18〜）：相手は県内屈指の強豪校で、エースは終始ストレート一本勝負。
   ヒットが続いてピンチが深まるほどピッチャーが本気になり、球（＝制限時間）が速くなっていく、
   という設定に変更した（球種による安打の価値の違いは廃止、安打は常に単打）。
   出題ジャンルは部首→四字熟語に変更し、既存の`pickBattleQuestion`をそのまま使う（新規データ不要）。
   正解するとその場で分野レベルが上がる（他の中ボス／校正ミニゲームはrecord()を呼ばない設計だが、
   この野球ミニゲームだけは教員の指示で例外的にrecord()を呼ぶ）。 */
const BASEBALL_INNINGS_TOTAL = 3;
/* 打者ごとの制限時間（秒）。1人目10秒→2人目5秒→3人目2.5秒→4人目1.5秒→5人目1秒→
   6人目以降0.5秒、という教員指定のテーブル。アウトになるたびに1人目(10秒)へリセットされる
   （storyBaseballNextBatterでbatterNumberを1に戻すのは従来どおり、テーブルの中身だけ変更）。 */
const BASEBALL_TIME_TABLE_S = [10, 5, 2.5, 1.5, 1];
const BASEBALL_MIN_TIME_S = 0.5;
function baseballTimeLimit(n){
  return n <= BASEBALL_TIME_TABLE_S.length ? BASEBALL_TIME_TABLE_S[n - 1] : BASEBALL_MIN_TIME_S;
}
/* ピンチが深まるほど（＝ヒットが続いて打者番号が進むほど）、ピッチャーの気迫がこもっていく
   ――という演出用のラベル。制限時間テーブルと同じ人数区切りで対応させている。 */
const BASEBALL_SPEED_LABELS = [
  "様子見のストレート", "本腰を入れたストレート", "気迫のこもったストレート",
  "全力の剛速球", "渾身の一球",
];
function baseballSpeedLabel(n){
  return n <= BASEBALL_SPEED_LABELS.length ? BASEBALL_SPEED_LABELS[n - 1] : "限界を超えた渾身の一球";
}
/* 安打の結果（2026-07-19〜、教員の指示でヒットの価値をランダム抽選に変更）。球種はストレート
   一本のままだが、「当たりどころ」次第でヒット50%・二塁打25%・三塁打15%・ホームラン10%の
   いずれかになる（進塁数と実況メッセージが変わる）。累積確率で判定するので、
   BASEBALL_HIT_TYPESの並び順・weightの合計が1になっていることが前提。 */
const BASEBALL_HIT_TYPES = [
  { label:"ヒット",         bases:1, weight:0.50, msg:"快音！鋭い打球がフェアゾーンに転がる！ヒット！" },
  { label:"ツーベースヒット", bases:2, weight:0.25, msg:"強烈な打球が外野を割る！ツーベースヒットだ！" },
  { label:"スリーベースヒット", bases:3, weight:0.15, msg:"大きな当たり！三塁まで走りきるスリーベースヒット！" },
  { label:"ホームラン",       bases:4, weight:0.10, msg:"特大アーチ！スタンドまで運ぶホームランだ！" },
];
function pickBaseballHitType(){
  const r = Math.random();
  let acc = 0;
  for(const h of BASEBALL_HIT_TYPES){
    acc += h.weight;
    if(r < acc) return h;
  }
  return BASEBALL_HIT_TYPES[BASEBALL_HIT_TYPES.length - 1];
}
// bases: [1塁,2塁,3塁]の真偽値配列。advanceで打者含め押し出す(元のjsxのadvanceRunnersと同じロジック)。
function baseballAdvanceRunners(bases, n){
  const occupied = [true, ...bases];
  const newBases = [false, false, false];
  let runsScored = 0;
  for(let i = 0; i < occupied.length; i++){
    if(!occupied[i]) continue;
    const newPos = i + n;
    if(newPos >= 4) runsScored += 1;
    else if(newPos >= 1) newBases[newPos - 1] = true;
  }
  return { newBases, runsScored };
}
/* 相手チームの得点（2026-07-18〜、強豪校の設定にあわせて1〜4点のランダム、さらに10%の確率で
   5点を許してしまう、という教員指定の分布に変更）。 */
function baseballOpponentRuns(){
  if(Math.random() < 0.1) return 5;
  return 1 + Math.floor(Math.random() * 4); // 1〜4点
}

/* 一人称選択（ch1のpronoun choice）の表示名。ホーム画面の「相棒」表記などで使う。 */
const STORY_PRONOUN_LABELS = {
  watashi:"私", atashi:"あたし", ore:"俺", boku:"ボク",
  oira:"おいら", oidon:"おいどん", sessha:"せっしゃ", maro:"まろ",
};
/* 一章クリア後にのみ、選んだ一人称を返す（未クリア・未選択ならnull）。
   章を再プレイしてpronoun choiceを選び直せば、この値もすぐ更新される。 */
function storyChosenPronoun(st){
  const sp = st.story;
  if(!sp || !sp.completedChapters.includes("ch1")) return null;
  return STORY_PRONOUN_LABELS[sp.flags.pronoun] || null;
}

let storyRun = null; // 実行中の一時状態（セーブしない。直前の出題・選択肢の並び順・合格ゲートの進捗など）
function storyFreshRun(){
  return {
    lastQ:null, order:null, curItem:null, curCat:null, curBeat:null, shownAt:null,
    gateBeatIdx:null, gateWindow:[], gateCleared:false,
    battleBeatIdx:null, battleAnswered:0, battleCorrect:0, timerId:null,
    lastProofPassageIdx:null, proofPassageIdx:null, proofFound:null, proofDeadline:null, proofDone:false, proofTimerId:null,
    bbBeatIdx:null, bb:null,
  };
}

function storyProgress(st){
  if(!st.story) st.story = {chapter:"ch1", beatIdx:0, flags:{}, completedChapters:[], judgedRunCorrect:0, judgedRunTotal:0, judgedBest:{}};
  return st.story;
}
function storyEntryHtml(st){

    <div class="card menu-card story-btn" onclick="showStoryMenu()">
      <div class="menu-icon">📖</div>
      <div><h2>ストーリーモード</h2>
      <p>ことのはと一緒に、中学校生活を歩む物語（β版）</p></div>
    </div>`;
}
/* 章選択画面。STORY_CHAPTERSのキーをそのまま順番にボタン化するので、
   今後2章目以降を追加してもこの関数を変更する必要はない。 */
function showStoryMenu(){
  const st = loadStats();
  let html = `<div class="card"><h3 class="section">📖 ストーリーモード</h3>
    <p class="note">ことのはと一緒に、中学校生活を歩む物語です。章を選んで読み進めよう。前の章をクリアすると、次の章が解放されます。</p></div>`;
  html += Object.keys(STORY_CHAPTERS).map(key => storyChapterButtonHtml(key, st)).join("");
  html += `<div class="btn-row" style="justify-content:center; margin-top:10px">
    <button class="btn secondary" onclick="showHome()">ホームへ</button>
  </div>`;
  screen.innerHTML = html;
}
/* 章の解放システム（2026-07-19〜、教員の指示で追加）。STORY_CHAPTERSの並び順で、直前の章を
   クリアしていないと次の章には挑戦できない（先頭の章は常に解放されている）。今後3章目以降を
   追加しても、この関数・呼び出し側は変更不要（並び順から自動的に判定する）。 */
function storyChapterUnlocked(key, st){
  const keys = Object.keys(STORY_CHAPTERS);
  const idx = keys.indexOf(key);
  if(idx <= 0) return true;
  const sp = storyProgress(st);
  return sp.completedChapters.includes(keys[idx - 1]);
}
function storyChapterButtonHtml(key, st){
  const chapter = STORY_CHAPTERS[key];
  const sp = storyProgress(st);
  if(!storyChapterUnlocked(key, st)){
    const keys = Object.keys(STORY_CHAPTERS);
    const prevTitle = STORY_CHAPTERS[keys[keys.indexOf(key) - 1]].title;
    return `
      <div class="card menu-card locked">
        <div class="menu-icon">🔒</div>
        <div><h2>${esc(chapter.title)}</h2><p>先に「${esc(prevTitle)}」をクリアすると挑戦できます。</p></div>
        <div class="right"><span class="shogo-badge">未解放</span></div>
      </div>`;
  }
  const isCompleted = sp.completedChapters.includes(key);
  const inProgress = sp.chapter === key && !isCompleted && sp.beatIdx > 0;
  const badge = isCompleted ? "クリア済み" : inProgress ? "つづきから" : "はじめから";
  const sub = isCompleted ? "クリア済み。もう一度プレイすることもできます。" : inProgress ? "続きから読み進めよう" : "タップして読みはじめる";
  const best = sp.judgedBest && sp.judgedBest[key];
  const rateNote = best ? `<p class="note">クリア率 ${Math.round(100*best.correct/best.total)}%（自己ベスト）</p>` : "";
  return `
    <div class="card menu-card" onclick="startStoryMode('${key}')">
      <div class="menu-icon">📖</div>
      <div><h2>${esc(chapter.title)}</h2><p>${esc(sub)}</p>${rateNote}</div>
      <div class="right"><span class="shogo-badge">${esc(badge)}</span></div>
    </div>`;
}
/* chapterKeyを渡すと、今保存されている進行中の章と違う場合だけ切り替えて先頭から始める
   （同じ章ならbeatIdxをそのまま維持し、続きから／クリア済み画面から再開する）。
   引数なしの呼び出し（既存コード・vmテスト等）は今までどおり現在の章をそのまま再開する。
   chapterKeyが指定されていて、かつまだ解放されていない章の場合は何もしない（画面上は
   ボタンのonclick自体を外しているので通常は起きないが、念のための二重ガード）。 */
function startStoryMode(chapterKey){
  if(chapterKey){
    const st = loadStats();
    if(!storyChapterUnlocked(chapterKey, st)){ showStoryMenu(); return; }
    const sp = storyProgress(st);
    if(sp.chapter !== chapterKey){ sp.chapter = chapterKey; sp.beatIdx = 0; storyResetJudgedRun(sp); }
    saveStats(st);
  }
  storyRun = storyFreshRun();
  storyRenderBeat();
}
function storyRenderBeat(){
  const st = loadStats();
  const sp = storyProgress(st);
  const chapter = STORY_CHAPTERS[sp.chapter];
  if(!chapter || sp.beatIdx >= chapter.beats.length){ storyChapterEnd(); return; }
  const beat = chapter.beats[sp.beatIdx];
  if(beat.type === "line") storyRenderLine(beat, sp);
  else if(beat.type === "choice") storyRenderChoice(beat);
  else if(beat.type === "judgedChoice") storyRenderJudgedChoice(beat);
  else if(beat.type === "quiz") storyRenderQuiz(beat, sp.beatIdx);
  else if(beat.type === "battle") storyRenderBattle(beat, sp.beatIdx);
  else if(beat.type === "proofread") storyRenderProofread(beat);
  else if(beat.type === "baseball") storyRenderBaseball(beat, sp.beatIdx);
  else showHome();
}
function storyFooterHtml(){
  return `<div class="btn-row" style="justify-content:center; margin-top:6px">
    <button class="btn secondary" onclick="showHome()">ホームへ（中断）</button>
  </div>`;
}
/* beat.variantsは[{flag, value, text}, ...]の配列。sp.flags[flag]===valueに
   最初にマッチしたものの文面を使い、どれにも一致しなければbeat.textにフォールバックする。
   選択肢の直後のセリフを、選んだ内容に応じて少しずつ変える仕組み。 */
function storyResolveText(beat, sp){
  if(beat.variants){
    const hit = beat.variants.find(v => sp.flags[v.flag] === v.value);
    if(hit) return hit.text;
  }
  return beat.text;
}
function storyRenderLine(beat, sp){
  screen.innerHTML = `
    <div class="card story-scene">
      ${beat.speaker ? `<div class="story-speaker">${esc(beat.speaker)}</div>` : ""}
      <p class="story-text">${esc(storyResolveText(beat, sp))}</p>
      <div class="btn-row" style="justify-content:center">
        <button class="btn story-advance-btn" onclick="storyAdvance()">つぎへ</button>
      </div>
    </div>
    ${storyFooterHtml()}`;
}
function storyRenderChoice(beat){
  screen.innerHTML = `
    <div class="card story-scene">
      <p class="story-text">${esc(beat.text)}</p>
      <div class="story-choices">
        ${beat.options.map((o,i)=>`<button class="btn secondary" onclick="storyChoose(${i})">${esc(o.label)}</button>`).join("")}
      </div>
    </div>
    ${storyFooterHtml()}`;
}
function storyChoose(i){
  const st = loadStats();
  const sp = storyProgress(st);
  const chapter = STORY_CHAPTERS[sp.chapter];
  const beat = chapter.beats[sp.beatIdx];
  const opt = beat.options[i];
  if(beat.flagKey) sp.flags[beat.flagKey] = opt.value;
  sp.beatIdx++;
  saveStats(st);
  storyRenderBeat();
}
function storyAdvance(){
  const st = loadStats();
  const sp = storyProgress(st);
  sp.beatIdx++;
  saveStats(st);
  storyRenderBeat();
}
/* 選択肢問題（judgedChoice beat）：地の文の分岐用choiceと違い、正誤のある固定の選択肢問題。
   beat.options[i].correctがtrueの選択肢が正解。答えた瞬間にst.story.judgedRunCorrect/
   judgedRunTotalへ積み上げる（セーブされるので、章の途中でアプリを閉じて再開しても
   正しく引き継がれる）。正誤を表示してから「つぎへ」でbeatIdxを進める、2段階の操作にする。 */
function storyRenderJudgedChoice(beat){
  clearChoiceKeys();
  screen.innerHTML = `
    <div class="card story-scene judged-scene">
      ${beat.speaker ? `<div class="story-speaker">${esc(beat.speaker)}</div>` : ""}
      ${beat.intro ? `<p class="story-text">${esc(beat.intro)}</p>` : ""}
      <p class="story-text">${esc(beat.text)}</p>

      <div class="choices">

/* 校正ミニゲーム（proofread beat）：既存の中ボス（battle beat、1問ずつの正誤判定）とは別実装。
   1つの文章（STORY_PROOFREAD_PASSAGESから毎回ランダムに1パターン、直前と重複しないよう
   lastProofPassageIdxで避ける）の中の、誤りトークン（wrong:true）を全部タップできればクリア。
   制限時間はDate.now()との差分で管理する単純なポーリング式（battle beatのsetTimeout1発方式とは
   違い、誤答タップのペナルティで残り時間を動的に減らす必要があるため）。 */
function pickProofreadPassageIdx(){
  const n = STORY_PROOFREAD_PASSAGES.length;
  if(n <= 1) return 0;
  let idx;
  do { idx = Math.floor(Math.random()*n); } while(idx === storyRun.lastProofPassageIdx);
  storyRun.lastProofPassageIdx = idx;
  return idx;
}
function storyRenderProofread(beat){
  storyRun.curBeat = beat;
  storyRun.proofPassageIdx = pickProofreadPassageIdx();
  storyRun.proofFound = new Set();
  storyRun.proofDeadline = Date.now() + STORY_PROOFREAD_TIME_MS;
  storyRun.proofDone = false;
  const boss = STORY_EVENT_BOSSES[beat.boss];
  const passage = STORY_PROOFREAD_PASSAGES[storyRun.proofPassageIdx];
  const errorCount = passage.tokens.filter(t => t.wrong).length;
  screen.innerHTML = `
    <div class="card story-scene">
      <div class="boss-name">${esc(boss.icon)} ${esc(boss.name)}</div>
      <p class="note">${STORY_PROOFREAD_TIME_MS/1000}秒以内に、まちがった言葉づかいを${errorCount}つ、すべてタップして見つけよう！（正しい言葉をタップすると、残り時間が${STORY_PROOFREAD_MISS_PENALTY_MS/1000}秒減ってしまいます）</p>
      <p class="note" id="proofProgress">見つけた数：0／${errorCount}</p>
      <div class="boss-timer-row"><div class="boss-timer-bar"><div id="proofTimerFill" class="boss-timer-fill"></div></div></div>
      <div class="boss-q-card">
        <div class="proof-passage" id="proofPassage">
          ${passage.tokens.map((t,i) => `<span class="proof-token" data-i="${i}" onclick="storyProofreadTap(${i})">${esc(t.t)}</span>`).join("")}
        </div>
        <div class="feedback" id="fb"></div>
        <div class="btn-row"><button class="btn story-advance-btn" id="storyNextBtn" style="display:none" onclick="storyProofreadNext()">つぎへ</button></div>
      </div>
    </div>
    ${storyFooterHtml()}`;
  startStoryProofreadTimer();
}
function startStoryProofreadTimer(){
  clearStoryProofreadTimer();
  const run = storyRun;
  run.proofTimerId = setInterval(() => {
    if(storyRun !== run) return;
    if(run.proofDeadline - Date.now() <= 0){
      clearStoryProofreadTimer();
      storyProofreadTimeUp();
    }
  }, 200);
  renderStoryProofreadTimerBar();
}
function clearStoryProofreadTimer(){
  if(storyRun && storyRun.proofTimerId){
    clearInterval(storyRun.proofTimerId);
    storyRun.proofTimerId = null;
  }
}
/* タイマーバーの幅は、常に「STORY_PROOFREAD_TIME_MS（1分）に対する残り時間の割合」で表す。
   誤答ペナルティでdeadlineが減った瞬間、バーがその分だけ目に見えて縮むので、
   ペナルティが起きたことが直感的にわかる（減った後の残り時間ぶんだけ、あらためて0%まで
   アニメーションさせる）。 */
function renderStoryProofreadTimerBar(){
  const el = document.getElementById("proofTimerFill");
  if(!el || !storyRun) return;
  const remain = Math.max(0, storyRun.proofDeadline - Date.now());
  el.style.transition = "none";
  el.style.width = (100*remain/STORY_PROOFREAD_TIME_MS) + "%";
  void el.offsetWidth;
  if(typeof requestAnimationFrame !== "function") return;
  requestAnimationFrame(() => {
    el.style.transition = `width ${remain}ms linear`;
    el.style.width = "0%";
  });
}
function storyProofreadTap(i){
  if(!storyRun || storyRun.proofDone) return;
  const passage = STORY_PROOFREAD_PASSAGES[storyRun.proofPassageIdx];
  const token = passage.tokens[i];
  const el = document.querySelector(`.proof-token[data-i="${i}"]`);
  if(!el || el.classList.contains("found") || el.classList.contains("tried")) return;
  if(token.wrong){
    el.classList.add("found");
    storyRun.proofFound.add(i);
    const errorCount = passage.tokens.filter(t => t.wrong).length;
    const progressEl = document.getElementById("proofProgress");
    if(progressEl) progressEl.textContent = `見つけた数：${storyRun.proofFound.size}／${errorCount}`;
    if(storyRun.proofFound.size >= errorCount){
      clearStoryProofreadTimer();
      storyProofreadReveal(true);
    }
  }else{
    el.classList.add("tried");
    storyRun.proofDeadline -= STORY_PROOFREAD_MISS_PENALTY_MS;
    if(storyRun.proofDeadline - Date.now() <= 0){
      clearStoryProofreadTimer();
      storyProofreadTimeUp();
    }else{
      renderStoryProofreadTimerBar();
    }
  }
}
function storyProofreadTimeUp(){
  storyProofreadReveal(false);
}
function storyProofreadReveal(won){
  storyRun.proofDone = true;
  const passage = STORY_PROOFREAD_PASSAGES[storyRun.proofPassageIdx];
  const errorCount = passage.tokens.filter(t => t.wrong).length;
  passage.tokens.forEach((t,i) => {
    const el = document.querySelector(`.proof-token[data-i="${i}"]`);
    if(!el) return;
    el.onclick = null;
    if(t.wrong && !storyRun.proofFound.has(i)) el.classList.add("missed");
  });
  const missedList = passage.tokens
    .filter((t,i) => t.wrong && !storyRun.proofFound.has(i))
    .map(t => `「${esc(t.t)}」→「${esc(t.correct)}」`);
  const fb = document.getElementById("fb");
  fb.className = "feedback show " + (won?"ok":"ng");
  fb.innerHTML = won
    ? `<div class="verdict">○ ${errorCount}つ、すべて見つけた！</div>`
    : `<div class="verdict">⏰ 時間切れ…（${storyRun.proofFound.size}／${errorCount}つ発見）</div>` +
      (missedList.length ? `<p>見つけられなかったまちがい：${missedList.join("、")}</p>` : "");
  const nb = document.getElementById("storyNextBtn");
  if(nb){ nb.style.display = "inline-block"; nb.textContent = won ? "けっかを見る" : "もう一度挑戦する"; }
}
function storyProofreadNext(){
  const passage = STORY_PROOFREAD_PASSAGES[storyRun.proofPassageIdx];
  const errorCount = passage.tokens.filter(t => t.wrong).length;
  if(storyRun.proofFound.size >= errorCount) storyProofreadResolve();
  else storyRenderBeat();
}
function storyProofreadResolve(){
  const beat = storyRun.curBeat;
  const boss = STORY_EVENT_BOSSES[beat.boss];
  const st = loadStats();
  const sp = storyProgress(st);
  const isReplay = sp.completedChapters.includes(sp.chapter);
  let gotTreasure = false;
  if(!isReplay){
    st.items[boss.item] = (st.items[boss.item]||0) + 1;
    if(treasureDropAllowed(st)){
      st.bossPity[boss.id] = (st.bossPity[boss.id]||0) + 1;
      if(st.bossPity[boss.id] >= BOSS_PITY_MAX || Math.random() < BOSS_TREASURE_RATE){
        gotTreasure = true;
        st.bossPity[boss.id] = 0;
        st.items[boss.treasure] = (st.items[boss.treasure]||0) + 1;
      }
    }
    saveStats(st);
  }
  screen.innerHTML = `
    <div class="card story-scene">
      <div class="story-chapter-end">🎉 クリア！</div>
      ${isReplay
        ? `<p class="story-text">「${esc(boss.name)}」を乗りこえた！（再プレイのため、今回はアイテムの入手はありません）</p>`
        : `<p class="story-text">「${esc(boss.name)}」を乗りこえた！<br>${esc(boss.icon)} <span class="drop-item">【${esc(boss.item)}】</span>を手に入れた！${gotTreasure ? `<br>✨ さらに、宝具<span class="drop-item treasure-drop">【${esc(boss.treasure)}】</span>を手に入れた！ ✨` : ""}</p>`}
      <div class="btn-row" style="justify-content:center">
        <button class="btn story-advance-btn" onclick="storyAdvance()">つづける</button>
      </div>
    </div>`;
}

/* 野球ミニゲーム（baseball beat）：他の中ボス（battle/proofread）と違い、3イニング制・
   アウト/走者/得点というリアルタイム性の高いミニゲーム全体を1つのbeatとして丸ごと実装する。
   状態はstoryRun.bb（非セーブのランタイムオブジェクト）に持たせ、beatに滞在している間は
   何度でも通しでプレイできる（storyRenderBeatが呼ばれるたびに、bbBeatIdxが変わらない限り
   状態を保持する。gateBeatIdx/battleBeatIdxと同じガードパターン）。
   勝敗の判定は3イニング終了後の得点比較のみ（自軍>相手で勝ち、以下は引き分け扱いで
   どちらも「もう一度挑戦する」を表示する、教員の指示どおりの仕様）。 */
function storyRenderBaseball(beat, idx){
  if(storyRun.bbBeatIdx !== idx){
    storyRun.bbBeatIdx = idx;
    storyBaseballReset();
  }
  storyRun.curBeat = beat;
  storyRenderBaseballScreen();
}
function storyBaseballReset(){
  storyRun.bb = {
    inning:1, outs:0, bases:[false,false,false], totalRuns:0,
    inningRuns:Array(BASEBALL_INNINGS_TOTAL).fill(null),
    opponentInningRuns:Array(BASEBALL_INNINGS_TOTAL).fill(null), opponentTotalRuns:0,
    curInningRuns:0, batterNumber:1, phase:"ready",
    question:null, selected:null, feedback:null, shownAt:null,
    log:["プレイボール！「次の球」を押して勝負開始。"],
    lastQ:null, countdown:null,
    countdownTimerId:null, answerTimerId:null, answerDeadline:null, timeLimit:BASEBALL_TIME_TABLE_S[0],
    yojiLvStart: loadStats().lv.yoji || 1, // 試合開始時点の四字熟語レベル（勝利画面で伸びを表示するため）
  };
}
function baseballAddLog(msg){
  const bb = storyRun.bb;
  bb.log = [...bb.log.slice(-6), msg];
}
function clearBaseballCountdownTimer(){
  const bb = storyRun && storyRun.bb;
  if(bb && bb.countdownTimerId){ clearInterval(bb.countdownTimerId); bb.countdownTimerId = null; }
}
function clearBaseballAnswerTimer(){
  const bb = storyRun && storyRun.bb;
  if(bb && bb.answerTimerId){ clearInterval(bb.answerTimerId); bb.answerTimerId = null; }
}
function clearBaseballTimers(){
  clearBaseballCountdownTimer();
  clearBaseballAnswerTimer();
}

function storyBaseballStartPitch(){
  const bb = storyRun.bb;
  if(bb.phase !== "ready") return;
  bb.phase = "countdown";
  bb.countdown = 3;
  storyRenderBaseballScreen();
  const run = storyRun;
  bb.countdownTimerId = setInterval(() => {
    if(storyRun !== run) return;
    bb.countdown -= 1;
    if(bb.countdown <= 0){
      clearBaseballCountdownTimer();
      bb.countdown = null;
      storyBaseballBeginQuestion();
    }else{
      storyRenderBaseballScreen();
    }
  }, 650);
}
function storyBaseballBeginQuestion(){
  const bb = storyRun.bb;
  const limit = baseballTimeLimit(bb.batterNumber);
  bb.question = pickBattleQuestion("yoji", bb.lastQ);
  bb.lastQ = bb.question.q;
  bb.order = shuffledOrder(bb.question.c.length);
  bb.selected = null;
  bb.feedback = null;
  bb.phase = "question";
  bb.timeLimit = limit;
  bb.answerDeadline = Date.now() + limit * 1000;
  bb.shownAt = Date.now();
  storyRenderBaseballScreen();
  const run = storyRun;
  bb.answerTimerId = setInterval(() => {
    if(storyRun !== run) return;
    if(bb.answerDeadline - Date.now() <= 0){
      clearBaseballAnswerTimer();
      storyBaseballTimeout();
    }
  }, 150);
}
function animateBaseballTimerBar(ms){
  const el = document.getElementById("bbTimerFill");
  if(!el) return;
  el.style.transition = "none";
  el.style.width = "100%";
  if(typeof requestAnimationFrame !== "function") return;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transition = `width ${ms}ms linear`;
      el.style.width = "0%";
    });
  });
}
function storyBaseballTimeout(){
  const bb = storyRun.bb;
  if(bb.selected !== null) return;
  clearChoiceKeys();
  bb.selected = -1;
  const elapsedMs = Date.now() - (bb.shownAt || Date.now());
  record("yoji", bb.question, false, elapsedMs, {skipRecentAcc:true});
  bb.feedback = { ok:false, msg:"時間切れ…見逃し三振" };
  baseballAddLog(`${baseballSpeedLabel(bb.batterNumber)}を見逃す → 時間切れ → アウト`);
  bb.outs += 1;
  storyRenderBaseballScreen();
  setTimeout(() => { if(storyRun && storyRun.bb === bb){ bb.phase = "resolved"; storyRenderBaseballScreen(); } }, 700);
}
function storyBaseballAnswer(idx){
  const bb = storyRun.bb;
  if(bb.selected !== null) return;
  clearBaseballAnswerTimer();
  clearChoiceKeys();
  bb.selected = idx;
  const correct = idx === bb.question.a;
  /* この野球ミニゲームだけは、教員の指示で正誤をrecord()に反映する（他の中ボス・校正
     ミニゲームはrecord()を呼ばず分野レベルに影響しない設計のままだが、ここは例外）。
     正解した瞬間に分野（四字熟語）のレベルが上がりうる。ただしskipRecentAcc:trueにより、
     最短0.5秒まで縮む野球ミニゲーム特有のペースが「直近の正答率」（分野別・分野横断とも）や
     fastGuess判定に混ざらないようにしている（2026-07-18、教員の指示）。 */
  const elapsedMs = Date.now() - (bb.shownAt || Date.now());
  const r = record("yoji", bb.question, correct, elapsedMs, {skipRecentAcc:true});
  if(correct){
    const hit = pickBaseballHitType();
    const { newBases, runsScored } = baseballAdvanceRunners(bb.bases, hit.bases);
    bb.feedback = { ok:true, msg:`${hit.msg}${runsScored > 0 ? `　${runsScored}点入る！` : ""}`, lvup:r.lvup };
    bb.bases = newBases;
    if(runsScored > 0){
      bb.totalRuns += runsScored;
      bb.curInningRuns += runsScored;
    }
    baseballAddLog(`${baseballSpeedLabel(bb.batterNumber)}を打ち返す → 正解 → ${hit.label}${runsScored > 0 ? `(${runsScored}点)` : ""}`);
  }else{
    bb.feedback = { ok:false, msg:"空振り三振…アウト", lvup:r.lvup };
    baseballAddLog(`${baseballSpeedLabel(bb.batterNumber)}を選択 → 不正解 → アウト`);
    bb.outs += 1;
  }
  storyRenderBaseballScreen();
  setTimeout(() => { if(storyRun && storyRun.bb === bb){ bb.phase = "resolved"; storyRenderBaseballScreen(); } }, 900);
}
/* アウトになった直後は、次の打者の制限時間を1人目(10秒)にリセットする。ヒットが続いた場合だけ
   batterNumberを1ずつ増やし、制限時間テーブルに沿って短くなっていく（＝ピッチャーが本気になり
   球が速くなっていく、という設定）。
   2026-07-18〜、教員の指示で「次の打者へ」を押したら（同じイニングが続く場合は）3秒の
   カウントダウンを待たせず即座に始まるよう変更した（storyBaseballStartPitchをそのまま呼ぶ）。 */
function storyBaseballNextBatter(){
  const bb = storyRun.bb;
  const wasHit = !!(bb.feedback && bb.feedback.ok);
  bb.question = null;
  bb.countdown = null;
  if(bb.outs >= 3){
    storyBaseballFinishInning();
    storyRenderBaseballScreen();
  }else{
    bb.batterNumber = wasHit ? bb.batterNumber + 1 : 1;
    bb.phase = "ready";
    storyBaseballStartPitch();
  }
}
function storyBaseballFinishInning(){
  const bb = storyRun.bb;
  bb.inningRuns[bb.inning - 1] = bb.curInningRuns;
  baseballAddLog(`${bb.inning}回表終了。この回 ${bb.curInningRuns}点。`);
  const oppRuns = baseballOpponentRuns();
  bb.opponentInningRuns[bb.inning - 1] = oppRuns;
  bb.opponentTotalRuns += oppRuns;
  baseballAddLog(oppRuns > 0 ? `${bb.inning}回裏、相手チームが${oppRuns}点を返す。` : `${bb.inning}回裏、相手チームを無得点に抑えた。`);
  if(bb.inning >= BASEBALL_INNINGS_TOTAL){
    bb.phase = "gameover";
    return;
  }
  bb.inning += 1;
  bb.outs = 0;
  bb.bases = [false, false, false];
  bb.curInningRuns = 0;
  bb.batterNumber = 1;
  bb.phase = "ready";
}
function storyBaseballRetry(){
  storyBaseballReset();
  storyRenderBeat();
}
function storyBaseballResolve(){
  const beat = storyRun.curBeat;
  const boss = STORY_EVENT_BOSSES[beat.boss];
  const st = loadStats();
  const sp = storyProgress(st);
  const isReplay = sp.completedChapters.includes(sp.chapter);
  let gotTreasure = false;
  if(!isReplay){
    st.items[boss.item] = (st.items[boss.item]||0) + 1;
    if(treasureDropAllowed(st)){
      st.bossPity[boss.id] = (st.bossPity[boss.id]||0) + 1;
      if(st.bossPity[boss.id] >= BOSS_PITY_MAX || Math.random() < BOSS_TREASURE_RATE){
        gotTreasure = true;
        st.bossPity[boss.id] = 0;
        st.items[boss.treasure] = (st.items[boss.treasure]||0) + 1;
      }
    }
    saveStats(st);
  }
  const bb = storyRun.bb;
  /* 試合を通じて四字熟語のレベルがどれだけ伸びたかを、勝利画面にまとめて表示する
     （2026-07-18、教員の指示。1問ごとの「⚡球速が速くなっていく…」表示とは別に、
     試合全体の成果として振り返れるようにする）。 */
  const yojiLvStart = bb.yojiLvStart || 1;
  const yojiLvEnd = st.lv.yoji || 1;
  const yojiLvUpHtml = yojiLvEnd > yojiLvStart
    ? `<p class="lvup-chip">📚 四字熟語 Lv.${yojiLvStart} → Lv.${yojiLvEnd} にアップ！</p>`
    : "";
  screen.innerHTML = `
    <div class="card story-scene bb-victory">
      <div class="bb-victory-burst">🎉⚾✨🏆✨⚾🎉</div>
      <div class="bb-victory-title">大金星！　強豪校のエースを打ち崩した！</div>
      <div class="bb-victory-score">自軍 ${bb.totalRuns} － ${bb.opponentTotalRuns} 相手</div>
      ${yojiLvUpHtml}
      ${isReplay
        ? `<p class="story-text">「${esc(boss.name)}」に勝った！（再プレイのため、今回はアイテムの入手はありません）</p>`
        : `<p class="story-text">「${esc(boss.name)}」に勝った！<br>${esc(boss.icon)} <span class="drop-item">【${esc(boss.item)}】</span>を手に入れた！${gotTreasure ? `<br>✨ さらに、宝具<span class="drop-item treasure-drop">【${esc(boss.treasure)}】</span>を手に入れた！ ✨` : ""}</p>`}
      <div class="btn-row" style="justify-content:center">
        <button class="btn story-advance-btn" onclick="storyAdvance()">つづける</button>
      </div>
    </div>`;
}

function baseballScoreboardHtml(bb){
  let head = `<div class="bb-sb-row head"><div class="bb-sb-team"></div>`;
  for(let n = 1; n <= BASEBALL_INNINGS_TOTAL; n++) head += `<div class="bb-sb-cell">${n}</div>`;
  head += `<div class="bb-sb-cell">計</div></div>`;
  let ownRow = `<div class="bb-sb-row"><div class="bb-sb-team">自軍</div>`;
  for(let n = 1; n <= BASEBALL_INNINGS_TOTAL; n++){
    const v = bb.inningRuns[n-1] !== null ? bb.inningRuns[n-1] : (n === bb.inning ? bb.curInningRuns : "-");
    ownRow += `<div class="bb-sb-cell">${v}</div>`;
  }
  ownRow += `<div class="bb-sb-cell total">${bb.totalRuns}</div></div>`;
  let oppRow = `<div class="bb-sb-row"><div class="bb-sb-team">相手</div>`;
  for(let n = 1; n <= BASEBALL_INNINGS_TOTAL; n++){
    const v = bb.opponentInningRuns[n-1] !== null ? bb.opponentInningRuns[n-1] : "-";
    oppRow += `<div class="bb-sb-cell">${v}</div>`;
  }
  oppRow += `<div class="bb-sb-cell total">${bb.opponentTotalRuns}</div></div>`;
  return `<div class="bb-scoreboard">${head}${ownRow}${oppRow}</div>`;
}

      ${fieldHtml}
      ${bodyHtml}
      <div class="bb-log">
        <p class="note" style="margin-top:0">実況ログ</p>
        ${bb.log.map(l => `<div>・${esc(l)}</div>`).join("")}
      </div>
    </div>
    ${storyFooterHtml()}`;
  if(bb.phase === "question" && bb.selected === null) animateBaseballTimerBar(bb.answerDeadline - Date.now());
}

function storyResetJudgedRun(sp){
  sp.judgedRunCorrect = 0;
  sp.judgedRunTotal = 0;
}
/* 章クリア時に、この周回で解いた選択肢問題（judgedChoice beat）の正答率を確定させる。
   sp.judgedRunCorrect/judgedRunTotalは章を最初から始めるたび（startStoryMode／
   storyReplayChapter）に0リセットされる、章1回分の周回カウンタ。
   このプレイの正答率が自己ベスト（sp.judgedBest[章key]）より高いときだけ上書きする
   （分数の大小比較は掛け算で行い、ゼロ除算・浮動小数の誤差を避ける）。
   自己ベストが今回はじめて100%に達したときだけ、STORY_JUDGED_PERFECT_ITEMを1個渡す
   （すでに100%を達成済みの章を再プレイしても、何度でも入手できてしまわないようにするため）。
   その章にまだ選択肢問題が1問もない場合（total===0）はnullを返し、呼び出し側は何も表示しない。 */
function storyFinalizeJudgedRate(st, sp){
  const total = sp.judgedRunTotal || 0;
  const correct = sp.judgedRunCorrect || 0;
  storyResetJudgedRun(sp);
  if(total === 0) return null;
  if(!sp.judgedBest) sp.judgedBest = {};
  const prev = sp.judgedBest[sp.chapter];
  const isBetter = !prev || correct * prev.total > prev.correct * total;
  const wasPerfect = !!prev && prev.correct >= prev.total;
  if(isBetter) sp.judgedBest[sp.chapter] = {correct, total};
  const nowPerfect = correct >= total;
  let gotPerfectItem = false;
  if(isBetter && nowPerfect && !wasPerfect){
    st.items[STORY_JUDGED_PERFECT_ITEM] = (st.items[STORY_JUDGED_PERFECT_ITEM]||0) + 1;
    gotPerfectItem = true;
  }
  return {correct, total, pct: Math.round(100*correct/total), isBetter, gotPerfectItem};
}
function storyChapterEnd(){
  const st = loadStats();
  const sp = storyProgress(st);
  if(!sp.completedChapters.includes(sp.chapter)) sp.completedChapters.push(sp.chapter);
  const rate = storyFinalizeJudgedRate(st, sp);
  saveStats(st);
  const pronoun = sp.chapter === "ch1" ? STORY_PRONOUN_LABELS[sp.flags.pronoun] : null;
  const pronounNote = pronoun ? `<p class="note">✨ 一人称が、「${esc(pronoun)}」に設定されました！</p>` : "";
  const rateNote = rate
    ? `<p class="note">クリア率 ${rate.pct}%${rate.isBetter ? "　※自己ベストを更新しました！" : ""}</p>`
    : "";
  const perfectNote = rate && rate.gotPerfectItem
    ? `<p class="note">🎉 選択肢問題、全問正解達成！ 🎁<span class="drop-item">【${esc(STORY_JUDGED_PERFECT_ITEM)}】</span>を手に入れた！</p>`
    : "";
  screen.innerHTML = `
    <div class="card story-scene">
      <div class="story-chapter-end">📖 ${esc(STORY_CHAPTERS[sp.chapter].title)} クリア！</div>
      <p class="story-text">${esc(STORY_CHAPTERS[sp.chapter].epilogue || "")}</p>
      ${pronounNote}
      ${rateNote}
      ${perfectNote}
      <div class="btn-row" style="justify-content:center">
        <button class="btn" onclick="showHome()">ホームへ</button>
        <button class="btn secondary" onclick="storyReplayChapter()">もう一度読む</button>
      </div>
      <p class="note">※ボス戦のアイテム・宝具は再プレイではもらえません。選択肢問題の正答率は、今回の記録の方が自己ベストより高い場合だけ更新されます。</p>
    </div>`;
}
/* クリア済みの章を最初からもう一度プレイする。completedChaptersはそのままなので、
   record()や宝具・クリア報酬アイテムのドロップは自動的に封じられる
   （storyGradeQuiz・storyBattleResolve内のisReplay判定を参照）。
   選択肢問題の正答率だけは例外で、自己ベストを上回れば再プレイでも更新される
   （storyFinalizeJudgedRate参照）ので、judgedRunCorrect/judgedRunTotalもここで0に戻す。 */
function storyReplayChapter(){
  const st = loadStats();
  const sp = storyProgress(st);
  sp.beatIdx = 0;
  storyResetJudgedRun(sp);
  saveStats(st);
  storyRun = storyFreshRun();
  storyRenderBeat();
}
/* ================================================================
   ストーリーモード ここまで
   ================================================================ */

bootApp();
</script>
