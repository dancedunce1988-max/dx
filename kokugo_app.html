<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知識ドリルDX</title>
<style>
  :root{
    --bg:#f7f4ee; --card:#ffffff; --ink:#2b2b2b; --sub:#6b6b6b;
    --accent:#c0392b; --accent2:#2c6e63; --line:#e4ded3;
    --ok:#2e7d32; --ng:#c62828; --okbg:#e8f5e9; --ngbg:#fdecea;
    --gold:#b8860b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.7;
    display:flex; justify-content:center; min-height:100vh;
  }
  #app{width:100%; max-width:720px; padding:16px 16px 48px;}
  header{
    display:flex; align-items:baseline; justify-content:space-between;
    padding:12px 4px 16px; border-bottom:3px double var(--line); margin-bottom:16px;
  }
  header h1{font-size:1.35rem; letter-spacing:.15em;}
  header h1 span{color:var(--accent);}
  header h1 .ver-tag{color:var(--sub); font-size:.62rem; letter-spacing:0; margin-left:6px; font-weight:normal; vertical-align:middle;}
  .header-actions{display:flex; gap:8px; flex-shrink:0;}
  header .home-btn{
    background:none; border:1px solid var(--line); border-radius:8px;
    padding:6px 14px; cursor:pointer; font-size:.85rem; color:var(--sub);
  }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:20px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .menu-card{cursor:pointer; transition:transform .1s, box-shadow .1s; display:flex; gap:12px; align-items:center; padding:14px 16px;}
  .menu-card:hover{transform:translateY(-2px); box-shadow:0 4px 10px rgba(0,0,0,.08);}
  .menu-icon{
    font-size:1.3rem; width:44px; height:44px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg); border-radius:10px;
  }
  .menu-card h2{font-size:.98rem; margin-bottom:0;}
  .menu-card p{font-size:.78rem; color:var(--sub);}
  .menu-card .right{margin-left:auto; text-align:right; flex-shrink:0;}
  .menu-card.review{border-left:5px solid var(--accent);}
  .count{font-size:.7rem; color:var(--sub); display:block;}
  .shogo-badge{
    display:inline-block; font-size:.78rem; font-weight:bold; padding:2px 10px;
    border-radius:99px; background:var(--accent2); color:#fff; white-space:nowrap;
  }
  .shogo-badge.top{background:var(--gold);}
  .tag{
    display:inline-block; font-size:.72rem; padding:1px 8px; border-radius:99px;
    background:var(--bg); color:var(--accent2); border:1px solid var(--line); margin-left:6px;
  }
  .session-bar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-bottom:14px; font-size:.85rem; color:var(--sub); flex-wrap:wrap;
  }
  .session-bar .catstat{
    background:linear-gradient(135deg, #2c6e63, #1d4f47); color:#fff;
    border-radius:99px; padding:4px 14px; font-size:.82rem; font-weight:bold;
  }
  .q-category{font-size:.75rem; color:var(--accent2); letter-spacing:.1em; margin-bottom:6px; display:flex; gap:10px; flex-wrap:wrap;}
  .q-category .redo{color:var(--accent); font-weight:bold;}
  .q-sub{font-size:.85rem; color:var(--sub); margin-bottom:4px;}
  .q-text{font-size:1.15rem; font-weight:bold; margin-bottom:16px; white-space:pre-wrap;}
  .tech-mark{
    background:none; color:var(--accent); font-weight:bold;
    text-decoration:underline; text-decoration-thickness:2px; text-underline-offset:3px;
    padding:0 1px;
  }
  .choices{display:flex; flex-direction:column; gap:10px;}
  .choice{
    text-align:left; background:var(--card); border:2px solid var(--line);
    border-radius:10px; padding:12px 16px; font-size:.98rem; cursor:pointer;
    transition:border-color .1s, background .1s; font-family:inherit; line-height:1.6;
  }
  .choice:hover:not(:disabled){border-color:var(--accent2);}
  .choice:disabled{cursor:default;}
  .choice.correct{border-color:var(--ok); background:var(--okbg);}
  .choice.wrong{border-color:var(--ng); background:var(--ngbg);}
  .choice.dim{opacity:.55;}
  .choice.selected{border-color:var(--accent2); background:#eef6f4;}
  .choice-num{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px; height:22px; border-radius:50%; background:var(--bg); color:var(--sub);
    font-size:.75rem; font-weight:bold; margin-right:10px; flex-shrink:0; vertical-align:middle;
  }
  .choice.selected .choice-num{background:var(--accent2); color:#fff;}
  .ans-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .ans-input{
    flex:1; min-width:200px; font-size:1.1rem; padding:12px 14px;
    border:2px solid var(--line); border-radius:10px; font-family:inherit;
  }
  .ans-input:focus{outline:none; border-color:var(--accent2);}
  .ans-input:disabled{background:var(--bg); color:var(--sub);}
  .feedback{margin-top:16px; border-radius:10px; padding:14px 16px; font-size:.92rem; display:none;}
  .feedback.show{display:block;}
  .feedback.ok{background:var(--okbg); border:1px solid var(--ok);}
  .feedback.ng{background:var(--ngbg); border:1px solid var(--ng);}
  .feedback .verdict{font-weight:bold; margin-bottom:4px;}
  .feedback.ok .verdict{color:var(--ok);}
  .feedback.ng .verdict{color:var(--ng);}
  .lvup-chip{
    display:inline-block; background:var(--gold); color:#fff; font-weight:bold;
    font-size:.8rem; border-radius:99px; padding:2px 12px; margin-left:8px;
    animation:pop .35s ease;
  }
  .evolve{
    text-align:center; font-size:1.25rem; font-weight:bold; color:var(--gold);
    background:#fdf6e3; border:2px solid var(--gold); border-radius:12px;
    padding:14px; margin-top:12px; animation:pop .4s ease;
  }
  @keyframes pop{0%{transform:scale(.7); opacity:0;} 100%{transform:scale(1); opacity:1;}}
  .btn{
    display:inline-block; background:var(--accent2); color:#fff; border:none;
    border-radius:10px; padding:12px 28px; font-size:1rem; cursor:pointer;
    font-family:inherit; margin-top:16px;
  }
  .btn.secondary{background:var(--card); color:var(--ink); border:1px solid var(--line);}
  .btn.inline{margin-top:0; padding:12px 20px;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap;}
  .passage{
    background:#fffdf7; border:1px solid var(--line); border-radius:10px;
    padding:18px; font-size:.95rem; margin-bottom:18px; max-height:320px; overflow-y:auto;
  }
  .passage p{text-indent:1em; margin-bottom:.4em;}
  .passage-title{font-weight:bold; margin-bottom:8px; text-indent:0 !important;}
  .result-score{font-size:2.6rem; font-weight:bold; text-align:center; color:var(--accent2); margin:8px 0;}
  .result-msg{text-align:center; color:var(--sub); margin-bottom:8px;}
  table.stats{width:100%; border-collapse:collapse; font-size:.86rem;}
  table.stats th, table.stats td{padding:8px 6px; border-bottom:1px solid var(--line); text-align:left;}
  table.stats td.num{text-align:right;}
  .bar{height:8px; background:var(--line); border-radius:99px; overflow:hidden; margin-top:4px;}
  .bar > div{height:100%; background:var(--accent2);}
  .weak{color:var(--accent); font-size:.8rem;}
  /* ================= 漢字の書き取り学習 ================= */
  .kw-level-card.disabled{cursor:default; opacity:.5;}
  .kw-level-card.disabled:hover{transform:none; box-shadow:none;}
  .kw-level-tag{
    display:inline-block; background:var(--accent2); color:#fff; font-weight:bold;
    border-radius:99px; padding:2px 12px; font-size:.85rem; margin-right:8px; flex-shrink:0;
  }
  .kw-level-acc{font-size:.78rem; color:var(--sub);}
  .kw-sentence{
    font-size:1.55rem; font-weight:bold; line-height:1.9; margin:20px 0 22px; text-align:center;
    white-space:pre-wrap;
  }
  .kw-answer-box{text-align:center; margin:18px 0 22px;}
  .kw-answer-kanji{
    font-family:"UD Digital 教科書体 NP-R","UDデジタル教科書体N-R","HGS教科書体","HG教科書体","Yu Mincho",serif;
    font-size:4.2rem; font-weight:normal; color:var(--accent2); line-height:1.2;
  }
  .kw-info-card{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:16px 18px; margin-top:4px; font-size:.9rem; line-height:1.8;
  }
  .kw-info-card h4{font-size:.85rem; color:var(--accent2); margin-bottom:4px;}
  .kw-info-card .kw-char-block{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
  .kw-info-card .kw-char-block:first-child{margin-top:0; padding-top:0; border-top:none;}
  .kw-selfjudge-row{display:flex; gap:12px; margin-top:20px;}
  .kw-ok-btn, .kw-ng-btn{
    flex:1; border:none; border-radius:10px; padding:16px; font-size:1.05rem; font-weight:bold;
    cursor:pointer; font-family:inherit;
  }
  .kw-ok-btn{background:var(--ok); color:#fff;}
  .kw-ng-btn{background:var(--ng); color:#fff;}
  .kw-lv-badge{
    text-align:center; font-weight:bold; color:var(--accent2); margin-bottom:14px; font-size:1.05rem;
  }
  .note{font-size:.78rem; color:var(--sub); margin-top:10px;}
  h3.section{font-size:1rem; margin:18px 0 10px; padding-left:10px; border-left:4px solid var(--accent);}
  h3.section:first-child{margin-top:0;}
  .mastery{display:flex; gap:14px; font-size:.8rem; color:var(--sub); margin-top:8px; flex-wrap:wrap;}
  .mastery b{color:var(--ink);}
  ul.misslist{list-style:none; margin-top:6px;}
  ul.misslist li{
    padding:8px 4px; border-bottom:1px dashed var(--line); font-size:.88rem;
    display:flex; justify-content:space-between; gap:10px; align-items:baseline;
  }
  ul.misslist .cat{font-size:.72rem; color:var(--accent2); white-space:nowrap;}
  ul.titlelist{list-style:none; font-size:.88rem; columns:2; column-gap:24px;}
  ul.titlelist li{padding:4px 0; border-bottom:1px dashed var(--line); break-inside:avoid;}
  .signature{text-align:right; font-size:.68rem; color:var(--line); margin-top:18px; letter-spacing:.05em;}
  .kotonoha-card{background:linear-gradient(135deg,#fffdf7,#fbf2e0);}
  .kotonoha-row{display:flex; gap:16px; align-items:center;}
  .kotonoha-icon{
    font-size:2.4rem; width:64px; height:64px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg); border-radius:50%; border:2px solid var(--line);
    cursor:pointer;
  }
  .kotonoha-icon.kotonoha-type1{filter:grayscale(.75) brightness(.85); border-color:#9a9284;}
  .kotonoha-icon.kotonoha-type2{border-color:var(--accent2);}
  .kotonoha-icon.kotonoha-type3{filter:saturate(1.5) brightness(1.05); border-color:#e08a2b; box-shadow:0 0 10px rgba(224,138,43,.35);}
  .kotonoha-icon.kotonoha-type4{filter:saturate(1.35); border-color:var(--gold); box-shadow:0 0 14px rgba(184,134,11,.55);}
  .kotonoha-icon.kotonoha-type5{filter:saturate(1.5) brightness(1.05); border-color:#e0512b; box-shadow:0 0 10px rgba(224,81,43,.4);}
  .kotonoha-icon.kotonoha-type6{filter:saturate(1.5) brightness(1.05); border-color:#2b9ee0; box-shadow:0 0 10px rgba(43,158,224,.4);}
  .kotonoha-icon.kotonoha-type7{filter:saturate(1.5) brightness(1.05); border-color:#8a5ce0; box-shadow:0 0 10px rgba(138,92,224,.4);}
  .kotonoha-icon.kotonoha-type8{filter:saturate(1.5) brightness(1.05); border-color:#e02b8a; box-shadow:0 0 10px rgba(224,43,138,.4);}
  .kotonoha-icon.kotonoha-type9{filter:saturate(1.5) brightness(1.05); border-color:#e068a8; box-shadow:0 0 10px rgba(224,104,168,.4);}
  .kotonoha-icon.kotonoha-overridden{border-color:#8e44ad; box-shadow:0 0 10px rgba(142,68,173,.5);}
  .kotonoha-info{flex:1; min-width:0;}
  .kotonoha-name{font-weight:bold; font-size:1.05rem;}
  .kotonoha-stage{
    display:inline-block; font-size:.68rem; font-weight:bold; color:#fff; background:var(--sub);
    border-radius:6px; padding:1px 7px; margin-right:6px; vertical-align:middle;
  }
  .kotonoha-stage.final{ background:var(--gold); box-shadow:0 0 8px rgba(184,134,11,.6); }
  .kotonoha-type{
    display:inline-block; font-size:.7rem; color:var(--accent2); background:var(--bg);
    border:1px solid var(--line); border-radius:99px; padding:1px 10px; margin:3px 0 5px;
  }
  .kotonoha-xp{font-size:.82rem; color:var(--sub); margin-top:2px; margin-bottom:2px;}
  .ticket-card{ padding:14px 20px; }
  .ticket-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .ticket-info{ display:flex; align-items:center; gap:8px; }
  .ticket-icon{ font-size:1.4rem; }
  .ticket-label{ font-weight:bold; }
  .ticket-count{ font-size:1.1rem; font-weight:bold; color:var(--gold); }
  .btn.disabled{ opacity:.4; cursor:default; pointer-events:none; }
  .kanbun-box{
    writing-mode: vertical-rl; text-orientation: upright;
    font-size:1.6rem; line-height:2.3; letter-spacing:.05em;
    background:#fffdf7; color:#2b2b2b; border:1px solid var(--line); border-radius:10px;
    padding:20px 26px; margin-bottom:16px; display:inline-block; min-height:170px;
  }
  .kb-char{ position:relative; display:inline-block; }
  .kb-ok{
    position:absolute; right:-.25em; bottom:.05em;
    font-size:.4em; color:var(--sub); line-height:1; white-space:nowrap;
  }
  .kb-mark{
    position:absolute; left:-.25em; bottom:.05em;
    font-size:.46em; color:var(--accent); font-weight:bold; line-height:1; white-space:nowrap;
  }
  .kanbun-mini{
    writing-mode: vertical-rl; text-orientation: upright;
    font-size:1.15rem; line-height:1.9; letter-spacing:.05em;
    display:inline-block; padding:2px 16px 2px 6px; vertical-align:middle;
  }
  .choice{ display:flex; align-items:center; }
  .battle-hp-wrap{display:flex; align-items:center; gap:10px;}
  .battle-side{flex:1; min-width:0; opacity:.6; transition:opacity .15s;}
  .battle-side.active{opacity:1;}
  .battle-name{font-size:.85rem; font-weight:bold; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .hpbar{height:14px; background:var(--line); border-radius:99px; overflow:hidden;}
  .hpbar>div{height:100%; transition:width .4s ease; background:var(--accent2);}
  .hpbar-b>div{background:var(--accent);}
  .hp-num{font-size:.72rem; color:var(--sub); text-align:right; margin-top:2px;}
  .vs-badge{font-weight:bold; color:var(--sub); font-size:.85rem; flex-shrink:0;}
  .battle-turn-tag{
    display:inline-block; background:var(--accent); color:#fff; font-size:.72rem;
    font-weight:bold; border-radius:99px; padding:2px 10px; margin-left:8px;
  }
  /* 二人対戦の準備画面（名前入力・ジャンル選択）：闘技場をイメージした専用の雰囲気にする */
  .battle-setup-screen{
    background:linear-gradient(160deg,#160d0d,#301010 55%,#160d0d); color:#ffece6;
    border:1px solid rgba(255,120,90,.35); box-shadow:0 0 30px rgba(255,90,50,.2);
    text-align:center; padding:30px 20px;
  }
  .battle-setup-title{font-size:1.25rem; font-weight:bold; margin-bottom:8px; letter-spacing:.06em; text-shadow:0 0 12px rgba(255,120,90,.7);}
  .battle-setup-sub{font-size:.85rem; color:#e0b8ac; margin-bottom:20px; line-height:1.7;}
  .battle-vs-row{display:flex; align-items:flex-end; justify-content:center; gap:14px; flex-wrap:wrap;}
  .battle-name-box{flex:1; min-width:130px; max-width:220px;}
  .battle-name-box label{display:block; font-size:.72rem; color:#e0b8ac; margin-bottom:6px;}
  .battle-name-input{
    width:100%; font-size:1rem; padding:10px 12px; border-radius:8px;
    border:2px solid rgba(255,120,90,.4); background:rgba(255,255,255,.08); color:#fff;
    font-family:inherit; text-align:center;
  }
  .battle-name-input:focus{outline:none; border-color:#ff7a5a;}
  .battle-vs-mark{font-weight:bold; font-size:1.1rem; color:#ff9a7a; padding-bottom:10px; flex-shrink:0;}
  .battle-genre-choice{display:flex; flex-direction:column; gap:12px; margin-top:14px;}
  .battle-genre-btn{
    background:rgba(255,255,255,.07); color:#ffece6; border:2px solid rgba(255,120,90,.4);
    border-radius:12px; padding:16px 20px; font-size:1rem; cursor:pointer; font-family:inherit;
    text-align:left; transition:all .15s;
  }
  .battle-genre-btn:hover{background:rgba(255,120,90,.18); border-color:#ff9a7a;}
  .battle-genre-btn .big{font-size:1.05rem; font-weight:bold; display:block; margin-bottom:4px;}
  .battle-genre-btn .small{font-size:.76rem; color:#e0b8ac; display:block;}
  .genre-pick-grid{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 18px;}
  .genre-pick-chip{
    background:var(--card); border:2px solid var(--line); color:var(--ink);
    border-radius:99px; padding:8px 16px; font-size:.85rem; cursor:pointer; font-family:inherit; transition:all .12s;
  }
  .genre-pick-chip:hover{border-color:var(--accent);}
  .genre-pick-chip.on{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:bold;}
  /* ボス戦：あえて他の画面と全く違う、黒ベースの特別な雰囲気にする */
  .boss-encounter{
    background:linear-gradient(160deg,#0d0d16,#1a1030 60%,#0d0d16); color:#f0e6ff;
    text-align:center; padding:32px 20px; border:1px solid rgba(180,140,255,.35);
    box-shadow:0 0 30px rgba(140,90,255,.25);
  }
  .boss-enc-icon{ font-size:3rem; margin-bottom:12px; filter:drop-shadow(0 0 10px rgba(180,140,255,.6)); }
  .boss-enc-text{ font-size:1.05rem; line-height:1.7; margin-bottom:20px; }
  .boss-lv-tag{
    display:inline-block; background:rgba(180,140,255,.3); color:#f0e6ff; font-size:.72rem;
    font-weight:bold; border-radius:99px; padding:2px 10px; margin-left:4px; vertical-align:middle;
  }
  .boss-enc-choices{ display:flex; gap:14px; justify-content:center; }
  .boss-enc-btn{
    background:rgba(255,255,255,.07); color:#f0e6ff; border:2px solid rgba(180,140,255,.4);
    border-radius:10px; padding:12px 30px; font-size:1rem; cursor:pointer; font-family:inherit;
    transition:all .15s;
  }
  .boss-enc-btn.selected{
    background:rgba(180,140,255,.35); border-color:#d8c2ff; box-shadow:0 0 16px rgba(180,140,255,.7);
  }
  .boss-enc-hint{ color:#9a8ec2; margin-top:16px; }
  .boss-battle-screen{
    background:linear-gradient(160deg,#0d0d16,#1a1030 55%,#0d0d16); color:#f0e6ff;
    border-radius:14px; padding:22px 18px; margin-bottom:14px;
    border:1px solid rgba(180,140,255,.35); box-shadow:0 0 30px rgba(140,90,255,.25);
  }
  .boss-name{
    font-size:1.2rem; font-weight:bold; text-align:center; margin-bottom:16px;
    letter-spacing:.06em; text-shadow:0 0 12px rgba(180,140,255,.8);
  }
  .boss-hpbars{ margin-bottom:6px; }
  .boss-hp-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:.82rem; }
  .boss-hp-label{ width:78px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .boss-hp-row .hpbar{ flex:1; height:12px; background:rgba(255,255,255,.12); }
  .boss-hpbar > div{ background:linear-gradient(90deg,#ff4d6d,#ff9bb0) !important; }
  .player-hpbar > div{ background:linear-gradient(90deg,#4dd0e1,#9be8f5) !important; }
  .boss-hp-num{ width:82px; text-align:right; flex-shrink:0; font-size:.78rem; }
  .boss-q-card{ background:rgba(255,255,255,.05); border-radius:10px; padding:16px; margin-top:14px; }
  .boss-q-text{ font-size:1.1rem; font-weight:bold; margin-bottom:14px; white-space:pre-wrap; }
  .boss-turn{
    margin-top:10px; padding-top:10px; border-top:1px dashed rgba(255,255,255,.25);
    color:#ffb0c0; font-weight:bold; animation:pop .3s ease;
  }
  .boss-battle-screen .q-sub{ color:#bfb0e0; }
  .boss-battle-screen .choice{
    background:rgba(255,255,255,.06); border-color:rgba(180,140,255,.35); color:#f0e6ff;
  }
  .boss-battle-screen .choice:hover:not(:disabled){ border-color:#d8c2ff; }
  .boss-battle-screen .choice.selected{ background:rgba(180,140,255,.3); border-color:#d8c2ff; }
  .boss-battle-screen .choice.correct{ border-color:#4dd0e1; background:rgba(77,208,225,.18); }
  .boss-battle-screen .choice.wrong{ border-color:#ff4d6d; background:rgba(255,77,109,.18); }
  .boss-battle-screen .choice-num{ background:rgba(255,255,255,.12); color:#f0e6ff; }

<script>
"use strict";

/* ================= 設定 ================= */
const MAX_CAT_LV = 10000;  // 分野ごとのレベル上限
const LV_PER_STEP = 30;    // 約30レベルごとに問題の難度が1段階上がる（既存プレイヤーの出題目標レベルの初期値を決めるためだけに使う。以後はDIFF_LV_STEPで毎回上下する）
const DIFF_LV_STEP = 0.5;  // 正解/不正解のたびに、出題目標レベルがこの分だけ上下する（適応的な難度調整）
const GROUP_ICONS = {"漢字":"✏️","語彙":"💬","文法":"🔍","古典・表現":"🎋"};

/* 分野ごとの問題文（指示文）テンプレート。
   replace: 元の s（ヒント文）をこの指示文で置きかえて表示
   append : 元の s（穴埋めの手がかり等）はそのまま残し、この指示文を下に追加表示 */
const CAT_INSTRUCTION = {
  kanji_yomi: {mode:"replace", text:"［　］内の漢字の読み方を、ひらがなで書いてください。"},
  okurigana:  {mode:"replace", text:"送り仮名までふくめて、読み方をひらがなで書いてください。"},
  kanazukai:  {mode:"replace", text:"現代仮名遣いに直して、ひらがなで書いてください。"},
  busyu:      {mode:"replace", text:"部首の読みとして正しいものを選んでください。"},
  jukugo:     {mode:"replace", text:"熟語の構成として正しいものを選んでください。"},
  goi:        {mode:"replace", text:"意味として正しいものを選んでください。"},
  taigigo:    {mode:"replace", text:"対義語として正しいものを選んでください。"},
  ruigigo:    {mode:"replace", text:"類義語として正しいものを選んでください。"},
  yoji:       {mode:"replace", text:"意味として正しいものを選んでください。"},
  kotowaza:   {mode:"append",  text:"空欄に入る言葉として正しいものを選んでください。"},
  kanyoku:    {mode:"append",  text:"空欄に入る言葉として正しいものを選んでください。"},
  koji:       {mode:"append",  text:"ここから生まれた言葉として正しいものを選んでください。"},
  keigo:      {mode:"replace", text:"敬語として正しいものを選んでください。"},
  hinshi:     {mode:"replace", text:"品詞として正しいものを選んでください。"},
  katsuyo:    {mode:"replace", text:"活用の種類として正しいものを選んでください。"},
  shikibetsu: {mode:"append",  text:"正しいものを選んでください。"},
  kobun:      {mode:"replace", text:"意味として正しいものを選んでください。"},
  kigo:       {mode:"replace", text:"季節として正しいものを選んでください。"},
};
const DOKKAI_INSTRUCTION = "正しいものを選んでください。";
function subInstructionHtml(cat, it){
  if(it.instr) return `<div class="q-sub">${esc(it.instr)}</div>`;
  const cfg = CAT_INSTRUCTION[cat];
  if(!cfg) return it.s ? `<div class="q-sub">${esc(it.s)}</div>` : "";
  if(cfg.mode === "replace") return `<div class="q-sub">${esc(cfg.text)}</div>`;
  return (it.s ? `<div class="q-sub">${esc(it.s)}</div>` : "") + `<div class="q-sub">${esc(cfg.text)}</div>`;
}
/* 漢文の返り点つき原文を、縦書き＋送り仮名・返り点記号つきで表示する（it.kb がある問題のみ）。
   送り仮名（読みを補うカタカナ）を先に、返り点（レ・一二点など）をその後に、
   どちらも字のすぐ下に小さく添える。 */
function kanbunCharsHtml(kb){
  return kb.map(c => {
    const ok = c.ok ? `<span class="kb-ok">${esc(c.ok)}</span>` : "";
    const mark = c.mark ? `<span class="kb-mark">${esc(c.mark)}</span>` : "";
    return `<span class="kb-char">${esc(c.ch)}${ok}${mark}</span>`;
  }).join("");
}
function kanbunBoxHtml(kb){
  if(!kb) return "";
  return `<div class="kanbun-box">${kanbunCharsHtml(kb)}</div>`;
}
/* 選択肢の中に入れる、ひとまわり小さい縦書きボックス（返り点配置を選ばせる問題用） */
function kanbunMiniHtml(kb){
  if(!kb) return "";
  return `<span class="kanbun-mini">${kanbunCharsHtml(kb)}</span>`;
}

/* 称号（分野ごと。上にいくほど間隔が広く、昇格が難しい） */
const TITLES = [
  {lv:1,    name:"むらびと",     icon:"🌱"},
  {lv:10,   name:"村人",         icon:"🙂"},
  {lv:30,   name:"一般人",       icon:"🚶"},
  {lv:60,   name:"見習い剣士",   icon:"🗡️"},
  {lv:100,  name:"剣士",         icon:"⚔️"},
  {lv:150,  name:"戦士",         icon:"🛡️"},
  {lv:210,  name:"騎士",         icon:"🐎"},
  {lv:280,  name:"銀の騎士",     icon:"🌙"},
  {lv:360,  name:"黄金の騎士",   icon:"☀️"},
  {lv:450,  name:"竜騎士",       icon:"🐉"},
  {lv:550,  name:"賢者",         icon:"📜"},
  {lv:660,  name:"大賢者",       icon:"🔮"},
  {lv:780,  name:"英雄",         icon:"🏆"},
  {lv:900,  name:"伝説の勇者",   icon:"👑"},
];
/* Lv.1000から先は100レベルごとの「かくし称号」。
   伝説の生き物・妖怪がだんだん強くなり、Lv.10000で頂点に至る。
   到達するまで名前は「？？？」のまま明かされない。 */
const HIDDEN_NAMES = [
  /* 1000〜: 妖怪（小） */
  "コロポックル","一つ目小僧","豆狸","河童","唐傘お化け","化け猫","ろくろ首","雪女","かまいたち","からす天狗",
  /* 2000〜: 妖怪（大） */
  "狛犬","白狐","鬼","天狗","土蜘蛛","がしゃどくろ","ぬらりひょん","酒呑童子","大天狗","九尾の狐",
  /* 3000〜: 西洋の幻獣 */
  "ユニコーン","ペガサス","セイレーン","ミノタウロス","サイクロプス","グリフォン","ケルベロス","メドゥーサ","キマイラ","ヒュドラ",
  /* 4000〜: 大型の魔獣 */
  "ワイバーン","マンティコア","バジリスク","グレンデル","シーサーペント","クラーケン","ロック鳥","スフィンクス","ベヒーモス","リヴァイアサン",
  /* 5000〜: 和の神獣 */
  "八咫烏","白澤","白虎","朱雀","玄武","青龍","麒麟","鳳凰","応龍","ヤマタノオロチ",
  /* 6000〜: 世界の神話級 */
  "ガルーダ","ナーガ","ケツァルコアトル","スレイプニル","ニーズヘッグ","フェンリル","ヨルムンガンド","ヴリトラ","バハムート","ティアマト",
  /* 7000〜: 竜のつらなり */
  "火竜","氷竜","雷竜","地竜","風竜","海竜","天竜","聖竜","魔竜","古代竜",
  /* 8000〜: 竜の王たち */
  "竜王","双頭の竜王","黄金竜","虹竜","星竜","月竜","太陽竜","銀河竜","時空竜","冥竜",
  /* 9000〜: 究極の存在 */
  "創世竜","神竜","超神竜","天地の主","星々の王","銀河の覇者","時の支配者","宇宙の支配者","全知全能の存在","森羅万象",
];
const HIDDEN_ICONS = ["👻","👹","🦄","🐙","🐯","🐍","🐉","👑","🌌"];
HIDDEN_NAMES.forEach((nm, i)=>{
  TITLES.push({lv:1000 + i*100, name:nm, icon:HIDDEN_ICONS[Math.floor(i/10)] || "🌌", hidden:true});
});
TITLES.push({lv:10000, name:"国語の神", icon:"⛩️", hidden:true});
function titleOf(lv){
  let t = TITLES[0];
  for(const x of TITLES){ if(lv >= x.lv) t = x; }
  return t;
}
function nextTitle(lv){
  for(const x of TITLES){ if(x.lv > lv) return x; }
  return null;
}

/* ================= データ読み込みチェック ================= */
const screen = document.getElementById("screen");
if(!window.QUESTION_DATA || !window.QUESTION_DATA.cats){
  screen.innerHTML = `<div class="card"><h3 class="section">問題データが見つかりません</h3>
   <p>問題データファイル <b>kokugo_data.js</b> が、このHTMLと同じフォルダにあるか確認してください。</p></div>`;
  throw new Error("QUESTION_DATA not found");
}
const DATA = window.QUESTION_DATA;
const CATS = DATA.cats;
const CAT_KEYS = Object.keys(CATS);
const DOKKAI = DATA.dokkai || [];
const MAX_LV = {};
CAT_KEYS.forEach(k => MAX_LV[k] = Math.max(...CATS[k].items.map(it => it.lv)));

/* 各問題には、学習指導要領・教科書の内容をもとに判定した「学年の目安」(grade, 1〜6)が付与されている。
   1:小学校中学年 2:小学校高学年 3:中学校1年 4:中学校2年 5:中学校3年 6:高校以上
   出題目標レベル(diffLv)にいちばん近いlvを持つ問題群の平均gradeから、今のおおよその学年を推定する。 */
const GRADE_LABELS = {1:"小学校中学年", 2:"小学校高学年", 3:"中学校1年", 4:"中学校2年", 5:"中学校3年", 6:"高校以上"};
function estimateGrade(cat, diffLv){
  const items = CATS[cat].items;
  if(!items.length || items.some(it => typeof it.grade !== "number")) return null;
  const targetLv = Math.round(diffLv);
  let nearestLv = items[0].lv, minDiff = Math.abs(items[0].lv - targetLv);
  items.forEach(it => { const d = Math.abs(it.lv - targetLv); if(d < minDiff){ minDiff = d; nearestLv = it.lv; } });
  const pool = items.filter(it => it.lv === nearestLv);
  const avgGrade = pool.reduce((s,it) => s + it.grade, 0) / pool.length;
  return Math.min(6, Math.max(1, Math.round(avgGrade)));
}

/* ================= 記録（localStorage、使えない環境ではメモリ） ================= */
const STORE_KEY = "kokugoTrainingStats_v5";
/* セーブデータの一方向互換ルール：
   古いverで保存した記録は、新しいverでも読み込める（loadStats側のデフォルト補完で対応）。
   逆に、新しいverで保存した記録は、古いver（更新前のファイルがキャッシュされた端末など）では
   絶対に読み込めないようにする。読み込めてしまうと、古いコードが新しい形式を誤解釈して
   記録を壊し、そのまま上書き保存してしまう危険があるため。
   このアプリを更新するたびに、SAVE_FORMAT_VERSIONを必ず1つ増やすこと。 */
const SAVE_FORMAT_VERSION = 2;
function isSaveFromNewerVersion(st){
  return !!st && typeof st.saveFormatVer === "number" && st.saveFormatVer > SAVE_FORMAT_VERSION;
}
let memStats = null;
function emptyStats(){
  const cats = {dokkai:{t:0,c:0}};
  const lv = {dokkai:1};
  const diffLv = {};
  CAT_KEYS.forEach(k => { cats[k] = {t:0,c:0}; lv[k] = 1; diffLv[k] = 1; });
  return {cats, q:{}, lv, diffLv, items:{}, bossPity:{}, kotonohaOtherRoll:null, bossTickets:0, totalLevelUps:0,
    stats:{hp:0, atk:0, def:0, spd:0, luck:0}, kotonohaSeenForms:[], kotonohaDisplayOverride:null,
    kanjiWrite:{totalOk:0, itemHist:{}, levelRecent:{}}};
}
/* ステータスポイントは保存された数値ではなく、常にその場で計算する：
   「分野レベルの合計（＝これまで獲得した経験値の合計）」から「すでに割りふった分」を引いた残り。
   分野レベルは最初から正確に記録されているので、statPointsをいつ導入したかに関係なく、
   前から遊んでいるプレイヤーの過去の経験値もすべて正しく反映される。 */
function totalEarnedStatPoints(st){
  return CAT_KEYS.reduce((sum,k) => sum + Math.max(0, (st.lv[k]||1) - 1), 0);
}
function spentStatPoints(st){
  return Object.values(st.stats||{}).reduce((sum,v) => sum + (v||0), 0);
}
function unspentStatPoints(st){
  return Math.max(0, totalEarnedStatPoints(st) - spentStatPoints(st));
}
function loadStats(){
  try{
    const s = localStorage.getItem(STORE_KEY);
    if(s){
      const st = JSON.parse(s);
      if(st && st.cats && st.q && st.lv){
        CAT_KEYS.concat(["dokkai"]).forEach(k => {
          if(!st.cats[k]) st.cats[k] = {t:0,c:0};
          if(!st.lv[k]) st.lv[k] = 1;
        });
        if(!st.items) st.items = {};
        if(!st.bossPity) st.bossPity = {};
        if(typeof st.bossTickets !== "number") st.bossTickets = 0;
        if(typeof st.totalLevelUps !== "number") st.totalLevelUps = 0;
        delete st.statPoints; // 旧バージョンの保存値。今後は使わず、常に導出する
        if(!st.stats) st.stats = {hp:0, atk:0, def:0, luck:0};
        if(typeof st.stats.spd !== "number") st.stats.spd = 0;
        if(!st.diffLv) st.diffLv = {};
        /* 出題目標レベルが未設定の分野は、これまでの分野レベルから相当する値を初期値にする
           （新しい仕組み導入前からのプレイヤーも、急に極端な難度から始まらないようにするため） */
        CAT_KEYS.forEach(k => {
          if(typeof st.diffLv[k] !== "number") st.diffLv[k] = targetLv(k, st.lv[k]||1);
        });
        if(!st.kanjiWrite) st.kanjiWrite = {totalOk:0, itemHist:{}, levelRecent:{}};
        if(!st.kanjiWrite.itemHist) st.kanjiWrite.itemHist = {};
        if(!st.kanjiWrite.levelRecent) st.kanjiWrite.levelRecent = {};
        if(typeof st.kanjiWrite.totalOk !== "number") st.kanjiWrite.totalOk = 0;
        if(!Array.isArray(st.kotonohaSeenForms)) st.kotonohaSeenForms = [];
        if(st.kotonohaDisplayOverride === undefined) st.kotonohaDisplayOverride = null;
        /* 旧バージョンで「その他型」が固定されていた場合、今の見た目をそのまま引き継ぐ
           （次に進化するタイミングから、新しいランダム抽選のしくみに切りかわる）。 */
        if(!st.kotonohaOtherRoll && KOTONOHA_OTHER_TYPES.includes(st.kotonohaBranch)){
          st.kotonohaOtherRoll = {stageIdx: kotonohaStageIndex(kotonohaTotalXP(st)), type: st.kotonohaBranch};
        }
        if(st.kotonohaOtherRoll === undefined) st.kotonohaOtherRoll = null;
        delete st.kotonohaBranch;
        return st;
      }
    }
  }catch(e){}
  return memStats || emptyStats();
}
function saveStats(st){
  st.saveFormatVer = SAVE_FORMAT_VERSION;
  memStats = st;
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(st)); }catch(e){}
}
function qKey(cat, qText){
  let h = 5381;
  for(let i=0;i<qText.length;i++){ h = ((h<<5)+h+qText.charCodeAt(i))|0; }
  return cat + "|" + (h>>>0).toString(36);
}
/* 直近何問ぶんの正誤で正答率を見るか、正答率がどこを下回るとレベルアップを止めるか。
   4択を適当に選ぶと正答率は理論上25%になるが、直近10問など短い区間だとブレが大きく、
   たまたま閾値を超えて素通りしてしまうことが多かった。30問でまとめて見ることでブレを抑えている。
   30問・30%にすると、乱択（25%）は約56%の確率でレベルアップが止まる一方、
   まじめに取り組んでいるプレイヤー（正答率40%以上）にはほとんど影響しないことを確認している。 */
const RECENT_ACC_WINDOW = 30;
const RECENT_ACC_THRESHOLD = 0.3;
/* 正誤を記録。正解ならその分野のレベル+1。ただし直近の正答率が極端に低いとき（適当に答えている
   おそれがあるとき）はレベルアップを止める。{lvup, evolved, lv, gotTicket, lowAccuracy} を返す */
function record(cat, item, correct){
  const st = loadStats();
  st.cats[cat].t++; if(correct) st.cats[cat].c++;
  const key = qKey(cat, item.q);
  if(!st.q[key]) st.q[key] = {t:0, c:0, k:0, cat, q:item.q};
  st.q[key].t++; if(correct) st.q[key].c++;
  st.q[key].k = correct ? (st.q[key].k||0)+1 : 0;   // 連続正解数
  if(MAX_LV[cat]){
    if(!st.diffLv) st.diffLv = {};
    const maxLv = MAX_LV[cat];
    const curDiff = typeof st.diffLv[cat] === "number" ? st.diffLv[cat] : 1;
    st.diffLv[cat] = correct
      ? Math.min(maxLv, curDiff + DIFF_LV_STEP)
      : Math.max(1, curDiff - DIFF_LV_STEP);
  }
  if(!st.recentCorrect) st.recentCorrect = {};
  const recent = (st.recentCorrect[cat] || []).slice();
  recent.push(correct ? 1 : 0);
  while(recent.length > RECENT_ACC_WINDOW) recent.shift();
  st.recentCorrect[cat] = recent;
  const recentAcc = recent.reduce((a,b)=>a+b, 0) / recent.length;
  const lowAccuracy = recent.length >= RECENT_ACC_WINDOW && recentAcc < RECENT_ACC_THRESHOLD;

  let lvup = false, evolved = null, gotTicket = false;
  if(correct && !lowAccuracy && st.lv[cat] < MAX_CAT_LV){
    const before = titleOf(st.lv[cat]);
    st.lv[cat]++;
    lvup = true;
    st.totalLevelUps = (st.totalLevelUps||0) + 1;
    if(st.totalLevelUps % 10 === 0){
      st.bossTickets = (st.bossTickets||0) + 1;
      gotTicket = true;
    }
    const after = titleOf(st.lv[cat]);
    if(after !== before) evolved = after;
  }
  saveStats(st);
  return {lvup, evolved, lv:st.lv[cat], gotTicket, lowAccuracy: correct && lowAccuracy};
}
function qStat(st, cat, item){ return st.q[qKey(cat, item.q)] || null; }

/* ================= 出題の重みづけ =================
   [履歴] 正解するたび×0.75で出づらく、間違えるたび×1.5で出やすく
          （0.05〜8倍。ゼロにはならない）
   [難度] 出題目標レベル（st.diffLv[cat]）に近い問題ほど出やすい。
          正解するたび目標レベルが少し上がり、間違えるたび少し下がる（record()内、DIFF_LV_STEP刻み）ので、
          正解が続けばやや難しい問題が、間違いが続けばやや簡単な問題が出やすくなっていく。 */
function historyWeight(st, cat, item){
  const s = qStat(st, cat, item);
  if(!s || s.t === 0) return 1.2;
  const wrong = s.t - s.c;
  const w = Math.pow(0.75, s.c) * Math.pow(1.5, wrong);
  return Math.max(0.05, Math.min(8, w));
}
/* 苦手復習専用の重みづけ：不正解率（不正解数÷回答数）が高いほど出やすくする */
function reviewWeight(st, cat, item){
  const s = qStat(st, cat, item);
  if(!s || s.t === 0) return 1;
  const wrongRate = (s.t - s.c) / s.t;   // 0〜1
  return 0.2 + wrongRate * wrongRate * 12;   // 不正解率が高いほど、急激に出やすくなる
}
/* 出題目標レベルの初期値（分野レベルから換算）。新しい難度調整の仕組み導入前からの
   プレイヤーの出題目標レベルに、最初の値を与えるためだけに使う（loadStatsのマイグレーション参照）。 */
function targetLv(cat, catLv){
  return 1 + Math.min(MAX_LV[cat] - 1, (catLv - 1) / LV_PER_STEP);
}
function difficultyWeight(cat, item, diffLv){
  return Math.exp(-1.2 * Math.abs(item.lv - diffLv));
}
function pickOne(pool, weights){
  let total = 0;
  for(const w of weights) total += w;
  let r = Math.random() * total;
  for(let i=0;i<pool.length;i++){
    r -= weights[i];
    if(r <= 0) return pool[i];
  }
  return pool[pool.length-1];
}
const CONFIRM_CHECK_RATE = 0.1; // 目標レベルが上がりきっても、他のレベルの理解が抜け落ちていないか、ときどき確認するための確率
/* 分野から1問選ぶ（直前の問題はさける）。
   CONFIRM_CHECK_RATEの確率で、今の目標レベルによる重みづけをやめて、その分野の全問題から
   レベルに関係なく1問ごとに均等に出題する（「確認チェック」）。目標レベルが上がりきったプレイヤーが、
   簡単な問題や中くらいの問題をずっと出題されないまま、そこでの理解の抜けに気づけない、という状態を
   防ぐため。（historyWeightによる「すでによく正解している問題は出にくい」という重みづけだけは、
   確認チェックでも生かしておく。）正解・不正解の結果は通常どおり目標レベルに反映されるので、この
   確認チェックで間違えれば目標レベルもきちんと下がる。 */
function selectOne(cat, lastQ){
  const st = loadStats();
  let pool = CATS[cat].items;
  if(pool.length > 1 && lastQ) pool = pool.filter(it => it.q !== lastQ);
  const isConfirmCheck = Math.random() < CONFIRM_CHECK_RATE;
  const diffLv = typeof st.diffLv[cat] === "number" ? st.diffLv[cat] : 1;
  const weights = pool.map(it => historyWeight(st, cat, it) * (isConfirmCheck ? 1 : difficultyWeight(cat, it, diffLv)));
  return pickOne(pool, weights);
}
function weakItems(){
  const st = loadStats();
  const list = [];
  CAT_KEYS.forEach(cat=>{
    CATS[cat].items.forEach(it=>{
      const s = qStat(st, cat, it);
      /* 一度でも間違えた問題のうち、まだ2回連続正解できていないもの */
      if(s && s.t > 0 && s.c < s.t && (s.k||0) < 2) list.push({cat, it});
    });
  });
  return list;
}

/* ================= 共通 ================= */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
/* 問題文中の《…》を、太字＋下線の強調表示に変換する（表現技法などで、該当箇所を示すのに使う）。
   《》を含まない通常の問題文は、esc(q)と同じ結果になる（安全に共通で使える）。 */
function markQuestionHtml(q){
  return String(q).split(/(《[^》]*》)/).map(part => {
    const m = part.match(/^《([^》]*)》$/);
    if(m) return `<mark class="tech-mark">${esc(m[1])}</mark>`;
    return esc(part);
  }).join("");
}
function shuffledOrder(n){
  const a = [...Array(n).keys()];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
/* 記述式の答え合わせ用：カタカナ→ひらがな、空白除去 */
function normalizeAns(s){
  return String(s)
    .replace(/[\s　]/g, "")
    .replace(/[ァ-ヶ]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
}
function catBadge(cat){
  const st = loadStats();
  const lv = st.lv[cat], t = titleOf(lv);
  return `${t.icon} ${esc(t.name)}　Lv.${lv}`;
}

/* 選択問題を、数字キー(選んで反転表示)＋Enter(確定)でも回答できるようにする仕組み。
   choiceKeyCount 個のボタンが今の画面にそのまま揃っているときだけ有効。
   途中で画面が変わったりすでに答え終わっていたら自動的に何もしなくなる。 */
let activeChoiceKeyHandler = null;  // (displayPos) => void
let choiceKeySelected = null;
let choiceKeyCount = 0;
function setupChoiceKeys(handler, count){
  activeChoiceKeyHandler = handler;
  choiceKeySelected = null;
  choiceKeyCount = count;
}
function clearChoiceKeys(){
  activeChoiceKeyHandler = null;
  choiceKeySelected = null;
  choiceKeyCount = 0;
}
function selectChoiceVisual(displayPos){
  choiceKeySelected = displayPos;
  screen.querySelectorAll(".choice").forEach((b,pos)=>{
    b.classList.toggle("selected", pos === displayPos);
  });
}
function handleChoiceKey(e){
  if(bossPromptActive){
    if(e.key === "ArrowRight"){ e.preventDefault(); moveBossPromptSelection("yes"); }
    else if(e.key === "ArrowLeft"){ e.preventDefault(); moveBossPromptSelection("no"); }
    else if(e.key === "Enter"){ e.preventDefault(); resolveBossPrompt(bossPromptSelection); }
    return;
  }
  if(!activeChoiceKeyHandler) return;
  const btns = screen.querySelectorAll(".choice");
  if(btns.length !== choiceKeyCount || (btns[0] && btns[0].disabled)){
    clearChoiceKeys();
    return;
  }
  if(e.key >= "1" && e.key <= "9"){
    const pos = Number(e.key) - 1;
    if(pos < choiceKeyCount){
      e.preventDefault();
      selectChoiceVisual(pos);
    }
  }else if(e.key === "Enter" && choiceKeySelected !== null){
    e.preventDefault();
    const handler = activeChoiceKeyHandler, pos = choiceKeySelected;
    clearChoiceKeys();
    handler(pos);
  }
}
document.addEventListener("keydown", handleChoiceKey);

  ],

const KOTONOHA_TYPE_LABEL = {
  1:"一領域特化型", 2:"二領域特化型", 4:"全領域バランス型",
  3:"その他型（のびのび系）", 5:"その他型（ほのお系）", 6:"その他型（うみかぜ系）",
  7:"その他型（ほしぞら系）", 8:"その他型（おとの系）", 9:"その他型（はなぞの系）",
};
/* 「その他型」に分類される場合、6系統（のびのび・ほのお・うみかぜ・ほしぞら・おとの・はなぞの）
   から完全ランダムに1つを選ぶ。一領域特化・二領域特化・全領域バランスの条件を満たすときだけ
   特定の系統（1・2・4）が確定し、それ以外（＝「その他型」）は進化するたびに毎回抽選し直す
   （同じ段階の間は再抽選しないよう、直前に抽選した「段階」を記録しておく）。 */
const KOTONOHA_OTHER_TYPES = [3, 5, 6, 7, 8, 9];
function kotonohaTotalXP(st){
  return CAT_KEYS.reduce((sum,k)=> sum + Math.max(0, (st.lv[k]||1) - 1), 0);
}
function kotonohaOtherType(st, stageIdx){
  const roll = st.kotonohaOtherRoll;
  if(roll && roll.stageIdx === stageIdx && KOTONOHA_OTHER_TYPES.includes(roll.type)){
    return roll.type;
  }
  const type = KOTONOHA_OTHER_TYPES[Math.floor(Math.random() * KOTONOHA_OTHER_TYPES.length)];
  st.kotonohaOtherRoll = {stageIdx, type};
  saveStats(st);
  return type;
}
function kotonohaType(st, stageIdx){
  const lvs = CAT_KEYS.map(k => st.lv[k]||1);
  const total = lvs.reduce((a,b)=>a+b, 0);
  const sorted = [...lvs].sort((a,b)=>b-a);
  const top1 = sorted[0] / total;
  const top2 = (sorted[0] + sorted[1]) / total;
  if(top1 >= 0.80) return 1;
  if(top2 >= 0.70) return 2;
  const avg = total / CAT_KEYS.length;
  const maxDev = Math.max(...lvs.map(v => Math.abs(v - avg) / avg));
  if(maxDev <= 0.20) return 4;
  return kotonohaOtherType(st, stageIdx);
}
function kotonohaStageIndex(totalXPVal){
  let idx = 0;
  KOTONOHA_STAGE_XP.forEach((th,i) => { if(totalXPVal >= th) idx = i; });
  return idx; // 0 = たまご（未分化）
}
function kotonohaForm(st){
  const total = kotonohaTotalXP(st);
  const stageIdx = kotonohaStageIndex(total);
  if(stageIdx === 0) return {name:"ことばのたまご", icon:"🥚", type:null, stageIdx, total};
  const type = kotonohaType(st, stageIdx);
  const line = KOTONOHA_LINES[type];
  const form = line[stageIdx-1] || line[line.length-1];
  return {name:form.name, icon:form.icon, type, stageIdx, total};
}
/* 「すがた」を一意に表す文字列キー（たまごは type がないので固定文字列にする） */
function kotonohaFormKey(f){
  return f.stageIdx === 0 ? "egg" : `${f.type}-${f.stageIdx}`;
}
/* キーから見た目（名前・アイコン）だけを復元する。経験値・進行状況などは含まない */
function kotonohaFormFromKey(key){
  if(key === "egg") return {name:"ことばのたまご", icon:"🥚", type:null, stageIdx:0};
  const parts = String(key).split("-");
  const type = Number(parts[0]), stageIdx = Number(parts[1]);
  const line = KOTONOHA_LINES[type];
  if(!line || !stageIdx) return null;
  const form = line[stageIdx-1];
  if(!form) return null;
  return {name:form.name, icon:form.icon, type, stageIdx};
}
function kotonohaCardHtml(st){
  const f = kotonohaForm(st);
  const key = kotonohaFormKey(f);
  if(!st.kotonohaSeenForms.includes(key)){
    st.kotonohaSeenForms.push(key);
    saveStats(st);
  }
  const override = st.kotonohaDisplayOverride && kotonohaFormFromKey(st.kotonohaDisplayOverride);
  const disp = override || f;
  const prev = KOTONOHA_STAGE_XP[f.stageIdx];
  const next = KOTONOHA_STAGE_XP[f.stageIdx+1];
  const progress = next ? Math.min(100, Math.round((f.total - prev) / (next - prev) * 100)) : 100;
  const progressNote = next ? `つぎの進化まで、あと経験値${next - f.total}` : "最終形態に到達している";
  const typeTag = f.type ? `<span class="kotonoha-type">${esc(KOTONOHA_TYPE_LABEL[f.type])}</span>` : "";
  const typeClass = disp.type ? `kotonoha-type${disp.type}` : "kotonoha-egg";
  let stageTagText;
  if(f.stageIdx === 0) stageTagText = "たまご";
  else if(!next) stageTagText = "最終形態";
  else stageTagText = `第${f.stageIdx}形態`;
  const stageTag = `<span class="kotonoha-stage${!next && f.stageIdx>0 ? ' final':''}">${stageTagText}</span>`;
  const overrideNote = override ? `<p class="note">🖼️ すがたを「${esc(disp.name)}」に変更中</p>` : "";
  const s = st.stats || {hp:0,atk:0,def:0,spd:0,luck:0};
  const statusTable = `

    </table>
    ${unspentStatPoints(st) > 0 ? `<p class="note">✨ のこりステータスポイント：${unspentStatPoints(st)}</p>` : ""}`;
  return `
  <div class="card kotonoha-card">
    <h3 class="section">きみの相棒【ことのは】</h3>
    <div class="kotonoha-row">
      <div class="kotonoha-icon ${typeClass}${override ? ' kotonoha-overridden' : ''}" onclick="showKotonohaFormPicker()">${disp.icon}</div>
      <div class="kotonoha-info">
        <div class="kotonoha-name">${stageTag}${esc(disp.name)}</div>
        ${typeTag}
        <div class="kotonoha-xp">経験値　${f.total}</div>
        <div class="bar"><div style="width:${progress}%"></div></div>
        <p class="note">${esc(progressNote)}</p>
        ${overrideNote}
        ${statusTable}
        <div class="btn-row" style="margin-top:8px">
          <button class="btn inline secondary" onclick="showStatusAllocation()">💪 ボス戦ステータス</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ================= ボス戦ステータス（分野レベルアップでたまるポイントを割りふる） =================
   ボス戦だけに効果があるステータス。1ポイントごとの効果量は STAT_*_PER_POINT を参照。 */
function showStatusAllocation(){
  const st = loadStats();
  const s = st.stats;
  const pts = unspentStatPoints(st);
  const rows = [
    {key:"hp",   label:"❤️ HP",    desc:"ボス戦での最大HPが上がる"},
    {key:"atk",  label:"⚔️ 攻撃力", desc:"正解したときにボスへ与えるダメージが増える"},
    {key:"def",  label:"🛡️ 防御力", desc:"ボスの攻撃で受けるダメージが減る"},
    {key:"spd",  label:"💨 素早さ", desc:"ボスの攻撃を回避できる確率が上がる。自分の攻撃も命中しやすくなる"},
    {key:"luck", label:"🍀 運",     desc:"正解したときに「会心の一撃」が出やすくなる"},
  ];
  let html = `
    <div class="card">
      <h3 class="section">💪 ボス戦ステータス</h3>
      <p class="note">分野のレベルが1つ上がるたびに、ポイントを1つもらえます。ここで割りふった効果は、ボスとの戦いのときだけ発揮されます（二人対戦には影響しません）。</p>
      <p style="text-align:center; font-size:1.15rem; font-weight:bold; margin-top:10px">
        のこりポイント：<span style="color:var(--accent)">${pts}</span>
      </p>
    </div>`;
  rows.forEach(r=>{
    html += `
    <div class="card status-row">
      <div class="status-row-info">
        <div class="status-row-label">${r.label}</div>
        <div class="note" style="margin-top:2px">${esc(r.desc)}</div>
      </div>
      <div class="status-row-ctrl">
        <button class="btn inline secondary stat-step-btn" ${(s[r.key]||0)<=0?'disabled':''} onclick="allocateStat('${r.key}', -10)">－10</button>
        <button class="btn inline secondary stat-step-btn" ${(s[r.key]||0)<=0?'disabled':''} onclick="allocateStat('${r.key}', -1)">－1</button>
        <span class="status-row-val">${s[r.key]||0}</span>
        <button class="btn inline stat-step-btn" ${pts<=0?'disabled':''} onclick="allocateStat('${r.key}', 1)">＋1</button>
        <button class="btn inline stat-step-btn" ${pts<=0?'disabled':''} onclick="allocateStat('${r.key}', 10)">＋10</button>
      </div>
    </div>`;
  });
  html += `
    <div class="btn-row">
      <button class="btn secondary" onclick="distributeEvenly()">⚖️ バランスよく配分する</button>
      <button class="btn secondary" onclick="resetStatusAllocation()">🔄 配分をリセット</button>
      <button class="btn secondary" onclick="showHome()">ホームへ</button>
    </div>`;
  screen.innerHTML = html;
}
function allocateStat(key, delta){
  const st = loadStats();
  if(delta > 0){
    const add = Math.min(delta, unspentStatPoints(st));
    if(add <= 0) return;
    st.stats[key] = (st.stats[key]||0) + add;
  }else{
    const remove = Math.min(-delta, st.stats[key]||0);
    if(remove <= 0) return;
    st.stats[key] -= remove;
  }
  saveStats(st);
  showStatusAllocation();
}
/* のこりポイントを、HP・攻撃力・防御力・素早さ・運の5つに、あまりなく均等に振り分ける
   （すでに割りふった分はそのままに、のこりポイントぶんだけ上乗せする）。 */
function distributeEvenly(){
  const st = loadStats();
  const pts = unspentStatPoints(st);
  if(pts <= 0){ alert("配分できるポイントがありません。"); return; }
  const keys = ["hp","atk","def","spd","luck"];
  const each = Math.floor(pts / keys.length);
  let remainder = pts - each * keys.length;
  keys.forEach(k=>{
    let add = each;
    if(remainder > 0){ add += 1; remainder -= 1; }
    st.stats[k] = (st.stats[k]||0) + add;
  });
  saveStats(st);
  showStatusAllocation();
}
function resetStatusAllocation(){
  const st = loadStats();
  const spent = spentStatPoints(st);
  if(spent === 0){ alert("まだポイントを割りふっていません。"); return; }
  if(!confirm("ステータスの配分をすべてリセットして、ポイントを割りふり直せるようにします。よろしいですか？")) return;
  st.stats = {hp:0, atk:0, def:0, spd:0, luck:0};
  saveStats(st);
  showStatusAllocation();
}

        <li>レベルが上がると、「むらびと」→「村人」→…→「伝説の勇者」というように<b>称号</b>が変わっていきます。伝説の勇者のさらに先には、正体がナゾの「かくし称号」もかくされています。</li>
        <li>レベルが<b>10回上がるごとに</b>、ボスへの「挑戦チケット」を1枚もらえます。</li>
        <li>選択肢を適当に選び続けるなど、<b>直近の正答率が極端に低いとき</b>は、正解してもレベルアップが一時的にお休みになります。落ち着いて問題を読んで答えるようにすれば、また通常どおりレベルが上がるようになります。</li>
      </ul>
    </div>

    <h3 class="section">✍️ 漢字の書き学習</h3>
    <div class="card">
      <ul class="help-list">
        <li>「とっくん・読解・記録」の中の「漢字の書き学習」では、<b>高校入試で頻出の漢字</b>を、書き取り形式で学習できます。</li>
        <li>例文の中の<b>カタカナ・太字・下線の部分</b>を、漢字でノートなどに書いてみてから「答えを見る」を押します。答えの漢字は大きな教科書体で表示され、あわせて意味・読み・成り立ちも確認できます。</li>
        <li>自分で答え合わせをして、「⭕ 書けた！」「❌ 書けなかった」のどちらかを選びます。<b>自己採点なので、このモードの結果は経験値や「ことのは」の成長には影響しません。</b>そのかわり、このモード専用の「書き取りレベル」と、レベルごとの直近100回の正答率が記録されます。</li>
        <li>レベルは「１」〜「５」（頻出トップ20〜200から出題）と「極」（頻出上位とその他の漢字を半分ずつ出題）があります。</li>
        <li>間違えた（書けなかった）漢字は出やすく、書けた漢字はだんだん出にくくなっていきます。</li>
      </ul>
    </div>

    <h3 class="section">🎁 アイテムのシステム（宝具も）</h3>
    <div class="card">
      <ul class="help-list">
        <li>ボスに勝つと、そのボスだけが持っている「<b>アイテム</b>」を必ず1つもらえます。</li>
        <li>さらに、まれに（だいたい10回に1回くらい）、もっとレアな「<b>宝具</b>」も手に入ります。</li>
        <li>集めたアイテム・宝具は、成績とは別に<b>ずっと記録</b>されます。ホーム画面の「アイテム一覧」からいつでも確認できます。</li>
        <li>通常アイテムは、ボス戦中に「🎒 アイテムを使う」から<b>消費して効果を得る</b>こともできます。HPを回復するもの、数ターンのあいだ攻撃力・防御力が上がるもの、次の1回だけ間違えてもダメージを受けなくなるものなど、アイテムによって効果がちがいます。使うと1個へります。<b>1ターンに使えるアイテムは1個まで、また同じ種類のアイテムはその戦闘中に1回まで</b>です。</li>
      </ul>
    </div>

    <h3 class="section">👹 ボスのシステム</h3>
    <div class="card">
      <ul class="help-list">
        <li>ふつうに問題を解いていると、<b>ごくまれに（1/40くらいの確率で）</b>ボスが勝負をしかけてきます。</li>
        <li>「勝負する」か「いいえ」かを、その場で選べます。断ってもペナルティはありません。</li>
        <li>ボス戦では、<b>正解するとボスにダメージ</b>を与え、<b>不正解だと自分がダメージ</b>を受けます（間違えたときのほうがダメージが大きいので、正解を積み重ねることが大切です）。</li>
        <li>ボスにはそれぞれ個性があり、<b>HPが高くて硬いボス</b>、<b>攻撃がはげしいボス</b>、<b>防御・回避にすぐれたボス</b>など、戦い方が少しずつちがいます。</li>
        <li>それぞれのボスには「<b>適正経験値</b>」の目安があり、遭遇したときに表示されます。その分のステータスポイントを持って挑めば、8割正解ペースで勝率85〜90%くらいになるよう調整されています。適正経験値より少ないと、格上のボスほど勝つのが難しくなります。</li>
        <li>負けてもアイテムを失うことはなく、何度でも挑戦できます。</li>
        <li>レベルアップでたまる「挑戦チケット」を使えば、遭遇を待たずに<b>いつでも</b>ボスに挑戦できます。挑戦チケットを使った対戦は<b>全ジャンル</b>から出題されます（ふだんのランダム遭遇では、そのとき解いていたジャンルのまま出題されます）。また、挑戦チケットでは<b>今の経験値で適正経験値以下のボスだけ</b>が出現します（経験値が50以下のときは、適正経験値50のボスのどちらかになります）。</li>
      </ul>
    </div>

    <h3 class="section">💪 ボス戦ステータスのシステム</h3>
    <div class="card">
      <ul class="help-list">
        <li>分野のレベルが1つ上がるたびに、「ステータスポイント」を1つもらえます。</li>
        <li>ホームの「ボス戦ステータス」画面で、<b>HP・攻撃力・防御力・素早さ・運</b>の5つに好きなだけ割りふれます。</li>
        <li><b>HP</b>はボス戦での最大体力、<b>攻撃力</b>は正解時のダメージ、<b>防御力</b>はボスから受けるダメージの軽減、<b>素早さ</b>はボスの攻撃を回避できる確率（あわせて自分の攻撃の命中しやすさにも少し関係）、<b>運</b>は「会心の一撃」の出やすさに関係します。どのステータスも、注げば注ぐほど少しずつ効果が伸びていくので、無駄になりません。</li>
        <li>これらの効果は<b>ボス戦だけ</b>に反映されます（二人対戦には影響しません）。ボス側にも同じような個性があり、素早さでの回避は、ボスの「命中率」との駆け引きになります。</li>
        <li>「配分をリセット」ボタンで、いつでも割りふり直せます。</li>
      </ul>
    </div>

    <h3 class="section">⚔️ 対戦モードのシステム</h3>
    <div class="card">
      <ul class="help-list">
        <li>同じ端末を2人で使って対戦する、二人対戦モードです。</li>
        <li>はじめに、<b>2人の名前</b>を入力します。</li>
        <li>次に、「<b>全ジャンル</b>」から出題するか、「<b>ジャンルを選択する</b>」で対戦したい分野を自分たちで選ぶか（複数選べます）を決めます。</li>
        <li>お互いのHPは100ずつ。交代で問題に答えて、<b>正解すると相手にダメージ</b>をあたえます。</li>
        <li>対戦モードでは、知識クイズのような難度の自動調整は行われません。<b>問題のレベルは完全にシャッフル</b>され、かんたんな問題も難しい問題も同じくらいの確率で出題されます。2人のどちらか一方に有利にならないよう、公平に出題するためです。</li>
        <li>先にHPが0になったほうが負けです。個人の称号やレベルには影響しない、対戦専用の記録が別にたまります。</li>
      </ul>
    </div>

    <button class="btn secondary" onclick="showHome()">ホームへ</button>`;
}

/* ================= 知識クイズ（エンドレス） ================= */
let quiz = null;
function startQuiz(key){
  quiz = {mode:"cat", key, n:0, correct:0, evolved:null, lastQ:null, cat:null, item:null, order:null};
  nextQuestion();
}
function startReview(){
  if(weakItems().length === 0){
    screen.innerHTML = `<div class="card"><h3 class="section">苦手復習</h3>
      <p>いま復習が必要な問題はありません。間違えた問題があると、ここにたまっていきます。</p>
      <button class="btn" onclick="showHome()">ホームへ</button></div>`;
    return;
  }
  quiz = {mode:"review", key:null, n:0, correct:0, evolved:null, lastQ:null, cat:null, item:null, order:null};
  nextQuestion();
}
function nextQuestion(){
  if(rollBossEncounter(() => nextQuestion())) return;
  if(quiz.mode === "review"){
    const st = loadStats();
    let weak = weakItems();
    if(weak.length > 1 && quiz.lastQ) weak = weak.filter(w => w.it.q !== quiz.lastQ);
    if(weak.length === 0){ endSession(true); return; }
    const weights = weak.map(w => reviewWeight(st, w.cat, w.it));
    const picked = pickOne(weak, weights);
    quiz.cat = picked.cat; quiz.item = picked.it;
  }else{
    quiz.cat = quiz.key;
    quiz.item = selectOne(quiz.key, quiz.lastQ);
  }
  quiz.lastQ = quiz.item.q;
  renderQuestion();
}
function renderQuestion(){
  const it = quiz.item, cat = quiz.cat;
  const st = loadStats();
  const s = qStat(st, cat, it);
  const redoMark = (s && s.t > 0 && s.c < s.t) ? `<span class="redo">↻ 前に間違えた問題</span>` : "";
  const label = quiz.mode === "review" ? `苦手復習（${CATS[cat].name}）` : CATS[cat].name;
  const isInput = Array.isArray(it.ans);
  let answerArea;
  if(isInput){
    clearChoiceKeys();
    answerArea = `
      <div class="ans-row">
        <input type="text" id="ansIn" class="ans-input" placeholder="ひらがなで入力" autocomplete="off"
               onkeydown="if(event.key==='Enter'){event.preventDefault();submitInput();}">
        <button class="btn inline" id="submitBtn" onclick="submitInput()">こたえる</button>
      </div>`;
  }else{
    quiz.order = shuffledOrder(it.c.length);
    answerArea = `
      <div class="choices">
        ${quiz.order.map((oi,pos)=>`<button class="choice" onclick="answerChoice(${oi})"><span class="choice-num">${pos+1}</span>${it.ckb ? kanbunMiniHtml(it.ckb[oi]) : esc(it.c[oi])}</button>`).join("")}
      </div>`;
    setupChoiceKeys(pos => answerChoice(quiz.order[pos]), it.c.length);
  }
  screen.innerHTML = `
    <div class="session-bar">
      <span>${quiz.n+1}問目　｜　今回の正解 ${quiz.correct}問</span>
      <span class="catstat">${catBadge(cat)}</span>
    </div>
    <div class="card">
      <div class="q-category"><span>${esc(label)}</span>${redoMark}</div>
      ${subInstructionHtml(cat, it)}
      ${kanbunBoxHtml(it.kb)}
      <div class="q-text">${markQuestionHtml(it.q)}</div>
      ${answerArea}
      <div class="feedback" id="fb"></div>
      <div class="btn-row">
        <button class="btn" id="nextBtn" style="display:none" onclick="nextQuestion()">次へ</button>
        <button class="btn secondary" id="quitBtn" style="display:none" onclick="endSession(false)">今日はここまで</button>
      </div>
    </div>`;
  if(isInput){ const el = document.getElementById("ansIn"); if(el) el.focus(); }
}
function answerChoice(origIdx){
  const it = quiz.item;
  const ok = origIdx === it.a;
  gradeAnswer(ok, origIdx, null);
}
function submitInput(){
  const el = document.getElementById("ansIn");
  if(!el || el.disabled) return;
  const val = normalizeAns(el.value);
  if(!val) return;   // 空欄は受け付けない
  const ok = quiz.item.ans.map(normalizeAns).includes(val);
  el.disabled = true;
  const sb = document.getElementById("submitBtn");
  if(sb) sb.disabled = true;
  gradeAnswer(ok, null, el.value);
}
function gradeAnswer(ok, chosenOrig, typed){
  const it = quiz.item, cat = quiz.cat;
  quiz.n++;
  if(ok) quiz.correct++;
  const r = record(cat, it, ok);
  if(r.evolved) quiz.evolved = r.evolved;
  /* 選択式の色付け */
  const btns = screen.querySelectorAll(".choice");
  btns.forEach((b,pos)=>{
    const oi = quiz.order ? quiz.order[pos] : pos;
    b.disabled = true;
    if(oi===it.a) b.classList.add("correct");
    else if(oi===chosenOrig) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  const fb = document.getElementById("fb");
  fb.className = "feedback show " + (ok?"ok":"ng");
  let expl;
  if(Array.isArray(it.ans)){
    const wrongMsg = ok ? "" : `正解は「${esc(it.ans.join("」または「"))}」（あなたの答え：${esc(typed||"")}）`;
    expl = [wrongMsg, it.e ? esc(it.e) : ""].filter(Boolean).join("<br>");
  }else{
    expl = it.e ? esc(it.e) : (ok ? "" : `正解は「${esc(it.c[it.a])}」`);
  }
  const lvChip = r.lvup ? `<span class="lvup-chip">${esc(CATS[cat].name)} Lv.${r.lv} にアップ！</span>` : "";
  const evolveMsg = r.evolved
    ? `<div class="evolve">${r.evolved.hidden ? "🔓 かくされた称号が明かされた！<br>" : ""}${r.evolved.icon} 進化！　${esc(CATS[cat].name)}の称号が「${esc(r.evolved.name)}」になった！</div>` : "";
  const ticketMsg = r.gotTicket ? `<div class="evolve ticket-get">🎟️ ボスへの挑戦チケットを1枚手に入れた！</div>` : "";
  const lowAccMsg = r.lowAccuracy ? `<p class="note">⏸️ 直近の正答率が低いため、レベルアップはお休み中です。落ち着いて問題を読んで答えると、また上がるようになります。</p>` : "";
  fb.innerHTML = `<div class="verdict">${ok?"○ 正解！":"× ざんねん…"}${lvChip}</div>${expl}${evolveMsg}${ticketMsg}${lowAccMsg}`;
  document.getElementById("nextBtn").style.display = "inline-block";
  document.getElementById("quitBtn").style.display = "inline-block";
  document.getElementById("nextBtn").focus();
}
function endSession(clearedAll){
  const q = quiz;
  let head, sub = "";
  if(q.mode === "review"){
    head = clearedAll ? "苦手を全部つぶしました！　おみごと！" : "苦手復習おつかれさま！";
  }else{
    head = `${CATS[q.key].name}のトレーニングおつかれさま！`;
    sub = `<p class="result-msg">現在：${catBadge(q.key)}</p>`;
  }
  window._retry = q.mode === "review" ? startReview : ()=>startQuiz(q.key);
  screen.innerHTML = `
    <div class="card">
      <h3 class="section">今回の記録</h3>
      <div class="result-score">${q.correct} <span style="font-size:1.2rem;color:var(--sub)">/ ${q.n}問 正解</span></div>
      <p class="result-msg">${esc(head)}</p>
      ${sub}
      ${q.evolved ? `<div class="evolve">${q.evolved.icon} 今回「${esc(q.evolved.name)}」に進化しました！</div>` : ""}
      <div class="btn-row">
        <button class="btn" onclick="window._retry()">つづける</button>
        <button class="btn secondary" onclick="showStats()">成績を見る</button>
        <button class="btn secondary" onclick="showHome()">ホームへ</button>
      </div>
    </div>`;
}

/* ================= 漢字の書き取り学習 =================
   高校入試頻出ランキング（上位から）をもとに、レベル別に出題する専用モード。
   「書けた！／書けなかった」の自己評価制なので、経験値・分野レベル・「ことのは」の進化には
   一切影響させない（record()・saveStatsの通常経路は使うが、cats/lv/diffLvは触らない）。
   代わりに、このモード専用の「書けたね数（＝独自の漢字レベル）」と、レベルごとの直近100回の
   自己評価正答率だけを、st.kanjiWrite に記録する。
   間違えた（＝書けなかった）漢字ほど出やすく、書けた漢字ほど出にくくなる重みづけは、
   通常モードのhistoryWeightと同じ考え方を、このモード専用データ(itemHist)に対して行う。 */
const KANJI_WRITE_LEVELS = [
  {key:"1",    label:"レベル１", topN:20,  desc:"入試頻出トップ20から出題"},
  {key:"2",    label:"レベル２", topN:50,  desc:"入試頻出トップ50から出題"},
  {key:"3",    label:"レベル３", topN:100, desc:"入試頻出トップ100から出題"},
  {key:"4",    label:"レベル４", topN:150, desc:"入試頻出トップ150から出題"},
  {key:"5",    label:"レベル５", topN:200, desc:"入試頻出トップ200から出題"},
  {key:"goku", label:"極",       topN:200, desc:"50%は上位ランキングから、50%はその他の漢字から出題", isGoku:true},
];
function kwData(){ return (window.KANJI_WRITE_DATA) || {ranked:[], other:[]}; }
/* そのレベルが今のデータ量で実際に遊べるかどうか（トップ200分・「その他」データが
   まだ揃っていないうちは、対応するレベルを「準備中」として選べなくする） */
function kwLevelReady(levelDef){
  const d = kwData();
  if(levelDef.isGoku) return d.ranked.length >= levelDef.topN && d.other.length > 0;
  return d.ranked.length >= levelDef.topN;
}
function kwHistoryWeight(st, it){
  const h = st.kanjiWrite.itemHist[it.id];
  if(!h || h.t === 0) return 1.2;
  const wrong = h.t - h.c;
  const w = Math.pow(0.75, h.c) * Math.pow(1.5, wrong);
  return Math.max(0.05, Math.min(8, w));
}
function kwPoolForLevel(levelKey){
  const d = kwData();
  if(levelKey === "goku"){
    return (Math.random() < 0.5 && d.other.length > 0) ? d.other : d.ranked;
  }
  const def = KANJI_WRITE_LEVELS.find(l => l.key === levelKey);
  return d.ranked.slice(0, Math.min(def.topN, d.ranked.length));
}
function kwSelectOne(levelKey, lastId){
  const st = loadStats();
  let pool = kwPoolForLevel(levelKey);
  if(pool.length > 1 && lastId) pool = pool.filter(it => it.id !== lastId);
  const weights = pool.map(it => kwHistoryWeight(st, it));
  return pickOne(pool, weights);
}
function kwLevelAccuracy(st, levelKey){
  const recent = (st.kanjiWrite.levelRecent[levelKey]) || [];
  if(recent.length === 0) return null;
  return Math.round(100 * recent.reduce((a,b)=>a+b, 0) / recent.length);
}
function kwLv(st){ return 1 + (st.kanjiWrite.totalOk || 0); }
/* 自己評価を記録するだけの専用関数。record()は一切呼ばず、
   st.cats・st.lv・st.diffLv（＝経験値やことのはの進化に関わる値）にはnoneも触れない。 */
function kwRecord(levelKey, it, canWrite){
  const st = loadStats();
  const h = st.kanjiWrite.itemHist[it.id] || {t:0, c:0};
  h.t++; if(canWrite) h.c++;
  st.kanjiWrite.itemHist[it.id] = h;
  if(canWrite) st.kanjiWrite.totalOk = (st.kanjiWrite.totalOk||0) + 1;
  const recent = (st.kanjiWrite.levelRecent[levelKey] || []).slice();
  recent.push(canWrite ? 1 : 0);
  while(recent.length > 100) recent.shift();
  st.kanjiWrite.levelRecent[levelKey] = recent;
  saveStats(st);
  return {lv: kwLv(st), acc: kwLevelAccuracy(st, levelKey)};
}

/* ---- 画面：レベル選択 ---- */
function showKanjiWriteMenu(){
  const st = loadStats();
  let html = `<h3 class="section">✍️ 漢字の書き取り学習</h3>
    <p class="note">高校入試で頻出の漢字を、書き取り形式で学習します。「書けた！」「書けなかった」の自己評価制で、経験値や「ことのは」の成長には影響しません。</p>
    <div class="kw-lv-badge">✍️ 書き取りレベル Lv.${kwLv(st)}　（これまで「書けた！」${st.kanjiWrite.totalOk||0}回）</div>`;
  KANJI_WRITE_LEVELS.forEach(l=>{
    const ready = kwLevelReady(l);
    const acc = kwLevelAccuracy(st, l.key);
    const accHtml = acc === null ? "（まだ記録なし）" : `直近100回の正答率　${acc}%`;
    html += `
    <div class="card menu-card kw-level-card ${ready?"":"disabled"}" ${ready?`onclick="startKanjiWrite('${l.key}')"`:""}>
      <div class="menu-icon">✍️</div>
      <div><h2><span class="kw-level-tag">${esc(l.label)}</span>${esc(l.desc)}</h2>
      <p>${ready ? esc(accHtml) : "準備中（問題を追加中です）"}</p></div>
    </div>`;
  });
  html += `<div class="btn-row"><button class="btn secondary" onclick="showHome()">ホームへ</button></div>`;
  screen.innerHTML = html;
}
let kw = null;
function startKanjiWrite(levelKey){
  kw = {level:levelKey, n:0, okCount:0, lastId:null, item:null, revealed:false};
  kwNextQuestion();
}
function kwNextQuestion(){
  kw.item = kwSelectOne(kw.level, kw.lastId);
  kw.lastId = kw.item.id;
  kw.revealed = false;
  kwRenderQuestion();
}
function kwRenderQuestion(){
  const it = kw.item;
  const levelDef = KANJI_WRITE_LEVELS.find(l => l.key === kw.level);
  let answerArea;
  if(!kw.revealed){
    answerArea = `<div class="btn-row"><button class="btn" onclick="kwReveal()">✅ 答えを見る</button></div>`;
  }else{

function kwReveal(){

function kwGrade(canWrite){
  kw.n++;

  document.querySelectorAll(".kw-ok-btn, .kw-ng-btn").forEach(b => b.disabled = true);

}

let dk = null;
function showDokkaiMenu(){

    </div>`;
  });

}
function startDokkai(pi){
  dk = {p:DOKKAI[pi], i:0, correct:0, pi, order:null, evolved:null};
  renderDokkai();
}
function renderDokkai(){
  const p = dk.p, it = p.qs[dk.i], total = p.qs.length;
  dk.order = shuffledOrder(it.c.length);
  screen.innerHTML = `
    <div class="session-bar">
      <span>問${dk.i+1} / ${total}</span>
      <span class="catstat">${catBadge("dokkai")}</span>
    </div>
    <div class="passage">
      <p class="passage-title">${esc(p.title)}</p>
      ${p.text.map(t=>`<p>${esc(t)}</p>`).join("")}
    </div>
    <div class="card">
      <div class="q-category">読解</div>
      <div class="q-text">問${dk.i+1}　${markQuestionHtml(it.q)}</div>
      <div class="q-sub">${esc(DOKKAI_INSTRUCTION)}</div>
      <div class="choices">
        ${dk.order.map((oi,pos)=>`<button class="choice" onclick="answerDokkai(${oi})"><span class="choice-num">${pos+1}</span>${esc(it.c[oi])}</button>`).join("")}
      </div>
      <div class="feedback" id="fb"></div>
      <button class="btn" id="nextBtnD" style="display:none" onclick="nextDokkai()">次へ</button>
    </div>`;
  setupChoiceKeys(pos => answerDokkai(dk.order[pos]), it.c.length);
}
function answerDokkai(origIdx){
  const it = dk.p.qs[dk.i];
  const ok = origIdx === it.a;
  if(ok) dk.correct++;
  const r = record("dokkai", it, ok);
  if(r.evolved) dk.evolved = r.evolved;
  const btns = screen.querySelectorAll(".choice");
  btns.forEach((b,pos)=>{
    const oi = dk.order[pos];
    b.disabled = true;
    if(oi===it.a) b.classList.add("correct");
    else if(oi===origIdx) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  const fb = document.getElementById("fb");
  fb.className = "feedback show " + (ok?"ok":"ng");
  const lvChip = r.lvup ? `<span class="lvup-chip">読解 Lv.${r.lv} にアップ！</span>` : "";
  const evolveMsg = r.evolved
    ? `<div class="evolve">${r.evolved.hidden ? "🔓 かくされた称号が明かされた！<br>" : ""}${r.evolved.icon} 進化！　読解の称号が「${esc(r.evolved.name)}」になった！</div>` : "";
  const ticketMsg = r.gotTicket ? `<div class="evolve ticket-get">🎟️ ボスへの挑戦チケットを1枚手に入れた！</div>` : "";
  const lowAccMsg = r.lowAccuracy ? `<p class="note">⏸️ 直近の正答率が低いため、レベルアップはお休み中です。落ち着いて問題を読んで答えると、また上がるようになります。</p>` : "";
  fb.innerHTML = `<div class="verdict">${ok?"○ 正解！":"× ざんねん…"}${lvChip}</div>${it.e?esc(it.e):""}${evolveMsg}${ticketMsg}${lowAccMsg}`;
  document.getElementById("nextBtnD").style.display = "inline-block";
}
function nextDokkai(){
  dk.i++;
  if(dk.i < dk.p.qs.length) renderDokkai();
  else {
    const d = dk;
    window._retry = ()=>startDokkai(d.pi);
    screen.innerHTML = `
      <div class="card">
        <h3 class="section">結果発表</h3>
        <div class="result-score">${d.correct} <span style="font-size:1.2rem;color:var(--sub)">/ ${d.p.qs.length}問</span></div>
        <p class="result-msg">現在：${catBadge("dokkai")}</p>
        ${d.evolved ? `<div class="evolve">${d.evolved.icon} 「${esc(d.evolved.name)}」に進化しました！</div>` : ""}
        <div class="btn-row">
          <button class="btn" onclick="window._retry()">もう一度</button>
          <button class="btn secondary" onclick="showDokkaiMenu()">ほかの文章へ</button>
          <button class="btn secondary" onclick="showHome()">ホームへ</button>
        </div>
      </div>`;
  }
}

/* ================= 二人対戦（同じ端末で交互に対戦） =================
   同じ端末を2人で使い、ジャンルをひとつ選んで交互に出題する。
   正解すると相手のHPを削り、さきにHPを０にしたほうの勝ち。
   個人の称号・経験値には影響しない、別枠のミニゲーム。 */
const BATTLE_STORE_KEY = "kokugoBattleStats_v1";
function loadBattleStats(){
  try{
    const s = localStorage.getItem(BATTLE_STORE_KEY);
    if(s){
      const bs = JSON.parse(s);
      if(bs && typeof bs.plays === "number"){
        if(!Array.isArray(bs.history)) bs.history = [];
        return bs;
      }
    }
  }catch(e){}
  return {plays:0, byCat:{}, history:[]};
}
function saveBattleStats(bs){
  try{ localStorage.setItem(BATTLE_STORE_KEY, JSON.stringify(bs)); }catch(e){}
}
function battleCatsLabel(cats){
  if(!cats || cats.length === 0) return "";
  if(cats.length >= CAT_KEYS.length) return "全ジャンル";
  return cats.map(k => (CATS[k] ? CATS[k].name : k)).join("・");
}
function battleDateLabel(ts){
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,"0");
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
/* 問題の難度（it.lv）が高いほど少しダメージが大きくなる */
function battleDamage(it){
  return Math.max(8, Math.min(35, 8 + (it.lv||1)*3));
}
/* 対戦専用の出題：個人のレベル・履歴には左右されず、直前と同じ問題だけ避けて公平に選ぶ */
function pickBattleQuestion(cat, lastQ){
  let pool = CATS[cat].items;
  if(pool.length > 1 && lastQ) pool = pool.filter(it => it.q !== lastQ);
  return pool[Math.floor(Math.random() * pool.length)];
}
let battle = null;
let battleSetup = null; // { nameA, nameB, picked:Set }
function pickBattleQuestionMulti(cats, lastQ){
  let pool = [];
  cats.forEach(key=>{
    const c = CATS[key];
    if(c) c.items.forEach(it => pool.push({cat:key, item:it}));
  });
  if(pool.length > 1 && lastQ) pool = pool.filter(p => p.item.q !== lastQ);
  return pool[Math.floor(Math.random() * pool.length)];
}
function showBattleSetup(){
  if(!battleSetup) battleSetup = {nameA:"プレイヤーA", nameB:"プレイヤーB", picked:new Set()};
  const bs = loadBattleStats();
  screen.innerHTML = `
    <div class="card battle-setup-screen">
      <div class="battle-setup-title">⚔️ 二人対戦</div>
      <p class="battle-setup-sub">同じ端末を2人で使い、交代で問題に答えます。<br>正解すると相手のHPが減っていき、さきにHPを０にしたほうの勝ちです。</p>
      <div class="battle-vs-row">
        <div class="battle-name-box">
          <label>先攻</label>
          <input type="text" id="battleNameA" class="battle-name-input" placeholder="プレイヤーA" value="${esc(battleSetup.nameA)}">
        </div>
        <div class="battle-vs-mark">VS</div>
        <div class="battle-name-box">
          <label>後攻</label>
          <input type="text" id="battleNameB" class="battle-name-input" placeholder="プレイヤーB" value="${esc(battleSetup.nameB)}">
        </div>
      </div>
      <button class="btn" style="margin-top:22px" onclick="goBattleGenreSelect()">つぎへ（ジャンルを決める）</button>
    </div>
    <p class="note" style="text-align:center">🥊 これまでの対戦数：${bs.plays}回</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn secondary" onclick="showBattleHistory()">📋 対戦記録を見る</button>
      <button class="btn secondary" onclick="showHome()">ホームへ</button>
    </div>`;
}
function showBattleHistory(){
  const bs = loadBattleStats();
  const history = bs.history || [];
  let html = `<div class="card battle-setup-screen">
      <div class="battle-setup-title">📋 対戦記録</div>
      <p class="battle-setup-sub">これまでの対戦数：${bs.plays}回</p>
    </div>`;
  if(history.length === 0){
    html += `<div class="card"><p class="note">まだ対戦の記録がありません。</p></div>`;
  }else{
    html += `<div class="card"><ul class="battle-history-list">`;
    html += history.map(h=>{
      const loser = h.winner === h.a ? h.b : h.a;
      return `<li>
        <div class="battle-history-main">
          <span class="battle-history-winner">🏆 ${esc(h.winner)}</span>
          <span class="battle-history-vs">vs</span>
          <span class="battle-history-loser">${esc(loser)}</span>
        </div>
        <div class="battle-history-meta">${esc(battleCatsLabel(h.cats))}　${esc(battleDateLabel(h.ts))}</div>

  }
